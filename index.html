body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}

/* ── Buttons ── */
button{cursor:pointer;border:none;border-radius:var(--rS);font-size:13px;font-weight:500;padding:8px 14px;transition:all .2s;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation;white-space:nowrap}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:var(--pad);box-shadow:0 2px 12px rgba(0,0,0,.3)}

/* ── Grids — mobile-first ── */

self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/')))));`;

// ─── BUDGET CATEGORIES — default structure (can be customised per user) ──────

// Profile definitions: score range → profile data
// ─── RISK PROFILES ───────────────────────────────────────────────────────────
// Rentabilidades y volatilidades calculadas con datos históricos reales:
//   Renta Variable Global (MSCI World 1970-2024): 7.5% nominal anual, σ=15%
//   Renta Fija Global (Bloomberg Global Agg 1990-2024): 3.5% nominal, σ=4%

//   Fórmula: E(r) = wRV·7.5% + wRF·3.5%
//            σ = √(wRV²·15²  + wRF²·4² + 2·wRV·wRF·(-0.05)·15·4)
//   Composición según tabla Excel Renta4 (hoja Inversiones):
//     Conservador: RV 0-20%  (mid 10%) / RF ~90%
//     Moderado:    RV 20-60% (mid 40%) / RF ~60%
//     Dinámico:    RV 40-100%(mid 60%) / RF ~40%  → coincide con 5.47% Plan Inversión Renta4
//     Tolerante:   RV 60-100%(mid 80%) / RF ~20%

const PC=['#6c63ff','#00d4aa','#ffa94d','#ff6b6b','#4da6ff','#a78bfa','#34d399','#f472b6','#60a5fa'];
const MN=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const TODAY = new Date();
const CUR_YEAR = TODAY.getFullYear(); // 2026
const CUR_MONTH = TODAY.getMonth();

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function genBD() {
  const d={};
  // Generate data for 2023,2024,2025,2026
  for(let y=2023;y<=CUR_YEAR;y++) {
    d[y]={};
    const maxM = y < CUR_YEAR ? 11 : CUR_MONTH;
    for(let m=0;m<=maxM;m++) {
      const cats={};
      DEFAULT_CATS.forEach(cat => {
        cat.items.forEach(item => {
          cats[item] = { p: Math.round(100+Math.random()*400), r: Math.round(100+Math.random()*450) };
        });
      });
      d[y][m] = {
        cats,
        ingP: 5000,
        ingR: Math.round(5000+(Math.random()-.5)*600)
      };
    }
  }
  return d;
}

// ─── SECURE PER-USER STORAGE ─────────────────────────────────────────────────
// Each user's data stored under a separate key derived from their ID+pass hash.
// The global user index only stores {id, email, name, keyHint} — no sensitive data.
// Other users cannot read each other's data.
function simpleHash(s){let h=0;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return(h>>>0).toString(36);}
function userStorageKey(u){return 'fa_ud_'+simpleHash(String(u.id)+'|'+u.pass);}
function sessionKey(){return 'fa_sess';}

const LS = {
  // Index: only public info (id, email, name) — no passwords, no data
  index:()=>{try{return JSON.parse(localStorage.getItem('fa_idx')||'[]');}catch(e){return[];}},
  saveIndex:idx=>{try{localStorage.setItem('fa_idx',JSON.stringify(idx));}catch(e){}},
  // Per-user encrypted data (keyed by hash of id+pass)
  loadUser:u=>{try{const raw=localStorage.getItem(userStorageKey(u));return raw?JSON.parse(raw):null;}catch(e){return null;}},
  saveUserData:u=>{try{localStorage.setItem(userStorageKey(u),JSON.stringify(u));}catch(e){}},
  deleteUserData:u=>{try{localStorage.removeItem(userStorageKey(u));}catch(e){}},
  // Session stores full user object (in memory effectively, cleared on logout)
  session:()=>{try{return JSON.parse(sessionStorage.getItem(sessionKey())||'null');}catch(e){return null;}},
  saveSession:u=>{try{sessionStorage.setItem(sessionKey(),JSON.stringify(u));}catch(e){}},
  clearSession:()=>{try{sessionStorage.removeItem(sessionKey());}catch(e){}},
  // Compat helpers used elsewhere
  users:()=>{
    // Returns only the user list for login matching (no data, just index)
    // We need pass to verify login — stored hashed in index
    try{return JSON.parse(localStorage.getItem('fa_idx_full')||'null')||[DEMO];}catch(e){return[DEMO];}
  },
  saveUsers:idx=>{try{localStorage.setItem('fa_idx_full',JSON.stringify(idx));}catch(e){}},
};
function persist(u){
  LS.saveUserData(u);
  LS.saveSession(u);
  // Update public index
  const idx=LS.users();
  const i=idx.findIndex(x=>x.id===u.id);
  const entry={id:u.id,email:u.email,name:u.name,pass:u.pass};// pass kept for login verify only
  if(i>=0)idx[i]=entry; else idx.push(entry);
  LS.saveUsers(idx);
}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── SVG CHARTS ───────────────────────────────────────────────────────────────
function svgBar(data,keys,colors,h=220){
  const W=600,H=h,pl=58,pr=10,pt=14,pb=36;
  const iW=W-pl-pr,iH=H-pt-pb;
  const maxV=Math.max(...data.flatMap(d=>keys.map(k=>+(d[k]||0))),1);
  const bW=iW/data.length,gap=bW*.1,bW2=(bW-gap*2)/keys.length;
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;
  for(let i=0;i<=4;i++){
    const v=maxV*i/4,y=pt+iH*(1-i/4);
    s+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#2e3248" stroke-width="1"/>`;
    s+=`<text x="${pl-4}" y="${y+4}" text-anchor="end" fill="#8b8fa8" font-size="10">${v>=1000?f0(v/1000)+'k':f0(v)}</text>`;
  }
  data.forEach((d,i)=>{
    keys.forEach((k,ki)=>{
      const v=+(d[k]||0),bH=iH*(v/maxV),x=pl+i*bW+gap+ki*bW2,y=pt+iH-bH;
      s+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bW2.toFixed(1)}" height="${Math.max(0,bH).toFixed(1)}" fill="${colors[ki]}" rx="3" opacity=".9"/>`;
    });
    s+=`<text x="${(pl+i*bW+bW/2).toFixed(1)}" y="${H-pb+14}" text-anchor="middle" fill="#8b8fa8" font-size="9">${d.name||''}</text>`;
  });
  keys.forEach((k,i)=>{
    s+=`<rect x="${pl+i*100}" y="${H-9}" width="9" height="9" fill="${colors[i]}" rx="2"/>`;
    s+=`<text x="${pl+i*100+13}" y="${H-1}" fill="#8b8fa8" font-size="10">${k}</text>`;
  });
  return s+'</svg>';
}

function svgArea(data,keys,colors,h=190,showBands){
  const W=600,H=h,pl=68,pr=14,pt=14,pb=36;
  const iW=W-pl-pr,iH=H-pt-pb,n=data.length;
  if(!n||n<2)return '';
  const allV=data.flatMap(d=>keys.map(k=>+(d[k]||0)).filter(v=>v>0&&!isNaN(v)));
  if(showBands){
    data.forEach(d=>{
      if(d.std1Hi!=null)allV.push(d.std1Hi);
      if(d.std1Lo!=null&&d.std1Lo>0)allV.push(d.std1Lo);
    });
  }
  let minV=0, maxV=Math.max(...allV,1);
  // Start Y axis from slightly below min value for readability
  const rawMin=Math.min(...allV.filter(v=>v>0));
  minV=Math.max(0, rawMin*0.95);
  if(minV===maxV){minV=0;maxV+=1;}
  const range=maxV-minV;
  const px=i=>pl+i*iW/(n-1);
  const py=v=>pt+iH*(1-(Math.max(v,minV)-minV)/range);

  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;

  // Grid lines with formatted labels
  for(let i=0;i<=4;i++){
    const v=minV+range*i/4,y=pt+iH*(1-i/4);
    s+=`<line x1="${pl}" y1="${y.toFixed(1)}" x2="${W-pr}" y2="${y.toFixed(1)}" stroke="rgba(74,53,32,.4)" stroke-width="1"/>`;
    const lv=v>=1000000?f2(v/1000000)+'M€':v>=1000?f0(v/1000)+'k€':f0(v)+'€';
    s+=`<text x="${pl-4}" y="${(y+3.5).toFixed(1)}" text-anchor="end" fill="#a8927a" font-size="9">${lv}</text>`;
  }

  // Helper: smooth bezier path through points (Catmull-Rom → Bezier)
  function smoothPath(pts){
    if(pts.length<2) return '';
    let d=`M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[Math.max(i-1,0)], p1=pts[i], p2=pts[i+1], p3=pts[Math.min(i+2,pts.length-1)];
      // Catmull-Rom to cubic Bezier control points (tension=0.4)
      const t=0.4;
      const cp1x=p1.x+(p2.x-p0.x)*t/2;
      const cp1y=p1.y+(p2.y-p0.y)*t/2;
      const cp2x=p2.x-(p3.x-p1.x)*t/2;
      const cp2y=p2.y-(p3.y-p1.y)*t/2;
      d+=` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
    }
    return d;
  }

  // Std bands using smooth curves
  if(showBands){
    [[data.filter(d=>d.std2Hi!=null&&d.std2Lo!=null),'rgba(160,127,212,0.06)',2],
     [data.filter(d=>d.std1Hi!=null&&d.std1Lo!=null),'rgba(160,127,212,0.12)',1]
    ].forEach(([band,fill,tier])=>{
      if(band.length<2) return;
      const topPts=band.map(d=>({x:px(data.indexOf(d)),y:py(d[tier===1?'std1Hi':'std2Hi'])}));
      const botPts=band.map(d=>({x:px(data.indexOf(d)),y:py(d[tier===1?'std1Lo':'std2Lo'])})).reverse();
      const top=smoothPath(topPts);
      const bot=smoothPath([...botPts].reverse()).replace(/^M/,'L').replace(/C/g,'C');
      // Build closed polygon using smooth top + reversed smooth bottom
      const topPoly=topPts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
      const botPoly=botPts.map(p=>`L${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
      s+=`<path d="${top} L${botPts[0].x.toFixed(1)},${botPts[0].y.toFixed(1)} ${smoothPath(botPts).replace('M'+botPts[0].x.toFixed(1)+','+botPts[0].y.toFixed(1),' ')} Z" fill="${fill}" stroke="none"/>`;
    });
  }

  // Main series: smooth bezier curves + gradient fill
  const base=py(minV);
  keys.forEach((k,ki)=>{
    const pts=data.map((d,i)=>{
      const v=d[k];
      if(v==null||v===undefined||isNaN(+v)) return null;
      return{x:px(i),y:py(+v)};
    }).filter(Boolean);
    if(pts.length<2) return;
    const line=smoothPath(pts);
    const first=pts[0], last=pts[pts.length-1];
    const gradId=`ag${ki}x`;
    s+=`<defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${colors[ki]}" stop-opacity=".3"/>
      <stop offset="100%" stop-color="${colors[ki]}" stop-opacity="0"/>
    </linearGradient></defs>`;
    // Filled area under curve
    s+=`<path d="${line} L${last.x.toFixed(1)},${base.toFixed(1)} L${first.x.toFixed(1)},${base.toFixed(1)} Z" fill="url(#${gradId})"/>`;
    // Line
    s+=`<path d="${line}" fill="none" stroke="${colors[ki]}" stroke-width="2.5" stroke-linejoin="round"/>`;
    // Dots at data points
    pts.forEach((p,i)=>{
      s+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="${colors[ki]}" stroke="var(--card,#2a1f12)" stroke-width="1.5"/>`;
    });
  });

  // X axis labels
  data.forEach((d,i)=>{
    if(n<=15||i%Math.ceil(n/10)===0||i===n-1){
      s+=`<text x="${px(i).toFixed(1)}" y="${H-pb+14}" text-anchor="middle" fill="#a8927a" font-size="9">${d.name||''}</text>`;
    }
  });

  // Legend
  const legKeys=[...keys,...(showBands?['±1σ','±2σ']:[])];
  const legColors=[...colors,...(showBands?['#a07fd4','#a07fd4']:[])];
  const legOpacity=[...keys.map(()=>1),...(showBands?[0.5,0.3]:[])];
  legKeys.forEach((k,i)=>{
    const lx=pl+i*100;
    if(lx+90>W) return; // skip if out of bounds
    s+=`<rect x="${lx}" y="${H-pb+20}" width="9" height="9" fill="${legColors[i]}" rx="2" opacity="${legOpacity[i]}"/>`;
    s+=`<text x="${lx+13}" y="${H-pb+28}" fill="#a8927a" font-size="10">${k}</text>`;
  });

  return s+'</svg>';
}

function svgPie(data,size=190){
  const S=size,cx=S/2,cy=S/2,R=S*.43,ri=S*.22;
  const total=data.reduce((s,d)=>s+(d.value||0),0)||1;
  let ang=-Math.PI/2,s=`<svg viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${S}px;height:auto;display:block">`;
  data.forEach((d,i)=>{
    const sw=2*Math.PI*(d.value/total);
    const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang);
    const x2=cx+R*Math.cos(ang+sw),y2=cy+R*Math.sin(ang+sw);
    const xi1=cx+ri*Math.cos(ang),yi1=cy+ri*Math.sin(ang);
    const xi2=cx+ri*Math.cos(ang+sw),yi2=cy+ri*Math.sin(ang+sw);
    const lg=sw>Math.PI?1:0;
    s+=`<path d="M${xi1.toFixed(1)},${yi1.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${ri},${ri} 0 ${lg},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z" fill="${PC[i%PC.length]}" opacity=".9"/>`;
    const pv=Math.round(d.value/total*100);
    if(pv>5){const ma=ang+sw/2;s+=`<text x="${(cx+R*.7*Math.cos(ma)).toFixed(1)}" y="${(cy+R*.7*Math.sin(ma)).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="10" font-weight="600">${pv}%</text>`;}
    ang+=sw;
  });
  return s+'</svg>';
}

function doReg(){
  const n=document.getElementById('an')?.value.trim(),e=document.getElementById('ae').value.trim(),p=document.getElementById('ap').value;
  const pin=document.getElementById('apin')?.value.trim();
  const err=document.getElementById('aerr');
  if(!n||!e||!p){err.textContent='Rellena todos los campos';return;}
  if(p.length<6){err.textContent='La contraseña debe tener al menos 6 caracteres';return;}
  if(!pin||!/^\d{4}$/.test(pin)){err.textContent='El PIN debe ser exactamente 4 dígitos numéricos';return;}
  const users=LS.users();
  if(users.find(x=>x.email===e)){err.textContent='Email ya registrado';return;}
  const u={id:Date.now(),email:e,pass:p,pin,name:n,titulares:[{id:'t1',nombre:'Titular principal',tipo:'individual'}],profileAnswers:{},profileScore:0,profileId:'moderado',customCats:JSON.parse(JSON.stringify(DEFAULT_CATS)),bd:{[CUR_YEAR]:{}},inv:[],loans:[],saldo:0,patrimonioReal:{}};
  users.push(u);LS.saveUsers(users);LS.saveSession(u);set({user:u,tab:0});
}
function doRecover(){
  const e=document.getElementById('re').value.trim();
  const pin=document.getElementById('rpin').value.trim();
  const np=document.getElementById('rnp').value;
  const np2=document.getElementById('rnp2').value;
  const err=document.getElementById('aerr');
  if(!e||!pin||!np||!np2){err.textContent='Rellena todos los campos';return;}
  if(np.length<6){err.textContent='La nueva contraseña debe tener al menos 6 caracteres';return;}
  if(np!==np2){err.textContent='Las contraseñas no coinciden';return;}
  if(!/^\d{4}$/.test(pin)){err.textContent='El PIN debe ser 4 dígitos';return;}
  const users=LS.users();
  const idx=users.findIndex(x=>x.email===e);
  if(idx<0){err.textContent='No existe ninguna cuenta con ese email';return;}
  const entry=users[idx];
  if(entry.pin!==pin){err.textContent='PIN incorrecto';return;}
  // Update password
  users[idx].pass=np;
  LS.saveUsers(users);
  // Also update in private storage if exists
  const full=LS.loadUser(entry);
  if(full){full.pass=np;LS.saveUserData(full);}
  // Auto-login
  const updatedFull=LS.loadUser(users[idx])||users[idx];
  LS.saveSession(updatedFull);
  set({user:updatedFull,tab:0});
  ntf('✓ Contraseña cambiada correctamente');
}

// ─── EXPORT TO EXCEL ──────────────────────────────────────────────────────────
function exportExcel(){
  const u=S.user;
  const userCats=getUserCats(u);
  const allItems=getAllItems(u);
  const tits=u.titulares||[];
  function titName(id){const t=tits.find(x=>x.id===id);return t?t.nombre:id||'';}

  // Build CSV content for each sheet, then package into a multi-sheet Excel-compatible file
  // We'll use the SpreadsheetML XML format (opens natively in Excel)
  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const cell=(v,t='String')=>`<Cell><Data ss:Type="${t}">${esc(String(v))}</Data></Cell>`;
  const num=(v)=>`<Cell><Data ss:Type="Number">${isNaN(v)?0:Number(v).toFixed(2)}</Data></Cell>`;
  const bold=(v)=>`<Cell ss:StyleID="bold"><Data ss:Type="String">${esc(String(v))}</Data></Cell>`;
  const head=(...cols)=>`<Row>${cols.map(bold).join('')}</Row>`;

  // Sheet 1 — Presupuesto (all years/months)
  let s1=head('Año','Mes','Categoría','Subcategoría','Presupuestado (€)','Real (€)','Desviación (€)');
  const bd=u.bd||{};
  Object.keys(bd).sort().forEach(y=>{
    Object.keys(bd[y]).sort((a,b)=>+a-+b).forEach(mo=>{
      const md=bd[y][mo]||{cats:{},ingP:0,ingR:0};
      s1+=`<Row>${cell(y)}${cell(MN[mo])}${cell('INGRESOS')}${cell('Total ingresos')}${num(md.ingP)}${num(md.ingR)}${num((md.ingR||0)-(md.ingP||0))}</Row>`;
      userCats.forEach(cat=>{
        cat.items.forEach(it=>{
          const cv=md.cats[it]||{p:0,r:0};
          s1+=`<Row>${cell(y)}${cell(MN[mo])}${cell(cat.cat)}${cell(it)}${num(cv.p)}${num(cv.r)}${num((cv.r||0)-(cv.p||0))}</Row>`;
        });
      });
    });
  });

  // Sheet 2 — Inversiones abiertas
  let s2=head('Nombre','Ticker','Tipo','Titular','Cantidad','P.Compra (€)','P.Actual (€)','Invertido (€)','Valor actual (€)','Ganancia (€)','Rentab. %','Origen','Fecha compra');
  (u.inv||[]).filter(i=>i.abierta!==false).forEach(i=>{
    const iv=i.qty*i.pC,av=i.qty*i.pA,g=av-iv,p=iv?((g/iv)*100):0;
    s2+=`<Row>${cell(i.nombre)}${cell(i.ticker)}${cell(i.tipo)}${cell(titName(i.titularId))}${num(i.qty)}${num(i.pC)}${num(i.pA)}${num(iv)}${num(av)}${num(g)}${num(p)}${cell(i.origen)}${cell(i.fecha)}</Row>`;
  });

  // Sheet 3 — Posiciones cerradas
  let s3=head('Nombre','Ticker','Titular','Cantidad','P.Compra','P.Cierre','Invertido','Cerrado','Ganancia','Rentab. %','Fecha cierre','Nota');
  (u.inv||[]).filter(i=>i.abierta===false).forEach(i=>{
    const iv=i.qty*i.pC,cv=i.qty*(i.pCierre||i.pA),g=cv-iv,p=iv?((g/iv)*100):0;
    s3+=`<Row>${cell(i.nombre)}${cell(i.ticker)}${cell(titName(i.titularId))}${num(i.qty)}${num(i.pC)}${num(i.pCierre||i.pA)}${num(iv)}${num(cv)}${num(g)}${num(p)}${cell(i.fechaCierre||'')}${cell(i.notaCierre||'')}</Row>`;
  });

  // Sheet 4 — Préstamos
  let s4=head('Nombre','Tipo','Titular','Capital orig. (€)','Pendiente (€)','Cuota/mes (€)','Tipo interés %','Inicio','Vencimiento');
  (u.loans||[]).forEach(l=>{
    s4+=`<Row>${cell(l.nombre)}${cell(l.tipoP)}${cell(titName(l.titularId))}${num(l.capital)}${num(l.pendiente)}${num(l.cuota)}${num(l.tipo)}${cell(l.inicio)}${cell(l.fin)}</Row>`;
  });

  // Sheet 5 — Patrimonio mensual
  let s5=head('Año','Mes','Patrimonio Teórico (€)','Patrimonio Real (€)','Desviación (€)','Desviación %');
  const pr=u.patrimonioReal||{};
  const invs=u.inv||[],loans2=u.loans||[];
  const totA=invs.filter(i=>i.abierta!==false).reduce((s,i)=>s+i.qty*i.pA,0);
  const totD=loans2.reduce((s,l)=>s+l.pendiente,0);
  const saldo=u.saldo||0,patriNeto=totA-totD+saldo;
  const prof=getProfile(u.profileId||'moderado');
  const r=prof.retExp/100;
  let ahorroAnual=6000;
  try{const yrs=Object.keys(bd).map(Number);if(yrs.length){const last=Math.max(...yrs),meses=Object.values(bd[last]||{});const sum=meses.reduce((s,m)=>s+(m.ingP||0)-allItems.reduce((ss,it)=>ss+(m.cats[it]?.p||0),0),0);if(sum>200)ahorroAnual=sum;}}catch(e){}
  Object.keys(pr).sort().forEach(y=>{
    Object.keys(pr[y]).sort((a,b)=>+a-+b).forEach(mo=>{
      const real=pr[y][mo];
      const mIdx=(+y-2025)*12+(+mo);
      const theo=mIdx>=0?Math.round(patriNeto*Math.pow(1+r,mIdx/12)+ahorroAnual*((Math.pow(1+r,mIdx/12)-1)/(r||0.001))):patriNeto;
      const dev=real-theo,devP=theo?dev/theo*100:0;
      s5+=`<Row>${cell(y)}${cell(MN[+mo])}${num(theo)}${num(real)}${num(dev)}${num(devP)}</Row>`;
    });
  });

  const styles=`<Styles><Style ss:ID="bold"><Font ss:Bold="1"/></Style></Styles>`;
  const xml=`<?xml version="1.0" encoding="UTF-8"?><?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
${styles}
<Worksheet ss:Name="Presupuesto"><Table>${s1}</Table></Worksheet>
<Worksheet ss:Name="Inversiones Abiertas"><Table>${s2}</Table></Worksheet>
<Worksheet ss:Name="Posiciones Cerradas"><Table>${s3}</Table></Worksheet>
<Worksheet ss:Name="Préstamos"><Table>${s4}</Table></Worksheet>
<Worksheet ss:Name="Patrimonio Mensual"><Table>${s5}</Table></Worksheet>
</Workbook>`;
  const blob=new Blob([xml],{type:'application/vnd.ms-excel;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`FinanzasApp_${u.name.replace(/\s/g,'_')}_${new Date().toISOString().slice(0,10)}.xls`;
  a.click();ntf('Excel exportado — 5 hojas');
}

// ─── TAB PRESUPUESTO ──────────────────────────────────────────────────────────
function tabP(){
  const u=S.user,vm=S.pVM,yr=S.pYr,mo=S.pMo;
  const userCats=getUserCats(u);
  const allItems=getAllItems(u);
  // Years: from 2023 up to CUR_YEAR+10, auto-expanding
  const minYear=2023;
  const maxYear=CUR_YEAR+10;

        const baseW=over&&cv.p>0?Math.round(cv.p/maxVal*100):barW;

          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
            <span style="font-size:12px;color:var(--text2)">${it}</span>
            <div style="display:flex;gap:10px;align-items:center">
              <span style="font-size:11px;color:var(--text2)">Obj: ${fE(cv.p)}</span>
              <span style="font-size:12px;font-weight:700;color:${over?'var(--red)':'var(--green)'}">${fE(cv.r)}</span>
              <span class="${over?'brr':'bgg'}" style="font-size:10px;min-width:36px;text-align:center">${pct100}%</span>
            </div>
          </div>
          <div style="position:relative;height:10px;background:var(--bg3);border-radius:5px;overflow:visible;border:1px solid var(--border)">
            ${over&&cv.p>0?`
              <div style="position:absolute;left:0;top:0;height:100%;width:${baseW}%;background:var(--gold);border-radius:5px 0 0 5px;opacity:.8"></div>
              <div style="position:absolute;left:${baseW}%;top:0;height:100%;width:${overW}%;background:var(--red);border-radius:0 5px 5px 0;opacity:.9"></div>
            `:`<div style="position:absolute;left:0;top:0;height:100%;width:${barW}%;background:${barColor};border-radius:5px;opacity:.8;transition:width .5s"></div>`}
            ${cv.p>0?`<div style="position:absolute;left:${budgetLinePos}%;top:-4px;width:2px;height:18px;background:var(--text);border-radius:1px;z-index:3;opacity:.7" title="Presupuesto: ${fE(cv.p)}"></div>`:''}

          <span class="${catOver?'brr':'bgg'}" style="font-size:10px">${catP?Math.round(catR/catP*100):0}%</span>
        </div>
      </div>`;
    }).join('')}

    <!-- Leyenda -->
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;padding:8px 10px;background:var(--bg3);border-radius:8px;font-size:11px;color:var(--text2)">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:16px;height:6px;background:var(--gold);border-radius:3px;opacity:.8"></div>Gasto dentro del presupuesto</div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:16px;height:6px;background:var(--red);border-radius:3px;opacity:.9"></div>Exceso sobre presupuesto</div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:2px;height:12px;background:var(--text);opacity:.7;border-radius:1px"></div>Límite presupuestado</div>
    </div>
  </div>
  </div>`;
}

// ── Autofill annual budget ────────────────────────────────────────────────────
function openAutofill(){
  const u=S.user,yr=S.pYr;
  const userCats=getUserCats(u);
  const allItems=getAllItems(u);
  // Reference: first filled month of year or defaults
  const ref=u.bd[yr]?.[0]||{cats:{},ingP:5000};
  const body=`
  <div style="font-size:12px;color:var(--text2);margin-bottom:12px">
    Introduce importes <b>anuales</b>. Se repartirán equitativamente entre los 12 meses.<br>
    Puedes aplicar un incremento anual por inflación sobre el año anterior.
  </div>
  <div class="g2" style="margin-bottom:12px">
    <div><label class="lbl">Ingreso anual presupuestado (€)</label><input type="number" id="af-ing" value="${ref.ingP*12}"/></div>
    <div><label class="lbl">Inflación / incremento anual (%)</label><input type="number" id="af-inf" value="2.0" step="0.5"/></div>
  </div>
  <div style="font-weight:600;font-size:13px;margin:10px 0 8px">Gastos anuales por subcategoría</div>
  ${userCats.map(cat=>`
    <div class="cat-head">${cat.cat}</div>
    ${cat.items.map(it=>`<div style="margin-bottom:7px">
      <label class="lbl">${it}</label>
      <input type="number" id="af-${it.replace(/[^a-z0-9]/gi,'_')}" value="${(ref.cats[it]?.p||0)*12}"/>
    </div>`).join('')}`).join('')}
  <div style="margin-top:12px;padding:10px;background:rgba(108,99,255,.1);border-radius:8px;font-size:12px;color:var(--text2)">
    💡 El incremento de inflación se aplica <b>sobre los importes que introduces</b>, ajustándolos mes a mes de forma lineal a lo largo del año.
  </div>`;
  openModal(`⚡ Autorrellenar Presupuesto — ${yr}`,body,'saveAutofill()','Aplicar a todos los meses',true);
}
function saveAutofill(){
  const u2=JSON.parse(JSON.stringify(S.user));
  const yr=S.pYr;
  const allItems=getAllItems(u2);
  const userCats=getUserCats(u2);
  const ingAnual=+document.getElementById('af-ing').value||0;
  const inflPct=+document.getElementById('af-inf').value||0;
  if(!u2.bd[yr])u2.bd[yr]={};
  for(let mo=0;mo<12;mo++){
    const factor=1+inflPct/100*(mo/11); // linear ramp over the year
    const cats={};
    allItems.forEach(it=>{
      const key=it.replace(/[^a-z0-9]/gi,'_');
      const anual=+document.getElementById(`af-${key}`)?.value||0;
      const monthly=Math.round(anual/12*factor);
      // preserve real values if month already has data
      const existing=u2.bd[yr][mo]?.cats[it];
      cats[it]={p:monthly, r:existing?.r||0};
    });
    const existingMo=u2.bd[yr][mo]||{};
    u2.bd[yr][mo]={cats,ingP:Math.round(ingAnual/12*factor),ingR:existingMo.ingR||0};
  }
  persist(u2);closeModal();set({user:u2});ntf(`Presupuesto ${yr} rellenado para los 12 meses`);
}

function _refreshCatModal(){
  const list=document.getElementById('cat-list');

  const userCats=window._editCats;
  list.innerHTML=userCats.map((cat,ci)=>`

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <input value="${cat.cat}" id="cn-${ci}" style="font-weight:700;font-size:13px;background:transparent;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:2px 4px;width:auto;flex:1" onchange="renameCat(${ci},this.value)"/>
        <button class="bd" onclick="delCat(${ci})" style="padding:2px 7px;font-size:11px;margin-left:8px">✕ Cat.</button>

          <input value="${it}" id="in-${ci}-${ii}" style="flex:1;background:transparent;border:none;font-size:12px;color:var(--text2);padding:1px 4px" onchange="renameItem(${ci},${ii},this.value)"/>
          <button class="bd" onclick="delItem(${ci},${ii})" style="padding:2px 5px;font-size:10px;margin-left:6px">✕</button>
        </div>`).join('')}

}
function renameCat(ci,val){window._editCats[ci].cat=val;_saveCats();}
function renameItem(ci,ii,val){window._editCats[ci].items[ii]=val;_saveCats();}
function delCat(ci){window._editCats.splice(ci,1);_saveCats();_refreshCatModal();}
function delItem(ci,ii){window._editCats[ci].items.splice(ii,1);_saveCats();_refreshCatModal();}
function addItem(ci){

// ─── ASSET CLASS NORMALISER ───────────────────────────────────────────────────
const ASSET_CLASS_MAP = {
  'ETF':'ETF','Fondo':'Fondo','Acción':'Acción',
  'Inmueble':'Inmueble','Private Equity':'Private Equity',
  'Cripto':'Cripto','Bono':'Bono','Plan Pensiones':'Fondo',
  'Otro':'Otro'
};
const ASSET_CLASS_COLORS = {
  'ETF':'#5b9bd5','Fondo':'#a07fd4','Acción':'#d28a3f',
  'Inmueble':'#4caf7d','Private Equity':'#c03c3b',
  'Cripto':'#e8a84a','Bono':'#6bbfa0','Otro':'#a8927a'
};
const ASSET_CLASS_ICONS = {
  'ETF':'📊','Fondo':'🏛️','Acción':'📈',
  'Inmueble':'🏠','Private Equity':'🔒',
  'Cripto':'₿','Bono':'📄','Otro':'📦'
};
function normClass(tipo){return ASSET_CLASS_MAP[tipo]||'Otro';}

// ─── PIE with custom colors ────────────────────────────────────────────────────
function svgPieColored(data, colorMap, size=185){
  const S=size,cx=S/2,cy=S/2,R=S*.43,ri=S*.22;
  const total=data.reduce((s,d)=>s+(d.value||0),0)||1;
  let ang=-Math.PI/2;
  let s=`<svg viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${S}px;height:auto;display:block">`;
  data.forEach((d,i)=>{
    const sw=2*Math.PI*(d.value/total);
    const col=colorMap&&colorMap[d.name]?colorMap[d.name]:PC[i%PC.length];
    const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang);
    const x2=cx+R*Math.cos(ang+sw),y2=cy+R*Math.sin(ang+sw);
    const xi1=cx+ri*Math.cos(ang),yi1=cy+ri*Math.sin(ang);
    const xi2=cx+ri*Math.cos(ang+sw),yi2=cy+ri*Math.sin(ang+sw);
    const lg=sw>Math.PI?1:0;
    s+=`<path d="M${xi1.toFixed(1)},${yi1.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${ri},${ri} 0 ${lg},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z" fill="${col}" opacity=".9"/>`;
    const pv=Math.round(d.value/total*100);
    if(pv>5){const ma=ang+sw/2;s+=`<text x="${(cx+R*.7*Math.cos(ma)).toFixed(1)}" y="${(cy+R*.7*Math.sin(ma)).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="10" font-weight="700">${pv}%</text>`;}
    ang+=sw;
  });
  return s+'</svg>';
}

function buildDistributions(positions, tits, byTit){
  if(!positions.length) return '<div class="card" style="margin-bottom:13px;text-align:center;color:var(--text2);padding:24px">Sin posiciones para mostrar con los filtros actuales.</div>';
  const total=positions.reduce((s,i)=>s+i.qty*(i.pA||0),0)||1;

  // ── By asset class ──
  const byClass={};
  positions.forEach(i=>{
    const cl=normClass(i.tipo);
    if(!byClass[cl])byClass[cl]={val:0,cost:0,count:0};
    byClass[cl].val+=i.qty*(i.pA||0);
    byClass[cl].cost+=i.qty*(i.pC||0);
    byClass[cl].count++;
  });
  const classPie=Object.entries(byClass).map(([k,v])=>({name:k,value:Math.round(v.val)})).sort((a,b)=>b.value-a.value);

  // ── By entity ──
  const byEnt={};
  positions.forEach(i=>{
    const ent=i.entidad||'Sin entidad';
    if(!byEnt[ent])byEnt[ent]={val:0,cost:0,count:0};
    byEnt[ent].val+=i.qty*(i.pA||0);
    byEnt[ent].cost+=i.qty*(i.pC||0);
    byEnt[ent].count++;
  });
  const entPie=Object.entries(byEnt).map(([k,v])=>({name:k,value:Math.round(v.val)})).sort((a,b)=>b.value-a.value);
  const entColors=['#d28a3f','#5b9bd5','#4caf7d','#c03c3b','#a07fd4','#e8a84a','#6bbfa0','#a8927a','#c0a87a'];
  const entColorMap={};
  entPie.forEach((d,i)=>entColorMap[d.name]=entColors[i%entColors.length]);

  // ── By titular ──
  const titPie=tits.map((t,i)=>({name:t.nombre,value:Math.round(byTit[t.id]?.a||0),color:PC[i%PC.length]})).filter(d=>d.value>0);
  const titColorMap={};titPie.forEach(d=>titColorMap[d.name]=d.color);

  function distLegend(data,colorMap){
    const tot=data.reduce((s,d)=>s+d.value,0)||1;
    return data.map((d,i)=>{
      const col=colorMap&&colorMap[d.name]?colorMap[d.name]:PC[i%PC.length];
      const pctV=Math.round(d.value/tot*100);
      return `<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px">
        <div style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0"></div>
        <span style="flex:1;font-size:12px;color:var(--text)">${escH(d.name)}</span>
        <div style="text-align:right">
          <span style="font-size:11px;color:var(--text2);margin-right:6px">${pctV}%</span>
          <span style="font-size:12px;font-weight:600">${fE(d.value)}</span>
        </div>
      </div>`;
    }).join('');
  }

  function barBreakdown(entries, colorMap){
    const tot=entries.reduce((s,[,v])=>s+v.val,0)||1;
    return entries.map(([k,v])=>{
      const col=colorMap&&colorMap[k]?colorMap[k]:'#888';
      const g=v.val-v.cost;
      const pctV=Math.round(v.val/tot*100);
      return `<div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
          <span style="color:var(--text2)">${ASSET_CLASS_ICONS[k]||''} ${k} <span style="opacity:.6">(${v.count})</span></span>
          <span style="color:${g>=0?'var(--green)':'var(--red)'};">${g>=0?'+':''}${fE(g)}</span>
        </div>
        <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;border:1px solid var(--border)">
          <div style="width:${pctV}%;height:100%;background:${col};border-radius:3px;opacity:.85"></div>
        </div>
      </div>`;
    }).join('');
  }

  return `
  <div class="g3" style="margin-bottom:13px">
    <!-- Clase de activo -->
    <div class="card">
      <div style="font-weight:700;font-size:13px;margin-bottom:12px;color:var(--gold)">📂 Clase de Activo</div>
      ${svgPieColored(classPie,ASSET_CLASS_COLORS,170)}
      <div style="margin-top:12px">${distLegend(classPie,ASSET_CLASS_COLORS)}</div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
        ${barBreakdown(Object.entries(byClass).sort((a,b)=>b[1].val-a[1].val),ASSET_CLASS_COLORS)}
      </div>
    </div>

    <!-- Entidad -->
    <div class="card">
      <div style="font-weight:700;font-size:13px;margin-bottom:12px;color:var(--gold)">🏦 Distribución por Entidad</div>
      ${svgPieColored(entPie,entColorMap,170)}
      <div style="margin-top:12px">${distLegend(entPie,entColorMap)}</div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
        ${Object.entries(byEnt).sort((a,b)=>b[1].val-a[1].val).map(([k,v])=>{
          const col=entColorMap[k]||'#888';
          const pctV=Math.round(v.val/total*100);
          const g=v.val-v.cost;
          return `<div style="margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
              <span style="color:var(--text2)">${escH(k)} <span style="opacity:.6">(${v.count} pos.)</span></span>
              <span style="color:${g>=0?'var(--green)':'var(--red)'};">${g>=0?'+':''}${fE(g)}</span>
            </div>
            <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;border:1px solid var(--border)">
              <div style="width:${pctV}%;height:100%;background:${col};border-radius:3px;opacity:.85"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Titular -->
    <div class="card">
      <div style="font-weight:700;font-size:13px;margin-bottom:12px;color:var(--gold)">👤 Distribución por Titular</div>
      ${svgPieColored(titPie,titColorMap,170)}
      <div style="margin-top:12px">
        ${tits.map((t,i)=>{
          const d=byTit[t.id]||{i:0,a:0};
          const g=d.a-d.i;
          const pctV=Math.round(d.a/total*100);
          const col=PC[i%PC.length];
          return `<div style="margin-bottom:9px;padding-bottom:9px;border-bottom:${i<tits.length-1?'1px solid var(--border)':'none'}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <div style="display:flex;align-items:center;gap:7px">
                <div style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0"></div>
                <span style="font-weight:600;font-size:12px">${t.nombre}</span>
                ${t.tipo==='compartido'?'<span class="byy" style="font-size:10px;padding:1px 5px">comp.</span>':''}
              </div>
              <span style="font-size:12px;font-weight:700;color:${g>=0?'var(--green)':'var(--red)'}">${fP(pct(d.a,d.i))}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px">
              <span>${fE(d.a)}</span>
              <span style="color:${g>=0?'var(--green)':'var(--red)'}">${g>=0?'+':''}${fE(g)}</span>
            </div>
            <div style="height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;border:1px solid var(--border)">
              <div style="width:${pctV}%;height:100%;background:${col};border-radius:3px;opacity:.8"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

      <span style="font-weight:700">${sinProyecto.length} pos. · ${fE(valSin)}</span>
    </div>`:''}`;
  }

  // Build header (no nested backticks for compatibility)
  const projBtn = iView==='proyectos' ? '<button class="ba" onclick="openAddProject()" style="font-size:12px;padding:6px 10px">+ Proyecto</button>' : '';
  const projFilterBanner = (iView==='cartera' && projFilt)
    ? '<div style="background:rgba(210,138,63,.1);border:1px solid rgba(210,138,63,.3);border-radius:9px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;font-size:12px"><span>🎯 Mostrando: <b style="color:var(--gold)">'+(projFilt==='sin_proyecto'?'Sin proyecto asignado':projName(projFilt))+'</b></span><button class="bo" onclick="set({iProjFilter:null})" style="font-size:11px;padding:3px 8px">✕ Ver todo</button></div>'
    : '';
  const proyectosView = iView==='proyectos'
    ? '<div style="margin-bottom:8px"></div>' + renderProjects()
    : '';

  const _c1 = (iView==='cartera') ? 'tglb on' : 'tglb';
  const _c2 = (iView==='proyectos') ? 'tglb on' : 'tglb';
  const _parts = [
    '<div class="sec"><div class="sech">',
    '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><div class="sect">📈 Inversiones</div>',
    '<div class="tgl">',
    '<button class="'+_c1+'" onclick="set({iView:\x27cartera\x27})">Cartera</button>',
    '<button class="'+_c2+'" onclick="set({iView:\x27proyectos\x27})">🎯 Proyectos</button>',
    '</div></div><div class="row">',
    '<button class="bo" onclick="openTits()" style="font-size:12px;padding:6px 10px">👥 Titulares</button>',
    projBtn,
    '<button class="bo" onclick="openAddLoan()" style="font-size:12px;padding:6px 10px">🏦 + Préstamo</button>',
    '<button class="bs" onclick="openCashDeposit()" style="font-size:12px;padding:6px 10px">💵 + Cash</button>',
    '<button id="refresh-prices-btn" class="bo" onclick="refreshAllPrices()" style="font-size:12px;padding:6px 10px">🔄 Precios</button>',
    '<button class="ba" onclick="openAddInv()" style="font-size:12px;padding:6px 10px">+ Inversión</button>',
    '</div></div>',
    proyectosView,
    (iView==='cartera') ? (projFilterBanner + buildCarteraView()) : '',
    '</div>'
  ];
  return _parts.join('');
}


function buildCarteraView(){
  const u=S.user,filt=S.iFilter||[],iView=S.iView||'cartera',projFilt=S.iProjFilter||null;
  const invs=u.inv||[],loans=u.loans||[],tits=u.titulares||[];
  function titName(id){const t=tits.find(x=>x.id===id);return t?t.nombre:id;}
  const abiertas=invs.filter(i=>i.abierta!==false);
  const cerradas=invs.filter(i=>i.abierta===false);
  const entFilt=S.iEntFilter||[];
  const fl=abiertas
    .filter(i=>filt.length===0||filt.includes(i.titularId))
    .filter(i=>(S.iClassFilter||[]).length===0||(S.iClassFilter||[]).includes(normClass(i.tipo)))
    .filter(i=>entFilt.length===0||entFilt.includes(i.entidad||'Sin entidad'))
    .filter(i=>projFilt===null||(projFilt==='sin_proyecto'?!i.projectId:i.projectId===projFilt));
  const totI=fl.reduce((s,i)=>s+i.qty*i.pC,0);
  const totA=fl.reduce((s,i)=>s+i.qty*i.pA,0);
  const gan=totA-totI,pgn=pct(totA,totI);
  const tir=totI>0?(Math.pow(totA/totI,1/3)-1)*100:0;
  const totD=loans.reduce((s,l)=>s+l.pendiente,0);
  const byTit={};
  tits.forEach(t=>{const ti=abiertas.filter(i=>i.titularId===t.id);byTit[t.id]={nombre:t.nombre,tipo:t.tipo,i:ti.reduce((s,i)=>s+i.qty*i.pC,0),a:ti.reduce((s,i)=>s+i.qty*i.pA,0)};});
  const entidades=[...new Set(abiertas.map(i=>i.entidad||'Sin entidad'))].sort();
  const mesesTranscurridos=l=>l.inicio?Math.max(0,Math.round((Date.now()-new Date(l.inicio))/(30.44*24*3600*1000))):0;
  return `
  <!-- Saldo líquido banner -->
  <div style="background:linear-gradient(135deg,rgba(210,138,63,.12),rgba(192,60,59,.08));border:1px solid rgba(210,138,63,.3);border-radius:12px;padding:12px 16px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:11px;color:var(--text2)">Saldo líquido disponible</div>
      <div style="font-size:24px;font-weight:800;color:var(--green)">${fE(u.saldo||0)}</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:11px;color:var(--text2)">Capital total en cartera</div>
      <div style="font-size:16px;font-weight:700;color:var(--blue)">${fE(totA)}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">Patrimonio neto financiero: <b style="color:var(--text)">${fE((u.saldo||0)+totA-totD)}</b></div>
    </div>
  </div>
  <div class="g4" style="margin-bottom:13px">
    <div class="card"><div class="kv">Capital Invertido</div><div class="kn fb">${fE(totI)}</div></div>
    <div class="card"><div class="kv">Valor Actual</div><div class="kn fg">${fE(totA)}</div></div>
    <div class="card"><div class="kv">Ganancia / Pérdida</div><div class="kn" style="color:${gan>=0?'var(--green)':'var(--red)'};font-size:18px">${fE(gan)} <span style="font-size:12px">(${fP(pgn)})</span></div></div>
    <div class="card"><div class="kv">TIR estimada (3a)</div><div class="kn fp">${fP(tir)}</div></div>
  </div>

  <!-- ── Filtros ── -->
  <div class="card" style="margin-bottom:13px;padding:14px 16px">
    <div style="font-weight:700;font-size:12px;color:var(--gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">🔍 Filtrar visualización</div>
    <div class="g3 filter-grid" style="gap:16px">
      <div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:7px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">👤 Titular</div>
        <div class="chips">
          <div class="chip ${filt.length===0?'on':''}" onclick="set({iFilter:[]})">Todos</div>
          ${tits.map(t=>`<div class="chip ${filt.includes(t.id)?'on':''}" onclick="toggleTF('${t.id}')" style="${filt.includes(t.id)?'border-color:var(--gold);color:var(--gold);background:rgba(210,138,63,.15)':''}">
            ${t.nombre}${t.tipo==='compartido'?' <span style="font-size:9px;opacity:.7">comp.</span>':''}
          </div>`).join('')}
        </div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:7px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">📂 Clase de activo</div>
        <div class="chips">
          <div class="chip ${(S.iClassFilter||[]).length===0?'on':''}" onclick="set({iClassFilter:[]})">Todas</div>
          ${Object.entries(ASSET_CLASS_COLORS).map(([cl,col])=>`<div class="chip ${(S.iClassFilter||[]).includes(cl)?'on':''}"
            onclick="toggleCF('${cl}')"
            style="${(S.iClassFilter||[]).includes(cl)?`border-color:${col};color:${col};background:${col}22`:''}">
            ${ASSET_CLASS_ICONS[cl]||''} ${cl}
          </div>`).join('')}
        </div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:7px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">🏦 Entidad</div>
        <div class="chips">
          <div class="chip ${entFilt.length===0?'on':''}" onclick="set({iEntFilter:[]})">Todas</div>
          ${entidades.map((ent,i)=>`<div class="chip ${entFilt.includes(ent)?'on':''}"
            onclick="toggleEF('${ent.replace(/'/g,"\\'")}')"
            style="${entFilt.includes(ent)?'border-color:var(--accent);color:var(--accent);background:rgba(192,60,59,.15)':''}">
            ${escH(ent)}
          </div>`).join('')}
        </div>
      </div>
    </div>
    ${(filt.length>0||( S.iClassFilter||[]).length>0||entFilt.length>0)?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--text2)">
      Mostrando <b style="color:var(--text)">${fl.length}</b> de <b style="color:var(--text)">${abiertas.length}</b> posiciones abiertas
      <button class="bo" onclick="set({iFilter:[],iClassFilter:[],iEntFilter:[]})" style="font-size:11px;padding:3px 8px;margin-left:8px">✕ Limpiar filtros</button>
    </div>`:''}
  </div>

  <!-- ── Distribuciones (colapsable para no ralentizar) ── -->
  <div class="card" style="margin-bottom:13px;padding:12px 16px">
    <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none" onclick="set({iShowDist:!S.iShowDist})">
      <div style="font-weight:700;font-size:13px;color:var(--gold)">📊 Distribuciones de cartera</div>
      <span style="color:var(--text2);font-size:16px;transition:transform .2s;display:inline-block;transform:rotate(${S.iShowDist?'180deg':'0deg'})">${S.iShowDist?'▲':'▼'}</span>
    </div>
    ${S.iShowDist?`<div style="margin-top:12px">${buildDistributions(fl,tits,byTit)}</div>`
      :`<div style="font-size:12px;color:var(--text2);margin-top:8px">Pulsa para ver distribución por clase de activo, entidad y titular.</div>`}
  </div>

  <!-- Posiciones abiertas -->
  <div class="card" style="margin-bottom:13px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">
      <div style="font-weight:700;font-size:13px">Posiciones Abiertas (${fl.length})</div>
    </div>
    <div class="ov"><table>
      <thead><tr><th>Activo</th><th>Clase</th><th>Entidad</th><th>Titular</th><th>Qty</th><th>P.Compra</th><th>P.Actual</th><th>Invertido</th><th>Actual</th><th>Gan/Pérd</th><th>%</th><th>Origen</th><th></th></tr></thead>
      <tbody>
        ${fl.map(v=>{const iv=v.qty*v.pC,av=v.qty*v.pA,g=av-iv,p=pct(av,iv);const cls=normClass(v.tipo);return `<tr>
          <td><div style="font-weight:600">${v.nombre}</div><div style="font-size:10px;color:var(--text2)">${v.ticker}</div>${projBadge(v.projectId)}</td>
          <td><span style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;background:${ASSET_CLASS_COLORS[cls]||'#888'}22;color:${ASSET_CLASS_COLORS[cls]||'#888'}">${ASSET_CLASS_ICONS[cls]||''} ${cls}</span></td>
          <td style="font-size:12px;color:var(--text2)">${escH(v.entidad||'—')}</td>
          <td style="font-size:12px">${titName(v.titularId)}</td><td>${v.qty}</td>
          <td>${f2(v.pC)}€</td>
          <td>
            <div style="display:flex;flex-direction:column;gap:1px">
              <input type="number" value="${v.pA}" onchange="updatePrecio(${v.id},+this.value)" style="width:75px;padding:4px 6px;font-size:12px"/>
              ${v.pAFecha?`<span style="font-size:9px;color:var(--text2);text-align:right">${v.pAFecha}</span>`:''}
            </div>
          </td>
          <td>${fE(iv)}</td><td style="font-weight:600">${fE(av)}</td>
          <td style="font-weight:700;color:${g>=0?'var(--green)':'var(--red)'}">${g>=0?'+':''}${fE(g)}</td>
          <td><span class="badge ${p>=0?'bgg':'brr'}">${fP(p)}</span></td>
          <td><span class="badge ${v.origen==='externo'?'bpp':'byy'}">${v.origen==='externo'?'Ext.':'Saldo'}</span></td>
          <td style="display:flex;gap:4px">
            <button class="bo" onclick="editInv(${v.id})" style="padding:2px 6px;font-size:11px" title="Editar">✏️</button>
            <button class="bd" onclick="cerrarPos(${v.id})" style="padding:2px 6px;font-size:11px" title="Cerrar posición">🔒</button>
            <button class="bd" onclick="delInv(${v.id})" style="padding:2px 6px;font-size:11px" title="Eliminar">✕</button>
          </td>
        </tr>`;}).join('')}
      </tbody>
    </table></div>
  </div>

  <!-- ── Rentabilidad & TIR ── -->
  ${renderPnL(u,fl,cerradas,filt)}

  <!-- Posiciones cerradas -->
  <div class="card" style="margin-bottom:13px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${showClosed?'11px':'0'}">
      <div style="font-weight:700;font-size:13px">Posiciones Cerradas (${cerradas.length})</div>
      <button class="bo ${showClosed?'on':''}" onclick="set({iShowClosed:${!showClosed}})" style="font-size:12px;padding:5px 9px">${showClosed?'Ocultar':'Ver'}</button>
    </div>
    ${showClosed?`<div class="ov"><table>
      <thead><tr><th>Activo</th><th>Titular</th><th>P.Compra</th><th>P.Cierre</th><th>Qty</th><th>Invertido</th><th>Cerrado</th><th>Gan/Pérd</th><th>%</th><th>Fecha cierre</th><th>Nota</th><th></th></tr></thead>
      <tbody>
        ${cerradas.map(v=>{const iv=v.qty*v.pC,cv2=v.qty*(v.pCierre||v.pA),g=cv2-iv,p=pct(cv2,iv);return `<tr>
          <td><div style="font-weight:600">${v.nombre}</div><div style="font-size:10px;color:var(--text2)">${v.ticker}</div></td>
          <td>${titName(v.titularId)}</td>
          <td>${f2(v.pC)}€</td><td>${f2(v.pCierre||v.pA)}€</td><td>${v.qty}</td>
          <td>${fE(iv)}</td><td style="font-weight:600">${fE(cv2)}</td>
          <td style="font-weight:700;color:${g>=0?'var(--green)':'var(--red)'}">${g>=0?'+':''}${fE(g)}</td>
          <td><span class="badge ${p>=0?'bgg':'brr'}">${fP(p)}</span></td>
          <td style="font-size:11px;color:var(--text2)">${v.fechaCierre||''}</td>
          <td style="font-size:11px;color:var(--text2)">${v.notaCierre||''}</td>
          <td><button class="bo" onclick="editInv(${v.id})" style="padding:2px 6px;font-size:11px">✏️</button></td>
        </tr>`;}).join('')}
      </tbody>
    </table></div>`:''}
  </div>

  <!-- Préstamos -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;flex-wrap:wrap;gap:8px">
      <div style="font-weight:700;font-size:13px">🏦 Préstamos <span style="color:var(--red)">— Deuda total: ${fE(totD)}</span></div>
      <div style="display:flex;gap:5px">
        <button class="bs" onclick="amortizeAllLoans()" style="font-size:12px;padding:5px 9px" title="Actualizar todos los préstamos según amortización desde fecha inicio">↻ Actualizar todos</button>
        <button class="bo" onclick="openAddLoan()" style="font-size:12px;padding:5px 9px">+ Préstamo</button>
      </div>
    </div>
    <div class="ov"><table>
      <thead><tr><th>Nombre</th><th>Titular</th><th>Capital orig.</th><th>Pendiente</th><th>Cuota/mes</th><th>Tipo %</th><th>Plazo rest.</th><th>Vencimiento</th><th></th></tr></thead>
      <tbody>
        ${loans.map(l=>{
          // Calculate months elapsed since inicio to auto-derive current pending
          const mesesTranscurridos=l.inicio?Math.max(0,Math.round((Date.now()-new Date(l.inicio))/(30.44*24*3600*1000))):0;
          const pendienteCalc=loanPrincipalAtYearMonths(l,mesesTranscurridos);
          // Show both stored and calculated if they differ significantly
          const diffPct=l.pendiente&&pendienteCalc?Math.abs(pendienteCalc-l.pendiente)/l.pendiente:0;
          return `<tr>
            <td>
              <div style="font-weight:600">${escH(l.nombre)}</div>
              <span class="badge byy">${l.tipoP}</span>
            </td>
            <td style="font-size:12px">${titName(l.titularId)}</td>
            <td>${fE(l.capital)}</td>
            <td>
              <div style="font-weight:700;color:var(--red)">${fE(l.pendiente)}</div>
              ${diffPct>0.02?`<div style="font-size:10px;color:var(--text2)">Calc: ${fE(pendienteCalc)}</div>`:''}
            </td>
            <td style="font-weight:600;color:var(--yellow)">${f2(l.cuota)} €</td>
            <td>${l.tipo}%</td>
            <td style="font-size:11px;color:var(--text2)">${l.plazoMeses?Math.max(0,Math.round((l.plazoMeses-mesesTranscurridos)/12*10)/10)+' a':'—'}</td>
            <td style="font-size:11px">${l.fin||'—'}</td>
            <td style="white-space:nowrap">
              <button class="bo" onclick="editLoan(${l.id})" style="padding:2px 6px;font-size:11px" title="Editar préstamo">✏️</button>
              <button class="bs" onclick="amortizeLoan(${l.id})" style="padding:2px 6px;font-size:11px;margin-left:3px" title="Actualizar pendiente según amortización">↻</button>
              <button class="bd" onclick="delLoan(${l.id})" style="padding:2px 6px;font-size:11px;margin-left:3px">✕</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
    ${loans.length?`<div style="font-size:11px;color:var(--text2);margin-top:8px;padding:7px 10px;background:var(--bg3);border-radius:7px">
      ↻ Actualiza el capital pendiente según la amortización calculada desde la fecha de inicio · ✏️ Edita cualquier dato del préstamo
    </div>`:''}
  </div>
`;
}

// Calcular capital pendiente dado n meses desde la fecha de inicio (sistema francés)
function loanPrincipalAtYearMonths(loan, meses){
  const p0=loan.pendiente||0;
  if(meses<=0) return p0;
  const ri=(loan.tipo||0)/100/12;
  const cuota=loan.cuota||0;
  const plazo=loan.plazoMeses||Math.max(1,Math.round(p0/Math.max(cuota,1)));
  if(meses>=plazo) return 0;
  if(ri<0.0001) return Math.max(0,p0-cuota*meses);
  const rem=p0*Math.pow(1+ri,meses)-cuota*(Math.pow(1+ri,meses)-1)/ri;
  return Math.max(0,Math.round(rem));
}

// Actualizar el pendiente automáticamente según la amortización desde inicio
function amortizeLoan(id){
  const u2=JSON.parse(JSON.stringify(S.user));
  const loan=u2.loans.find(l=>l.id===id);
  if(!loan){ntf('Préstamo no encontrado');return;}
  if(!loan.inicio){ntf('El préstamo no tiene fecha de inicio. Edítalo primero.');return;}
  const mesesTranscurridos=Math.max(0,Math.round((Date.now()-new Date(loan.inicio))/(30.44*24*3600*1000)));
  const nuevoPendiente=loanPrincipalAtYearMonths(loan,mesesTranscurridos);
  const anterior=loan.pendiente;
  loan.pendiente=nuevoPendiente;
  persist(u2);set({user:u2});
  ntf(`Pendiente actualizado: ${fE(anterior)} → ${fE(nuevoPendiente)} (${mesesTranscurridos} meses amortizados)`);
}

function amortizeAllLoans(){
  const u2=JSON.parse(JSON.stringify(S.user));
  let updated=0, total=0;
  u2.loans.forEach(loan=>{
    if(!loan.inicio) return;
    const mesesTranscurridos=Math.max(0,Math.round((Date.now()-new Date(loan.inicio))/(30.44*24*3600*1000)));

}

// ─── P&L and TIR analytics ────────────────────────────────────────────────────
// Newton-Raphson IRR on irregular cash flows [{t: Date, cf: number}]
function calcIRR(flows){
  if(!flows||flows.length<2) return null;
  // Normalise to years from first date
  const t0=flows[0].t;
  const yf=flows.map(f=>({y:(f.t-t0)/(365.25*24*3600*1000),cf:f.cf}));
  let r=0.1;
  for(let i=0;i<200;i++){
    let npv=0,dnpv=0;
    yf.forEach(({y,cf})=>{
      const d=Math.pow(1+r,y);
      npv+=cf/d;
      dnpv-=y*cf/Math.pow(1+r,y+1);
    });
    if(Math.abs(dnpv)<1e-12) break;
    const nr=r-npv/dnpv;
    if(Math.abs(nr-r)<1e-9){r=nr;break;}
    r=nr;
  }
  return isFinite(r)?r*100:null;
}

function renderPnL(u, openPositions, closedPositions, filter){
  const cf=u.cashFlow||[];
  const titulares=u.titulares||[];
  function titName(id){const t=titulares.find(x=>x.id===id);return t?t.nombre:id;}
  const today=new Date();

  // Cash In = deposits + external capital buys
  const cashInDeposits=cf.filter(e=>e.tipo==='deposito').reduce((s,e)=>s+(e.importe||0),0);
  const cashInBuys=[...openPositions,...closedPositions].filter(i=>i.origen==='externo').reduce((s,i)=>s+i.qty*(i.pC||0),0);
  const totalCashIn=cashInDeposits+cashInBuys;
  // Cash Out = sells destino='fuera'
  const totalCashOut=cf.filter(e=>e.tipo==='venta'&&e.destino==='fuera').reduce((s,e)=>s+(e.proceeds||0),0);
  // Current value = market value + liquid balance
  const marketValue=openPositions.reduce((s,i)=>s+i.qty*(i.pA||0),0);
  const liquidBalance=u.saldo||0;
  const totalCurrentValue=marketValue+liquidBalance;
  // Ganancia realizada
  const realEvents=cf.filter(e=>e.tipo==='venta');
  const realGain=realEvents.reduce((s,e)=>s+(e.ganancia||0),0);
  const realCost=realEvents.reduce((s,e)=>s+(e.coste||0),0);
  // Ganancia no realizada
  const unrealCost=openPositions.reduce((s,i)=>s+i.qty*(i.pC||0),0);
  const unrealVal=marketValue;
  const unrealGain=unrealVal-unrealCost;
  const unrealPct=unrealCost?unrealGain/unrealCost*100:0;
  // TIR from real cash flows
  const tirFlows=[];
  cf.filter(e=>e.tipo==='deposito'&&e.fecha).forEach(e=>tirFlows.push({t:new Date(e.fecha),cf:-(e.importe||0)}));
  [...openPositions,...closedPositions].filter(i=>i.origen==='externo'&&i.fecha).forEach(i=>tirFlows.push({t:new Date(i.fecha),cf:-(i.qty*(i.pC||0))}));
  cf.filter(e=>e.tipo==='venta'&&e.destino==='fuera'&&e.fecha).forEach(e=>tirFlows.push({t:new Date(e.fecha),cf:+(e.proceeds||0)}));
  if(totalCurrentValue>0) tirFlows.push({t:today,cf:totalCurrentValue});
  tirFlows.sort((a,b)=>a.t-b.t);
  const tirVal=tirFlows.length>=2?calcIRR(tirFlows):null;
  // TIR per open position
  const posIRR=openPositions.map(i=>{
    const flows2=[{t:i.fecha?new Date(i.fecha):today,cf:-(i.qty*(i.pC||0))},{t:today,cf:i.qty*(i.pA||0)}];
    return {...i,irr:calcIRR(flows2)};
  });
  const cfRows=[...cf].reverse().slice(0,12);

  return `<div class="card" style="margin-bottom:13px">
  <div style="font-weight:700;font-size:14px;margin-bottom:14px;color:var(--gold)">📊 Rentabilidad Real &amp; Flujos</div>
  <div class="g3" style="margin-bottom:14px">
    <div style="background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.2);border-radius:10px;padding:12px">
      <div style="font-size:10px;color:var(--text2);margin-bottom:3px;text-transform:uppercase">💰 Cash In total</div>
      <div style="font-size:17px;font-weight:700;color:var(--red)">−${fE(totalCashIn)}</div>
      <div style="font-size:10px;color:var(--text2);margin-top:2px">Depósitos + compras externas</div>
    </div>
    <div style="background:rgba(91,155,213,.1);border:1px solid rgba(91,155,213,.2);border-radius:10px;padding:12px">
      <div style="font-size:10px;color:var(--text2);margin-bottom:3px;text-transform:uppercase">🏦 Valor actual</div>
      <div style="font-size:17px;font-weight:700;color:var(--blue)">${fE(totalCurrentValue)}</div>
      <div style="font-size:10px;color:var(--text2);margin-top:2px">Cartera ${fE(marketValue)} + saldo ${fE(liquidBalance)}</div>
    </div>
    <div style="background:rgba(76,175,125,.1);border:1px solid rgba(76,175,125,.2);border-radius:10px;padding:12px">
      <div style="font-size:10px;color:var(--text2);margin-bottom:3px;text-transform:uppercase">📤 Cash Out total</div>
      <div style="font-size:17px;font-weight:700;color:var(--green)">+${fE(totalCashOut)}</div>
      <div style="font-size:10px;color:var(--text2);margin-top:2px">Retiradas del balance</div>
    </div>
  </div>
  <div class="g4" style="margin-bottom:14px">
    <div style="background:var(--bg3);border-radius:10px;padding:11px">
      <div style="font-size:10px;color:var(--text2);margin-bottom:2px">G. No Realizada</div>
      <div style="font-size:17px;font-weight:700;color:${unrealGain>=0?'var(--green)':'var(--red)'}">${unrealGain>=0?'+':''}${fE(unrealGain)}</div>
      <div style="font-size:10px;color:var(--text2)">${fP(unrealPct)}</div>
    </div>
    <div style="background:var(--bg3);border-radius:10px;padding:11px">
      <div style="font-size:10px;color:var(--text2);margin-bottom:2px">G. Realizada</div>
      <div style="font-size:17px;font-weight:700;color:${realGain>=0?'var(--green)':'var(--red)'}">${realGain>=0?'+':''}${fE(realGain)}</div>
      <div style="font-size:10px;color:var(--text2)">${realCost?fP(realGain/realCost*100):'—'}</div>
    </div>
    <div style="background:var(--bg3);border-radius:10px;padding:11px">
      <div style="font-size:10px;color:var(--text2);margin-bottom:2px">TIR Cartera</div>

    </div>
    <div style="background:var(--bg3);border-radius:10px;padding:11px">
      <div style="font-size:10px;color:var(--text2);margin-bottom:2px">G. Total</div>

    ?'Los fondos de la venta se añaden al saldo disponible para reinvertir o retirar más adelante.'

function saveCierre(id){
  const u2=JSON.parse(JSON.stringify(S.user));
  const inv=u2.inv.find(i=>i.id===id);if(!inv)return;
  const pCierre=+document.getElementById('pc-precio').value||inv.pA;
  const fecha=document.getElementById('pc-fecha').value||new Date().toISOString().slice(0,10);
  const nota=document.getElementById('pc-nota').value||'';
  const destino=document.getElementById('cd-destino').value||'saldo';
  const proceeds=inv.qty*pCierre;
  const coste=inv.qty*(inv.pC||0);
  const ganancia=proceeds-coste;
  // Mark position closed
  inv.abierta=false;inv.pCierre=pCierre;inv.fechaCierre=fecha;inv.notaCierre=nota;inv.destino=destino;
  // Register cashFlow event
  if(!u2.cashFlow) u2.cashFlow=[];
  u2.cashFlow.push({
    id:Date.now(),tipo:'venta',ticker:inv.ticker,nombre:inv.nombre,
    invId:id,proceeds,coste,ganancia,pctGanancia:coste?(ganancia/coste*100):0,
    fecha,destino,origen:inv.origen
  });
  // Update saldo
  if(destino==='saldo'){
    u2.saldo=(u2.saldo||0)+proceeds;
  }
  // If destino==='fuera': proceeds leave balance, nothing added to saldo
  persist(u2);closeModal();set({user:u2});
  ntf(`Posición cerrada · ${ganancia>=0?'+':''}${fE(ganancia)} · ${destino==='saldo'?`Saldo +${fE(proceeds)}`:'Fondos retirados del balance'}`);
}

function setOri(o){
  const saldo=S.user.saldo||0;
  const cash=+document.getElementById('icash')?.value||0;
  const coste=(+document.getElementById('iq2')?.value||0)*(+document.getElementById('ipc')?.value||0);
  const saldoDisp=saldo+cash;
  document.getElementById('iori').value=o;
  document.getElementById('oe').className=o==='externo'?'ba':'bo';
  document.getElementById('os').className=o==='saldo'?'ba':'bo';
  const od=document.getElementById('od');
  if(o==='externo'){
    od.innerHTML=`<span style="color:var(--blue)">💰 Capital nuevo:</span> el dinero entra desde fuera del balance → el patrimonio total aumentará en el coste de la compra.`;
  } else {
    const ok=saldoDisp>=coste;
    od.innerHTML=`<span style="color:${ok?'var(--green)':'var(--red)'}">🔄 Desde saldo:</span> se descuenta del saldo existente (${fE(saldoDisp)} disponible). ${ok?'✓ Saldo suficiente.':'⚠️ Saldo insuficiente — añade una aportación o usa "Capital nuevo".'}`;
  }
}

function saveInv(){
  const nombre=document.getElementById('in')?.value.trim();
  if(!nombre){ntf('Introduce el nombre del activo');return;}
  const qty=+document.getElementById('iq2')?.value||1;
  const pC=+document.getElementById('ipc')?.value||0;
  const pA=+document.getElementById('ipa')?.value||pC;
  const origen=document.getElementById('iori')?.value||'externo';
  const cash=+document.getElementById('icash')?.value||0;
  const coste=qty*pC;
  const u2=JSON.parse(JSON.stringify(S.user));

  // Add cash deposit first if any
  if(cash>0) u2.saldo=(u2.saldo||0)+cash;

  // Validate saldo
  if(origen==='saldo'){
    const saldoDisp=u2.saldo||0;
    if(saldoDisp<coste){
      ntf(`Saldo insuficiente: ${fE(saldoDisp)} disponible, se necesitan ${fE(coste)}`);
      return;
    }
    u2.saldo=saldoDisp-coste;
  }

  const ni={id:Date.now(),nombre,ticker:document.getElementById('it')?.value.trim()||'N/A',tipo:document.getElementById('ity')?.value||'ETF',titularId:document.getElementById('itit')?.value||'',entidad:document.getElementById('ient')?.value.trim()||'',projectId:document.getElementById('iproj')?.value||undefined,qty,pC,pA,fecha:document.getElementById('ife')?.value||'',origen,abierta:true,cashAportado:cash||0};
  u2.inv=[...(u2.inv||[]),ni];
  persist(u2);closeModal();set({user:u2});
  let msg=`Inversión añadida`;
  if(cash>0) msg+=` · Aportación +${fE(cash)}`;
  if(origen==='saldo') msg+=` · Saldo restante: ${fE(u2.saldo)}`;
  ntf(msg);
}

function norm(s){return String(s||'').toLowerCase()
  .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i')
  .replace(/[óòö]/g,'o').replace(/[úùü]/g,'u');}

function searchLocal(q){
  const ql=norm(q);
  const boost=new Set();
  Object.entries(ALIASES).forEach(([k,tks])=>{if(ql.includes(k))tks.forEach(t=>boost.add(t));});
  return ASSET_DB.map(a=>{
    const f=norm([a.n,a.t,a.d,a.tp].join(' '));
    let s=0;
    if(boost.has(a.t))s+=100;
    if(norm(a.t)===ql)s+=90;
    if(norm(a.t).startsWith(ql))s+=50;
    if(norm(a.n).includes(ql))s+=40;
    if(f.includes(ql))s+=20;
    ql.split(/\s+/).filter(w=>w.length>2).forEach(w=>{if(f.includes(w))s+=10;});
    return{a,s};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,6).map(x=>x.a);
}

// Fetch real-time price via Yahoo Finance chart endpoint (two fallback hosts)
// ─── LIVE PRICE ENGINE — multiple sources with CORS proxy fallback ───────────
const CORS_PROXY='https://corsproxy.io/?';

async function tryFetch(url, timeout=5000){
  try{
    const res=await Promise.race([
      fetch(url,{mode:'cors',headers:{'Accept':'application/json'}}),
      new Promise((_,rej)=>setTimeout(()=>rej('timeout'),timeout))
    ]);
    if(res.ok) return await res.json();
  }catch(e){}
  return null;
}

async function fetchLivePrice(ticker){
  if(!ticker||ticker==='N/A') return null;
  const t=encodeURIComponent(ticker);

  // Source 1: Yahoo Finance v8 chart (most reliable, direct)
  for(const h of ['query1','query2']){
    const d=await tryFetch(`https://${h}.finance.yahoo.com/v8/finance/chart/${t}?interval=1d&range=1d`);
    const m=d?.chart?.result?.[0]?.meta;
    if(m?.regularMarketPrice>0) return {
      price:m.regularMarketPrice,currency:m.currency||'',
      exchange:m.exchangeName||'',name:m.longName||m.shortName||ticker,source:'yahoo'
    };
  }

  // Source 2: Yahoo Finance v7 quote (different endpoint, sometimes works when v8 blocked)
  for(const h of ['query1','query2']){
    const d=await tryFetch(`https://${h}.finance.yahoo.com/v7/finance/quote?symbols=${t}`);
    const q=d?.quoteResponse?.result?.[0];
    if(q?.regularMarketPrice>0) return {
      price:q.regularMarketPrice,currency:q.currency||'',
      exchange:q.exchange||'',name:q.longName||q.shortName||ticker,source:'yahoo-v7'
    };
  }

  // Source 3: Yahoo via CORS proxy (when direct CORS blocked)
  const dp=await tryFetch(`${CORS_PROXY}${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`)}`);
  const mp=dp?.chart?.result?.[0]?.meta;
  if(mp?.regularMarketPrice>0) return {
    price:mp.regularMarketPrice,currency:mp.currency||'',
    exchange:mp.exchangeName||'',name:mp.longName||mp.shortName||ticker,source:'proxy'
  };

  // Source 4: CoinGecko for crypto (BTC-EUR, ETH-EUR etc.)
  const cryptoMap={'BTC-EUR':'bitcoin','ETH-EUR':'ethereum','BTC-USD':'bitcoin','ETH-USD':'ethereum',
    'BNB-EUR':'binancecoin','SOL-EUR':'solana','ADA-EUR':'cardano','XRP-EUR':'ripple'};
  const cgId=cryptoMap[ticker.toUpperCase()];
  if(cgId){
    const vs=ticker.includes('USD')?'usd':'eur';
    const cg=await tryFetch(`https://api.coingecko.com/api/v3/simple/price?ids=${cgId}&vs_currencies=${vs}`);
    const price=cg?.[cgId]?.[vs];
    if(price>0) return {price,currency:vs.toUpperCase(),exchange:'CoinGecko',name:ticker,source:'coingecko'};
  }

  return null;
}

async function searchAssets(){
  const q=document.getElementById('iq')?.value.trim();
  if(!q)return;
  const sr=document.getElementById('sr');
  if(sr)sr.innerHTML='<div style="font-size:12px;color:var(--text2);padding:8px">🔍 Buscando...</div>';

  // Instant local results first
  const local=searchLocal(q);
  if(local.length) renderSearchResults(local);

  // Try Yahoo Finance autocomplete
  let yahooSymbols=[];
  try{
    const r=await Promise.race([
      fetch(`https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(q)}&quotesCount=5&newsCount=0&enableFuzzyQuery=true`,{mode:'cors'}),
      new Promise((_,rej)=>setTimeout(()=>rej('timeout'),4000))
    ]);
    if(r.ok){
      const data=await r.json();
      const tMap={EQUITY:'Acción',ETF:'ETF',MUTUALFUND:'Fondo',CRYPTOCURRENCY:'Cripto',BOND:'Bono'};
      yahooSymbols=(data.quotes||[])
        .filter(x=>x.symbol&&(x.longname||x.shortname))
        .slice(0,5)
        .map(x=>({
          n:x.longname||x.shortname||x.symbol,
          t:x.symbol, tp:tMap[x.quoteType]||'Otro',
          p:0, currency:'',
          d:`${x.exchange||''} · ${x.typeDisp||x.quoteType||''}`.replace(/^ · | · $/,''),
          _live:false
        }));
    }
  }catch(e){/* CORS blocked — local only */}

  if(yahooSymbols.length){
    if(sr)sr.innerHTML='<div style="font-size:12px;color:var(--text2);padding:8px">⚡ Obteniendo precios reales...</div>';
    // Fetch live prices in parallel
    const prices=await Promise.allSettled(yahooSymbols.map(s=>fetchLivePrice(s.t)));
    yahooSymbols=yahooSymbols.map((s,i)=>{
      const live=prices[i].status==='fulfilled'?prices[i].value:null;
      if(live&&live.price>0){
        s.p=live.price; s.currency=live.currency;
        if(live.name&&live.name.length>3) s.n=live.name;
        s.d=`${live.exchange}${live.currency?' · '+live.currency:''}`.replace(/^ · /,'');
        s._live=true;
      }
      return s;
    });
    const seen=new Set(yahooSymbols.map(r=>r.t.toLowerCase()));
    renderSearchResults([...yahooSymbols,...local.filter(r=>!seen.has(r.t.toLowerCase()))].slice(0,7));
  }
}

function calcCuotaFrances(capital, tipoAnual, plazoMeses){
  if(!capital||!plazoMeses) return 0;
  if(!tipoAnual) return capital/plazoMeses; // interés 0
  const r=tipoAnual/100/12;
  return capital * r * Math.pow(1+r,plazoMeses) / (Math.pow(1+r,plazoMeses)-1);
}
