async function rdSearchOpportunities(){
  // Show loading state
  const btn=document.querySelector('button[onclick="rdSearchOpportunities()"]');
  if(btn){btn.innerHTML='⏳ Buscando...';btn.disabled=true;}
  
  try{
    const currentStocks=RD_STOCKS.map(s=>s.t).join(',');
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1500,
        messages:[{role:'user',content:`Eres un analista de momentum trading. Basándote en el contexto actual de mercado (Abril 2026), identifica 5-8 valores adicionales que cumplan los criterios del Playbook de 8 factores: IPO/SPAC reciente, sector en momentum (AI, Quantum, EV, Biotech, InsurTech), multi-catalizador, buzz social, volumen anómalo, rebote técnico, evento calendario, upgrade/insider. 

Valores ya en el radar: ${currentStocks}

Devuelve SOLO un JSON válido con este formato exacto, sin texto adicional:
{"stocks":[{"t":"TICKER","n":"Nombre Empresa","sec":"Sector","ico":"emoji","ex":"NASDAQ","p":0.00,"cap":100,"d":0.0,"w":0.0,"m":0.0,"q":null,"y":null,"bz":50,"txt":"Catalizador en 1 frase","tags":["Tag1","Tag2"],"F":{"ipo":false,"buzz":true,"vol":false,"tec":false,"cat":false,"upg":false,"sec":true,"reb":false}}]}`}]
      })
    });
    const data=await response.json();
    const text=data.content[0].text.trim();
    // Parse JSON
    const clean=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    if(parsed.stocks&&parsed.stocks.length){
      // Add new stocks to RD_STOCKS if not already there
      let added=0;
      parsed.stocks.forEach(s=>{
        if(!RD_STOCKS.find(x=>x.t===s.t)){
          RD_STOCKS.push(s);
          added++;
        }
      });
      rdToast(`✅ ${added} nuevas oportunidades encontradas`);
      render();
    }
  }catch(e){
    console.error('rdSearch error:',e);
    rdToast('❌ Error al buscar. Intenta de nuevo.');
  }
  if(btn){btn.innerHTML='🔍 Buscar';btn.disabled=false;}
}

async function addWlItemSmart(){
  const inp=document.getElementById('wl-input');
  if(!inp||!inp.value.trim()) return;
  const query=inp.value.trim();
  
  // Show search results dropdown
  inp.disabled=true;
  try{
    const r=await fetch(`/api/search?q=${encodeURIComponent(query)}&limit=8`);
    if(r.ok){
      const results=await r.json();
      if(results&&results.length){
        // Show results modal
        const body=`<div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:10px">Resultados para "<b>${escH(query)}</b>"</div>
          ${results.map(r=>`
            <div onclick="addToWatchlistId('${r.symbol}','${escH(r.name||r.symbol)}','${getActiveWL().id}');closeModal()" 
                 style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;margin-bottom:7px;cursor:pointer;transition:border-color .15s"
                 onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--border)'">
              <div>
                <div style="font-weight:700;font-size:13px;color:var(--gold);font-family:monospace">${r.symbol}</div>
                <div style="font-size:11px;color:var(--text2)">${escH(r.name||'')} · ${r.exchangeShortName||r.stockExchange||''}</div>
              </div>
              <div style="font-size:10px;color:var(--text2)">${r.type||''}</div>
            </div>`).join('')}
        </div>`;
        openModal('🔍 Búsqueda de valores',body,null,'',true);
        inp.value='';
      } else {
        ntf('Sin resultados para: '+query);
      }
    }
  }catch(e){
    // Fallback: add directly
    const sym=query.toUpperCase();
    addToWatchlistModal(sym,query);
    inp.value='';
  }
  inp.disabled=false;
}




// ── Búsqueda de activos en tiempo real (usa FMP API) ─────────────────────────
let _searchTimer=null;
function liveSearch(q){
  clearTimeout(_searchTimer);
  if(!q||q.length<2){document.getElementById('sr').innerHTML='';return;}
  document.getElementById('sr').innerHTML='<div style="font-size:11px;color:var(--text2);padding:6px">⏳ Buscando...</div>';
  _searchTimer=setTimeout(()=>searchAssets(q),400);
}

async function searchAssets(q){
  const query=q||(document.getElementById('iq')?.value||'').trim();
  if(!query){return;}
  const srEl=document.getElementById('sr');
  if(srEl) srEl.innerHTML='<div style="font-size:11px;color:var(--text2);padding:6px">⏳ Buscando...</div>';
  try{
    const r=await fetch(`/api/search?q=${encodeURIComponent(query)}&limit=8`);
    const results=await r.json();
    if(!srEl) return;
    if(!results||!results.length){
      srEl.innerHTML='<div style="font-size:11px;color:var(--text2);padding:6px">Sin resultados para "'+escH(query)+'"</div>';
      return;
    }
    srEl.innerHTML=`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-top:4px">
      ${results.map(r=>`
        <div onclick="selectAsset('${r.symbol}','${escH(r.name||r.symbol)}')" 
             style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid rgba(74,53,32,.2);cursor:pointer;transition:background .12s"
             onmouseover="this.style.background='rgba(210,138,63,.08)'" onmouseout="this.style.background=''">
          <div>
            <span style="font-weight:700;color:var(--gold);font-family:monospace;font-size:12px">${r.symbol}</span>
            <span style="font-size:11px;color:var(--text2);margin-left:8px">${escH(r.name||'')}</span>
          </div>
          <span style="font-size:10px;color:var(--text2)">${r.exchangeShortName||r.stockExchange||''}</span>
        </div>`).join('')}
    </div>`;
  }catch(e){
    if(srEl) srEl.innerHTML='<div style="font-size:11px;color:var(--red);padding:6px">Error: '+e.message+'</div>';
  }
}

function selectAsset(sym,name){
  const iq=document.getElementById('iq');
  const iname=document.getElementById('in');
  const iticker=document.getElementById('it');
  if(iq) iq.value=sym+' — '+name;
  if(iname) iname.value=name;
  if(iticker) iticker.value=sym;
  const sr=document.getElementById('sr');
  if(sr) sr.innerHTML=`<div style="font-size:11px;color:var(--green);padding:5px 0">✅ Seleccionado: <b>${sym}</b> — ${escH(name)}</div>`;
  // Auto-fetch current price
  fetchLivePrice(sym).then(d=>{
    if(d&&d.price>0){
      const ipa=document.getElementById('ipa');
      if(ipa) ipa.value=d.price.toFixed(2);
    }
  });
}
