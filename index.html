    if(cuotaCalc>0){
      preview.textContent=`${f2(cuotaCalc)} €/mes`;
      preview.style.color='var(--green)';
    } else {
      preview.textContent='—';preview.style.color='var(--text2)';
    }
  }

  if(summary&&capital>0&&cuotaEfectiva>0&&plazoMeses>0){
    const totalPagado=cuotaEfectiva*plazoMeses;
    const totalIntereses=totalPagado-(pendiente||capital);
    summary.style.display='block';
    summary.innerHTML=`
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        <div><span style="color:var(--text2)">Cuota efectiva:</span> <b style="color:var(--green)">${f2(cuotaEfectiva)} €/mes</b></div>
        <div><span style="color:var(--text2)">Total a pagar:</span> <b>${f2(totalPagado)} €</b></div>
        <div><span style="color:var(--text2)">Total intereses:</span> <b style="color:var(--red)">${f2(Math.max(0,totalIntereses))} €</b></div>
        <div><span style="color:var(--text2)">Plazo:</span> <b>${plazoAnios} años (${plazoMeses} meses)</b></div>
      </div>`;
  } else if(summary){
    summary.style.display='none';
  }
}

function saveLoan(){
  const nombre=document.getElementById('ln')?.value.trim();
  if(!nombre){ntf('Introduce el nombre');return;}
  const capital=+document.getElementById('lca')?.value||0;
  const pendiente=+document.getElementById('lpe')?.value||capital;
  const tipo=+document.getElementById('lin')?.value||0;
  const plazoAnios=+document.getElementById('lplazo')?.value||0;
  const plazoMeses=Math.round(plazoAnios*12);
  const cuotaManual=+document.getElementById('lcu')?.value||0;
  // Auto-calculate if not entered
  const cuota=cuotaManual>0 ? cuotaManual : calcCuotaFrances(pendiente||capital, tipo, plazoMeses);
  const inicio=document.getElementById('li')?.value||'';
  let fin=document.getElementById('lf')?.value||'';
  if(!fin&&inicio&&plazoMeses){const d=new Date(inicio);d.setMonth(d.getMonth()+plazoMeses);fin=d.toISOString().slice(0,10);}
  const nl={id:Date.now(),nombre,titularId:document.getElementById('lt')?.value||'',capital,pendiente,cuota:Math.round(cuota*100)/100,tipo,plazoMeses,inicio,fin,tipoP:document.getElementById('ltp')?.value||'prestamo'};
  const u2={...S.user,loans:[...(S.user.loans||[]),nl]};
  persist(u2);closeModal();set({user:u2});ntf(`Préstamo añadido — cuota ${f2(nl.cuota)} €/mes`);
}

// ─── TAB PATRIMONIO ───────────────────────────────────────────────────────────
function tabPat(){
  const u=S.user;
  const profId=u.profileId||'moderado';
  const prof=getProfile(profId);
  const proj=S.pProj||10;
  const exclInm=S.pExclInm||false;

  const invs=u.inv||[];
  const loans=u.loans||[];

  const invAbiertas=invs.filter(i=>i.abierta!==false);
  const invFinancieros=invAbiertas.filter(i=>normClass(i.tipo)!=='Inmueble');
  const invInmuebles=invAbiertas.filter(i=>normClass(i.tipo)==='Inmueble');

  const totABruto=invAbiertas.reduce((s,i)=>s+i.qty*(i.pA||0),0);
  const totAFin=invFinancieros.reduce((s,i)=>s+i.qty*(i.pA||0),0);
  const totAInm=invInmuebles.reduce((s,i)=>s+i.qty*(i.pA||0),0);
  const totI=invAbiertas.reduce((s,i)=>s+i.qty*(i.pC||0),0);
  const totD=loans.reduce((s,l)=>s+l.pendiente,0);
  const saldo=u.saldo||0;

  const patriNetoTotal=totABruto+saldo-totD;
  const patriBrutoFin=totAFin+saldo;
  const patriBase=exclInm?patriBrutoFin:totABruto+saldo;
  const gan=totABruto-totI, rentR=pct(totABruto,totI);

  // ── Ahorro mensual: manual (user) → presupuesto → default ─────────────────
  // User can set manually via S.pAhorroMensual
  let ahorroMensualPresupuesto=500;
  try{
    const bd=u.bd||{},yrs=Object.keys(bd).map(Number);
    const allItems=getAllItems(u);
    if(yrs.length){
      const last=Math.max(...yrs);
      const meses=Object.values(bd[last]||{});
      const sumAnual=meses.reduce((s,m)=>s+(m.ingP||0)-allItems.reduce((ss,it)=>ss+(m.cats[it]?.p||0),0),0);
      if(sumAnual>0) ahorroMensualPresupuesto=Math.round(sumAnual/12);
    }
  }catch(e){}
  // Manual override stored in user preferences
  const ahorroMensual=S.pAhorroMensual!=null?S.pAhorroMensual:ahorroMensualPresupuesto;
  const ahorroAnual=ahorroMensual*12;

  const r=prof.retExp/100;          // annual return
  const rm=Math.pow(1+r,1/12)-1;    // monthly return (true compounding)
  const std=prof.std/100;

  // ── Month-by-month projection (correct exponential compounding) ───────────
  // Each month:
  //   1. Portfolio grows by rm (compounding)
  //   2. Monthly saving (ahorroMensual) is ADDED as new investment
  //   3. Each loan principal decreases by its amortisation
  //   4. Net patrimony = portfolio + saldo - remaining debt
  //
  // For σ bands: same formula but with (1+r±σ)^(1/12)-1 as monthly rate

  function simulateMonths(nMonths, monthlyReturn, monthlyContrib){
    // Grow portfolio month by month with contributions
    // FV = PV*(1+rm)^n + C * ((1+rm)^n - 1) / rm
    const n=nMonths;
    const rr=monthlyReturn;
    if(Math.abs(rr)<0.00001) return patriBase + monthlyContrib*n;
    return patriBase*Math.pow(1+rr,n) + monthlyContrib*(Math.pow(1+rr,n)-1)/rr;
  }

  const nYears=proj;

  // Build quarterly data points for smooth exponential curve (4 per year)
  const pointsPerYear=4;
  const projD=[];
  for(let qi=0;qi<=nYears*pointsPerYear;qi++){
    const yi=qi/pointsPerYear;           // fractional year
    const months=Math.round(yi*12);
    const isYearEnd=(qi%pointsPerYear===0);
    const yearInt=Math.floor(yi);

    const fin=Math.round(simulateMonths(months,rm,ahorroMensual));
    const debt=loans.reduce((s,l)=>s+loanPrincipalAtYearMonths(l,months),0);
    const net=Math.max(0,fin-debt);

    const rmHi1=Math.pow(1+r+std,1/12)-1;
    const rmLo1=Math.pow(1+Math.max(0.001,r-std),1/12)-1;
    const rmHi2=Math.pow(1+r+2*std,1/12)-1;
    const rmLo2=Math.pow(1+Math.max(0.001,r-2*std),1/12)-1;

    const d={
      name: isYearEnd?(CUR_YEAR+yearInt)+'':'',
      'Patrimon. Financiero':fin,
      ...(showDebt?{'Patrim. Neto (−Deuda)':net}:{})
    };
    d.std1Hi=Math.round(simulateMonths(months,rmHi1,ahorroMensual));
    d.std1Lo=Math.round(Math.max(0,simulateMonths(months,rmLo1,ahorroMensual)));
    d.std2Hi=Math.round(simulateMonths(months,rmHi2,ahorroMensual));
    d.std2Lo=Math.round(Math.max(0,simulateMonths(months,rmLo2,ahorroMensual)));

    // Only add real data at year ends
    if(isYearEnd){
      const snapYear=CUR_YEAR+yearInt;
      const snapRaw=(u.patrimonioReal||{})[snapYear]?.[11];
      const snapN=snapRaw==null?null:typeof snapRaw==='number'?snapRaw:(snapRaw.total||null);
      if(snapN!=null) d.Real=snapN;
      else if(qi===0) d.Real=patriBase;
    }
    projD.push(d);
  }

  const meta=projD[nYears]['Patrimon. Financiero'];
  const showDebt=S.pShowDebt!==false;

  // Milestone cards
  const milestonesD=[5,10,20,30].filter(y=>y<=proj).map(y=>{
    const months=y*12;
    const fin=Math.round(simulateMonths(months,rm,ahorroMensual));
    const debt=loans.reduce((s,l)=>s+loanPrincipalAtYearMonths(l,months),0);
    const rmHi1=Math.pow(1+r+std,1/12)-1;
    const rmLo1=Math.pow(1+Math.max(0,r-std),1/12)-1;
    return{
      y, fin, debt, net:Math.max(0,fin-debt),
      lo1:Math.round(simulateMonths(months,rmLo1,ahorroMensual)),
      hi1:Math.round(simulateMonths(months,rmHi1,ahorroMensual)),
    };
  });

  // Monthly tracking table
  function snapVal(snap){return snap==null?null:typeof snap==='number'?snap:(snap.total||null);}
  const trackingRows=[];
  for(let y=CUR_YEAR-1;y<=CUR_YEAR;y++){
    for(let mo=0;mo<12;mo++){
      if(y===CUR_YEAR&&mo>CUR_MONTH) break;
      const snapRaw=(u.patrimonioReal||{})[y]?.[mo];
      const snap=snapVal(snapRaw);
      const mIdx=(y-CUR_YEAR)*12+mo; // months from now (can be negative = past)
      const theo=mIdx>=0
        ?Math.round(simulateMonths(mIdx,rm,ahorroMensual))
        :Math.round(patriBase*Math.pow(1+r,mIdx/12)+ahorroAnual*((Math.pow(1+r,mIdx/12)-1)/(r||0.001)));
      const dev=snap!=null?pct(snap,theo):null;
      trackingRows.push({y,mo,theo,real:snap,dev,hasDetail:snapRaw!=null&&typeof snapRaw==='object'});
    }
  }

  return `<div class="sec">
  <div class="sech">
    <div class="sect">🏛️ Patrimonio</div>
    <div class="row">
      <button class="bo ${exclInm?'on':''}" onclick="set({pExclInm:${!exclInm}})" style="font-size:12px;padding:6px 10px" title="Excluir inmuebles de la proyección">🏠 ${exclInm?'Con inmuebles':'Sin inmuebles'}</button>
      <button class="ba" onclick="openProfileTest()" style="font-size:12px;padding:6px 11px">🎯 Test Perfil</button>
    </div>
  </div>

  ${exclInm?`<div style="background:rgba(210,138,63,.08);border:1px solid rgba(210,138,63,.25);border-radius:9px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--gold)">
    🏠 Vista sin inmuebles activada — La proyección y rentabilidad se calculan sobre el <b>patrimonio financiero bruto</b> (${fE(patriBrutoFin)}), excluyendo los activos inmobiliarios (${fE(totAInm)}).
  </div>`:''}

  <!-- Profile summary -->
  <div class="card" style="margin-bottom:13px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div style="flex:1;min-width:180px">
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px">Perfil Inversor · Renta4</div>
        <div style="font-size:22px;font-weight:800;color:${prof.color}">${prof.label}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px;line-height:1.4">${prof.desc}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:6px">Puntuación test: <b style="color:var(--text)">${u.profileScore||0}/60</b></div>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;flex-shrink:0">
        <div style="text-align:center;min-width:70px">
          <div style="font-size:10px;color:var(--text2);margin-bottom:4px;text-transform:uppercase">Renta Variable</div>
          <div style="font-size:20px;font-weight:700;color:var(--accent)">${prof.rvMin}–${prof.rvMax}%</div>
          <div style="width:70px;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:4px auto;border:1px solid var(--border)">
            <div style="margin-left:${prof.rvMin}%;width:${prof.rvMax-prof.rvMin}%;height:100%;background:var(--accent);border-radius:4px"></div>
          </div>
        </div>
        <div style="text-align:center;min-width:70px">
          <div style="font-size:10px;color:var(--text2);margin-bottom:4px;text-transform:uppercase">Renta Fija</div>
          <div style="font-size:20px;font-weight:700;color:var(--blue)">${prof.rfMid}%</div>
          <div style="width:70px;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:4px auto;border:1px solid var(--border)">
            <div style="width:${prof.rfMid}%;height:100%;background:var(--blue);border-radius:4px"></div>
          </div>
        </div>
        <div style="text-align:center;min-width:70px">
          <div style="font-size:10px;color:var(--text2);margin-bottom:4px;text-transform:uppercase">Rent. esperada</div>
          <div style="font-size:20px;font-weight:700;color:${prof.color}">${prof.retExp}%/año</div>
          <div style="font-size:10px;color:var(--text2);margin-top:3px">σ ±${prof.std}%</div>
        </div>
      </div>
    </div>
    <!-- Profile scale bar -->
    <div style="margin-top:12px">
      <div style="display:flex;gap:3px;margin-bottom:4px">
        ${PROFILES.map(p=>`<div style="flex:1;height:8px;border-radius:4px;background:${profId===p.id?p.color:p.color+'33'};transition:all .3s;cursor:pointer" onclick="changeProfile('${p.id}')" title="${p.label}: ${p.retExp}%/año"></div>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text2)">
        ${PROFILES.map(p=>`<span style="color:${profId===p.id?p.color:'var(--text2)'};font-weight:${profId===p.id?700:400}">${p.label}</span>`).join('')}
      </div>
    </div>
  </div>

  <div class="g4" style="margin-bottom:13px">
    <div class="card"><div class="kv">Patrimonio Neto</div><div class="big fg">${fE(patriNetoTotal)}</div><div style="font-size:11px;color:var(--text2);margin-top:3px">Activos − Deudas</div></div>
    <div class="card"><div class="kv">Patrimonio Financiero</div><div class="kn fb">${fE(patriBrutoFin)}</div><div style="font-size:11px;color:var(--text2);margin-top:3px">Cartera + saldo (sin deudas)</div></div>
    <div class="card"><div class="kv">Rentabilidad cartera</div><div class="kn" style="color:${rentR>=0?'var(--green)':'var(--red)'}">${fP(rentR)}</div><div style="font-size:11px;color:var(--text2);margin-top:3px">${fE(gan)} ganados</div></div>
    <div class="card"><div class="kv">Objetivo ${proj}a (${prof.retExp}%/año)</div><div class="kn fp">${fE(meta)}</div><div style="font-size:11px;color:var(--text2);margin-top:3px">Base: ${fE(patriBase)}</div></div>
  </div>

  <!-- Projection chart -->
  <div class="card" style="margin-bottom:13px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-weight:700;font-size:13px">📈 Proyección Patrimonial</div>
        <div style="font-size:11px;color:var(--text2);margin-top:3px">
          Perfil ${prof.label} · ${prof.retExp}%/año (${(rm*100).toFixed(3)}%/mes compuesto) · Base ${fE(patriBase)}
        </div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="bo ${showDebt?'on':''}" onclick="set({pShowDebt:${!showDebt}})" style="font-size:12px;padding:5px 9px">🏦 ${showDebt?'Ocultar deuda':'+ Deuda'}</button>
        ${[5,10,20,30].map(y=>`<button class="${proj===y?'ba':'bo'}" onclick="set({pProj:${y}})" style="padding:5px 9px;font-size:12px">${y}a</button>`).join('')}
      </div>
    </div>

    <!-- Ahorro mensual editable -->
    <div style="background:rgba(76,175,125,.08);border:1px solid rgba(76,175,125,.2);border-radius:9px;padding:11px 14px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:160px">
          <div style="font-size:11px;color:var(--green);font-weight:600;margin-bottom:2px">💰 APORTACIÓN MENSUAL A LA INVERSIÓN (cash in)</div>
          <div style="font-size:11px;color:var(--text2)">Importe mensual que se suma a la cartera. Debe ser el ahorro neto${loans.length?' tras gastos y cuotas':''}.</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">

            <div style="font-size:10px;color:var(--text2)">Del presupuesto</div>
            <div style="font-size:12px;color:var(--text2)">${fE(ahorroMensualPresupuesto)} €</div>
          </div>
          <div>
            <div style="font-size:10px;color:var(--green);font-weight:600;margin-bottom:2px">Aportación mensual</div>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="number" value="${ahorroMensual}" min="0" step="50"
                onchange="set({pAhorroMensual:+this.value})"
                style="width:100px;text-align:right;font-size:15px;font-weight:700;color:var(--green);border-color:rgba(76,175,125,.5)"/>
              <span style="font-size:13px;color:var(--text2)">€/mes</span>
            </div>
          </div>
          <button class="bo" onclick="set({pAhorroMensual:null})" style="font-size:11px;padding:4px 7px" title="Usar valor del presupuesto">↺</button>
        </div>
      </div>
      <div style="margin-top:7px;font-size:11px;color:var(--text2);display:flex;gap:16px;flex-wrap:wrap">
        <span>Anual: <b style="color:var(--green)">${fE(ahorroMensual*12)}</b></span>
        ${loans.length?`<span>Cuotas préstamos: <b style="color:var(--red)">−${fE(loans.reduce((s,l)=>s+(l.cuota||0),0))}/mes</b></span>`:''}
        <span>Rentabilidad mensual compuesta: <b style="color:${prof.color}">${(rm*100).toFixed(3)}%</b></span>
      </div>

    <!-- Leyenda -->
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;font-size:11px">

      ${showDebt?`<div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:3px;background:var(--green);border-radius:2px"></div><span style="color:var(--text2)">Patrimonio Neto (−deuda amortizada)</span></div>`:''}
      <div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:3px;background:var(--gold);border-radius:2px"></div><span style="color:var(--text2)">Real consolidado</span></div>

    ${svgArea(projD,['Patrimon. Financiero',...(showDebt?['Patrim. Neto (−Deuda)']:[]),'Real'],[prof.color,...(showDebt?['#4caf7d']:[]),'#d28a3f'],290,true)}

    <!-- Milestone cards -->
    <div class="g4" style="margin-top:14px">
      ${milestonesD.map(m=>{

            <td style="font-weight:700;color:var(--red)">${fE(totD)}</td>
            ${[1,3,5,10,15,20].filter(y=>y<=proj).map(y=>{const tot=loans.reduce((s,l)=>s+loanPrincipalAtYearMonths(l,y*12),0);return `<td style="font-weight:700;color:${tot===0?'var(--green)':'var(--red)'}">${tot===0?'✓ 0':fE(tot)}</td>`;}).join('')}

  </div>

  <!-- Monthly tracking with deviations -->

    <div class="ov"><table>

        ${trackingRows.slice(-24).reverse().map(({y,mo,theo,real,dev,hasDetail})=>{

// ─── MONTHLY CONSOLIDATION SYSTEM ────────────────────────────────────────────
// patrimonioReal stores: { year: { month: { total, saldo, deudas, positions:[{id,nombre,ticker,tipo,entidad,qty,pA,val}], nota } } }

function calcPatrimonioNeto(u){
  const invs=u.inv||[];
  const loans=u.loans||[];
  const totA=invs.filter(i=>i.abierta!==false).reduce((s,i)=>s+i.qty*(i.pA||0),0);
  const totD=loans.reduce((s,l)=>s+(l.pendiente||0),0);
  return {totA,totD,saldo:u.saldo||0,total:totA-totD+(u.saldo||0)};
}

function buildConsolidation(u){
  // Build a snapshot from current portfolio state
  const invs=u.inv||[];
  const loans=u.loans||[];
  const {totA,totD,saldo,total}=calcPatrimonioNeto(u);
  return {
    total,saldo,deudas:totD,
    positions:invs.filter(i=>i.abierta!==false).map(i=>({
      id:i.id,nombre:i.nombre,ticker:i.ticker,tipo:i.tipo,
      entidad:i.entidad||'',titularId:i.titularId,
      qty:i.qty,pA:i.pA||0,val:i.qty*(i.pA||0)
    })),
    nota:'',ts:Date.now()
  };
}

// Fetch live prices for ALL open positions and update them
async function refreshAllPrices(){
  const u=S.user;
  const invs=(u.inv||[]).filter(i=>i.abierta!==false);
  const cotizados=invs.filter(i=>i.ticker&&i.ticker!=='N/A'&&normClass(i.tipo)!=='Inmueble'&&normClass(i.tipo)!=='Private Equity');
  const noCotizados=invs.filter(i=>!i.ticker||i.ticker==='N/A'||normClass(i.tipo)==='Inmueble'||normClass(i.tipo)==='Private Equity');

  if(!invs.length){ntf('No hay posiciones abiertas');return;}

  const btn=document.getElementById('refresh-prices-btn');
  if(btn){btn.innerHTML='<span id="rprog">⏳ 0/'+cotizados.length+'</span>';btn.disabled=true;}

  const u2=JSON.parse(JSON.stringify(u));
  let updated=0,failed=0;
  const failedList=[];

  // Fetch in batches of 4 in parallel
  const chunks=[];
  for(let i=0;i<cotizados.length;i+=4) chunks.push(cotizados.slice(i,i+4));

  for(const chunk of chunks){
    const results=await Promise.allSettled(chunk.map(inv=>fetchLivePrice(inv.ticker)));
    results.forEach((res,i)=>{
      const inv=chunk[i];
      const prog=document.getElementById('rprog');
      if(prog) prog.textContent=`⏳ ${updated+failed+1}/${cotizados.length}`;
      if(res.status==='fulfilled'&&res.value?.price>0){
        const idx=u2.inv.findIndex(x=>x.id===inv.id);
        if(idx>=0){
          u2.inv[idx].pA=Math.round(res.value.price*100)/100;
          u2.inv[idx].pAFecha=new Date().toISOString().slice(0,10);
          u2.inv[idx].pACurrency=res.value.currency||'';
        }
        updated++;
      } else {
        failed++;
        failedList.push(inv);
      }
    });
  }

  persist(u2);set({user:u2});
  if(btn){btn.innerHTML='🔄 Actualizar precios';btn.disabled=false;}

  const ts=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  let msg=`✓ ${updated} precios actualizados a las ${ts}`;
  if(failed>0) msg+=` · ${failed} sin precio live`;
  ntf(msg);

  // If there are failed or non-quoted assets, offer to edit them manually
  if(failedList.length>0||noCotizados.length>0){
    const all=[...failedList,...noCotizados];
    setTimeout(()=>openManualPriceEdit(all,u2),500);
  }
}

// Refresh prices inside the consolidation modal
async function csRefreshPrices(){
  const u=S.user;
  const invs=(u.inv||[]).filter(i=>i.abierta!==false);
  const cotizados=invs.filter(i=>i.ticker&&i.ticker!=='N/A'&&normClass(i.tipo)!=='Inmueble'&&normClass(i.tipo)!=='Private Equity');
  const btn=document.getElementById('cs-refresh-btn');
  if(btn){btn.innerHTML='⏳ Actualizando...';btn.disabled=true;}
  let updated=0;
  const chunks=[];
  for(let i=0;i<cotizados.length;i+=4) chunks.push(cotizados.slice(i,i+4));
  for(const chunk of chunks){
    const results=await Promise.allSettled(chunk.map(inv=>fetchLivePrice(inv.ticker)));
    results.forEach((res,ii)=>{
      const inv=chunk[ii];
      if(res.status==='fulfilled'&&res.value?.price>0){
        const el=document.getElementById(`cs-p-${inv.id}`);
        if(el){el.value=Math.round(res.value.price*100)/100;el.style.borderColor='var(--green)';}
        updated++;
      }
    });
  }
  csUpdateTotal();
  if(btn){btn.innerHTML=`✓ ${updated} precios actualizados`;btn.style.color='var(--green)';}
}

function csUpdateTotal(){
  const u=S.user;
  const invs=(u.inv||[]).filter(i=>i.abierta!==false);
  let cartera=0;
  invs.forEach(inv=>{
    const el=document.getElementById(`cs-p-${inv.id}`);
    const pA=el?+el.value:inv.pA||0;
    const val=inv.qty*pA;
    cartera+=val;
    const velEl=document.getElementById(`cs-val-${inv.id}`);
    if(velEl) velEl.textContent=fE(val);
  });
  const saldo=+document.getElementById('cs-snap-saldo')?.value||(u.saldo||0);
  const deudas=+document.getElementById('cs-snap-deudas')?.value||((u.loans||[]).reduce((s,l)=>s+(l.pendiente||0),0));
  const total=cartera+saldo-deudas;
  const el=document.getElementById('cs-total');
  if(el) el.textContent=fE(total);
}

function saveConsolidation(){
  const y=+document.getElementById('cs-y')?.value;
  const mo=+document.getElementById('cs-m')?.value;
  const nota=document.getElementById('cs-nota')?.value||'';
  if(!y&&y!==0){ntf('Selecciona el período');return;}
  const u2=JSON.parse(JSON.stringify(S.user));
  const invs=(u2.inv||[]).filter(i=>i.abierta!==false);

  // Build position snapshot with edited prices
  const positions=invs.map(inv=>{
    const el=document.getElementById(`cs-p-${inv.id}`);
    const pA=el?Math.round(+el.value*100)/100:inv.pA||0;
    // Also update the live price in the user's inv array
    const idx=u2.inv.findIndex(x=>x.id===inv.id);
    if(idx>=0) u2.inv[idx].pA=pA;
    return {id:inv.id,nombre:inv.nombre,ticker:inv.ticker,tipo:inv.tipo,
      entidad:inv.entidad||'',titularId:inv.titularId,qty:inv.qty,pA,val:inv.qty*pA};
  });

  const cartera=positions.reduce((s,p)=>s+p.val,0);
  const deudas=(u2.loans||[]).reduce((s,l)=>s+(l.pendiente||0),0);
  const saldo=u2.saldo||0;
  const total=cartera+saldo-deudas;

  if(!u2.patrimonioReal) u2.patrimonioReal={};
  if(!u2.patrimonioReal[y]) u2.patrimonioReal[y]={};
  u2.patrimonioReal[y][mo]={total,saldo,deudas,positions,nota,ts:Date.now()};

  persist(u2);closeModal();set({user:u2});
  ntf(`Consolidación ${MN[mo]} ${y} guardada — Patrimonio: ${fE(total)}`);
}

      </tr>`).join('')}
    </tbody>
  </table></div>`:'<div style="color:var(--text2);font-size:12px">Sin desglose de posiciones.</div>'}`;
  openModal(`📋 Detalle consolidación — ${MN[mo]} ${y}`,body,null,'Cerrar',true);
}

function quickSnapEdit(y,mo,currentVal){
  const body=`
  <div style="margin-bottom:10px">
    <label class="lbl">Valor patrimonio real (€)</label>
    <input id="sn-val" type="number" value="${currentVal}"/>
  </div>
  <input type="hidden" id="sn-y" value="${y}"/><input type="hidden" id="sn-m" value="${mo}"/>`;
  openModal(`Editar — ${MN[mo]} ${y}`,body,'saveSimpleSnap()','Guardar');
}
function saveSimpleSnap(){
  const y=+document.getElementById('sn-y')?.value;
  const mo=+document.getElementById('sn-m')?.value;
  const val=+document.getElementById('sn-val')?.value;
  if(!val){ntf('Introduce un valor');return;}
  const u2=JSON.parse(JSON.stringify(S.user));
  if(!u2.patrimonioReal) u2.patrimonioReal={};
  if(!u2.patrimonioReal[y]) u2.patrimonioReal[y]={};
  // Keep as number for backwards compat
  u2.patrimonioReal[y][mo]=val;
  persist(u2);closeModal();set({user:u2});ntf('Valor actualizado');
}

function editSnapPosition(y,mo,posId){
  const snap=(S.user.patrimonioReal||{})[y]?.[mo];
  if(!snap||!snap.positions) return;
  const pos=snap.positions.find(p=>String(p.id)===String(posId));
  if(!pos) return;
  const body=`
  <div style="margin-bottom:8px"><div style="font-weight:700">${escH(pos.nombre)}</div><div style="font-size:12px;color:var(--text2)">${escH(pos.ticker)} · Qty: ${pos.qty}</div></div>
  <div class="g2" style="margin-bottom:10px">
    <div><label class="lbl">Precio a cierre de mes (€)</label><input id="ep-precio" type="number" step="0.01" value="${pos.pA}"/></div>
    <div><label class="lbl">Valor total</label><div id="ep-val" style="padding:9px 11px;background:var(--bg3);border-radius:8px;font-weight:700;font-size:14px">${fE(pos.val)}</div></div>
  </div>`;
  openModal(`✏️ Editar precio — ${escH(pos.nombre)}`,body,`saveSnapPosition(${y},${mo},'${posId}')`, 'Guardar');
  setTimeout(()=>{
    const el=document.getElementById('ep-precio');
    if(el) el.oninput=()=>{const v=document.getElementById('ep-val');if(v)v.textContent=fE(pos.qty*(+el.value||0));};
  },50);
}
function saveSnapPosition(y,mo,posId){
  const precio=+document.getElementById('ep-precio')?.value||0;
  const u2=JSON.parse(JSON.stringify(S.user));
  const snap=u2.patrimonioReal?.[y]?.[mo];
  if(!snap||!snap.positions) return;
  const idx=snap.positions.findIndex(p=>String(p.id)===String(posId));
  if(idx>=0){
    snap.positions[idx].pA=precio;
    snap.positions[idx].val=snap.positions[idx].qty*precio;
    // Recalculate total
    snap.total=snap.positions.reduce((s,p)=>s+p.val,0)+(snap.saldo||0)-(snap.deudas||0);
  }
  persist(u2);closeModal();set({user:u2});ntf('Precio actualizado');
}

function openEditSnap(){ openConsolidateMes(); }

function delConsolidation(y,mo){
  if(!confirm(`¿Eliminar la consolidación de ${MN[mo]} ${y}?`)) return;
  const u2=JSON.parse(JSON.stringify(S.user));
  if(u2.patrimonioReal?.[y]?.[mo]!==undefined){
    delete u2.patrimonioReal[y][mo];
    if(Object.keys(u2.patrimonioReal[y]).length===0) delete u2.patrimonioReal[y];
  }
  persist(u2);set({user:u2});ntf('Consolidación eliminada');
}

function saveSnap(){
  const y=+document.getElementById('sn-y')?.value;
  const mo=+document.getElementById('sn-m')?.value;
  const val=+document.getElementById('sn-val')?.value;
  if(!val){ntf('Introduce un valor');return;}
  const u2=JSON.parse(JSON.stringify(S.user));
  if(!u2.patrimonioReal) u2.patrimonioReal={};
  if(!u2.patrimonioReal[y]) u2.patrimonioReal[y]={};
  u2.patrimonioReal[y][mo]=val;
  persist(u2);closeModal();set({user:u2});ntf('Patrimonio actualizado');
}

function quickSnap(y,mo,theo){
  openConsolidateMes();
}

// ─── PROFILE TEST ─────────────────────────────────────────────────────────────
function openProfileTest(){
  const existing=S.user.profileAnswers||{};
  const body=`<div id="ptest-body">${renderProfileQ(0,existing)}</div>`;
  openModal('🎯 Test Perfil Inversor',body,null,'');
  window._pAnswers={...existing};
}
function renderProfileQ(step,answers){
  const q=PROFILE_QUESTIONS[step];
  const isLast=step===PROFILE_QUESTIONS.length-1;
  return `<div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:4px">Pregunta ${step+1} de ${PROFILE_QUESTIONS.length}</div>
    <div style="font-weight:700;font-size:14px;margin-bottom:14px">${q.q}</div>
    ${q.opts.map((o,i)=>`<div onclick="selectPQ(${step},${i})"
      style="padding:10px 14px;background:${answers[q.id]===i?'rgba(108,99,255,.2)':'var(--bg3)'};border:1px solid ${answers[q.id]===i?'var(--accent)':'var(--border)'};border-radius:9px;cursor:pointer;margin-bottom:7px;font-size:13px;transition:all .2s"
      onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='${answers[q.id]===i?'var(--accent)':'var(--border)'}'">
      ${o.label}
    </div>`).join('')}
    <div style="display:flex;justify-content:space-between;margin-top:16px">
      ${step>0?`<button class="bo" onclick="navPQ(${step-1})" style="padding:7px 13px">← Anterior</button>`:'<div></div>'}
      ${isLast?`<button class="ba" onclick="finishProfile()" style="padding:7px 16px">Ver mi perfil →</button>`:`<button class="ba" onclick="navPQ(${step+1})" style="padding:7px 13px">Siguiente →</button>`}
    </div>
  </div>`;
}
function selectPQ(step,optIdx){
  const q=PROFILE_QUESTIONS[step];
  window._pAnswers[q.id]=optIdx;
  document.getElementById('ptest-body').innerHTML=renderProfileQ(step,window._pAnswers);
}
function navPQ(step){
  document.getElementById('ptest-body').innerHTML=renderProfileQ(step,window._pAnswers||{});
}
function finishProfile(){
  const ans=window._pAnswers||{};
  let score=0;
  PROFILE_QUESTIONS.forEach(q=>{
    const idx=ans[q.id];
    if(idx!=null)score+=q.opts[idx].pts;
  });
  const prof=scoreToProfile(score);
  document.getElementById('ptest-body').innerHTML=`
    <div style="text-align:center;padding:20px 0">
      <div style="font-size:14px;color:var(--text2);margin-bottom:8px">Tu puntuación: <b>${score}/60</b></div>
      <div style="font-size:28px;font-weight:800;color:${prof.color};margin-bottom:6px">${prof.label}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px">${prof.desc||''}</div>
      <div class="g2" style="margin-bottom:16px;text-align:left">
        <div style="background:var(--bg3);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:11px;color:var(--text2)">Renta Variable</div>
          <div style="font-size:22px;font-weight:700;color:var(--accent)">${prof.rvMin||0}–${prof.rvMax||0}%</div>
          <div style="font-size:10px;color:var(--text2);margin-top:2px">Rango Renta4</div>
        </div>
        <div style="background:var(--bg3);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:11px;color:var(--text2)">Renta Fija</div>
          <div style="font-size:22px;font-weight:700;color:var(--blue)">${prof.rfMid||0}%</div>
          <div style="font-size:10px;color:var(--text2);margin-top:2px">Peso típico</div>
        </div>
        <div style="background:var(--bg3);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:11px;color:var(--text2)">Rentabilidad esperada</div>
          <div style="font-size:22px;font-weight:700;color:${prof.color}">${prof.retExp}%/año</div>
          <div style="font-size:10px;color:var(--text2);margin-top:2px">Fuente: Renta4</div>
        </div>
        <div style="background:var(--bg3);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:11px;color:var(--text2)">Desv. estándar (σ)</div>
          <div style="font-size:22px;font-weight:700;color:var(--purple)">±${prof.std}%</div>
          <div style="font-size:10px;color:var(--text2);margin-top:2px">Volatilidad anual</div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:16px;padding:10px;background:var(--bg3);border-radius:9px;text-align:left">
        Con el perfil <b style="color:${prof.color}">${prof.label}</b> (datos Renta4):<br>
        · Escenario base: <b>${prof.retExp}%</b>/año<br>
        · ±1σ (68% prob.): <b>${(prof.retExp-prof.std).toFixed(1)}% a ${(prof.retExp+prof.std).toFixed(1)}%</b><br>
        · ±2σ (95% prob.): <b>${(prof.retExp-2*prof.std).toFixed(1)}% a ${(prof.retExp+2*prof.std).toFixed(1)}%</b>
      </div>
      <button class="ba" onclick="applyProfile('${prof.id}',${score})" style="width:100%;padding:11px;font-size:14px;font-weight:600">Aplicar este perfil</button>
    </div>`;
}
function applyProfile(profId,score){
  const u2={...S.user,profileId:profId,profileScore:score,profileAnswers:window._pAnswers||S.user.profileAnswers||{}};
  persist(u2);closeModal();set({user:u2});ntf('✓ Perfil guardado: '+getProfile(profId).label);
}
function changeProfile(profId){
  const u2={...S.user,profileId:profId};
  persist(u2);set({user:u2});ntf('Perfil: '+getProfile(profId).label);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
if(!LS.users().find(u=>u.id===DEMO.id)){const users=LS.users();users.unshift(DEMO);LS.saveUsers(users);}
render();
</script>
</body>
