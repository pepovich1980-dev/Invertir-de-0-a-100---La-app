/* ── Buttons ── */
button{cursor:pointer;border:none;border-radius:var(--rS);font-size:13px;font-weight:500;padding:8px 14px;transition:all .2s;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation;white-space:nowrap}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:var(--pad);box-shadow:0 2px 12px rgba(0,0,0,.3)}

self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/')))));`;

// ─── RISK PROFILES — Fuente: Excel Perfil Inversor Renta4 ────────────────────

const TODAY = new Date();
const CUR_YEAR = TODAY.getFullYear(); // 2026
const CUR_MONTH = TODAY.getMonth();

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function genBD() {
  const d={};
  // Generate data for 2023,2024,2025,2026
  for(let y=2023;y<=CUR_YEAR;y++) {
    d[y]={};
    const maxM = y < CUR_YEAR ? 11 : CUR_MONTH;
    for(let m=0;m<=maxM;m++) {
      const cats={};
      DEFAULT_CATS.forEach(cat => {
        cat.items.forEach(item => {
          cats[item] = { p: Math.round(100+Math.random()*400), r: Math.round(100+Math.random()*450) };
        });
      });
      d[y][m] = {
        cats,
        ingP: 5000,
        ingR: Math.round(5000+(Math.random()-.5)*600)
      };
    }
  }
  return d;
}

// ─── SECURE PER-USER STORAGE ─────────────────────────────────────────────────
// Each user's data stored under a separate key derived from their ID+pass hash.
// The global user index only stores {id, email, name, keyHint} — no sensitive data.
// Other users cannot read each other's data.
function simpleHash(s){let h=0;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return(h>>>0).toString(36);}
function userStorageKey(u){return 'fa_ud_'+simpleHash(String(u.id)+'|'+u.pass);}
function sessionKey(){return 'fa_sess';}

const LS = {
  // Index: only public info (id, email, name) — no passwords, no data
  index:()=>{try{return JSON.parse(localStorage.getItem('fa_idx')||'[]');}catch(e){return[];}},
  saveIndex:idx=>{try{localStorage.setItem('fa_idx',JSON.stringify(idx));}catch(e){}},
  // Per-user encrypted data (keyed by hash of id+pass)
  loadUser:u=>{try{const raw=localStorage.getItem(userStorageKey(u));return raw?JSON.parse(raw):null;}catch(e){return null;}},
  saveUserData:u=>{try{localStorage.setItem(userStorageKey(u),JSON.stringify(u));}catch(e){}},
  deleteUserData:u=>{try{localStorage.removeItem(userStorageKey(u));}catch(e){}},
  // Session stores full user object (in memory effectively, cleared on logout)
  session:()=>{try{return JSON.parse(sessionStorage.getItem(sessionKey())||'null');}catch(e){return null;}},
  saveSession:u=>{try{sessionStorage.setItem(sessionKey(),JSON.stringify(u));}catch(e){}},
  clearSession:()=>{try{sessionStorage.removeItem(sessionKey());}catch(e){}},
  // Compat helpers used elsewhere
  users:()=>{
    // Returns only the user list for login matching (no data, just index)
    // We need pass to verify login — stored hashed in index
    try{return JSON.parse(localStorage.getItem('fa_idx_full')||'null')||[DEMO];}catch(e){return[DEMO];}
  },
  saveUsers:idx=>{try{localStorage.setItem('fa_idx_full',JSON.stringify(idx));}catch(e){}},
};
function persist(u){
  LS.saveUserData(u);
  LS.saveSession(u);
  // Update public index
  const idx=LS.users();
  const i=idx.findIndex(x=>x.id===u.id);
  const entry={id:u.id,email:u.email,name:u.name,pass:u.pass};// pass kept for login verify only
  if(i>=0)idx[i]=entry; else idx.push(entry);
  LS.saveUsers(idx);
}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const f2=n=>isNaN(n)||n==null?'0':new Intl.NumberFormat('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);

const fP=(n,d=1)=>`${n>=0?'+':''}${isNaN(n)||n==null?'0':n.toFixed(d)}%`;
const pct=(a,b)=>b?((a-b)/b*100):0;
const cl=(v,a,b)=>Math.max(a,Math.min(b,v));

// ─── SVG CHARTS ───────────────────────────────────────────────────────────────
function svgBar(data,keys,colors,h=220){
  const W=600,H=h,pl=58,pr=10,pt=14,pb=36;
  const iW=W-pl-pr,iH=H-pt-pb;
  const maxV=Math.max(...data.flatMap(d=>keys.map(k=>+(d[k]||0))),1);
  const bW=iW/data.length,gap=bW*.1,bW2=(bW-gap*2)/keys.length;
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;
  for(let i=0;i<=4;i++){
    const v=maxV*i/4,y=pt+iH*(1-i/4);
    s+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#2e3248" stroke-width="1"/>`;
    s+=`<text x="${pl-4}" y="${y+4}" text-anchor="end" fill="#8b8fa8" font-size="10">${v>=1000?f0(v/1000)+'k':f0(v)}</text>`;
  }
  data.forEach((d,i)=>{
    keys.forEach((k,ki)=>{
      const v=+(d[k]||0),bH=iH*(v/maxV),x=pl+i*bW+gap+ki*bW2,y=pt+iH-bH;
      s+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bW2.toFixed(1)}" height="${Math.max(0,bH).toFixed(1)}" fill="${colors[ki]}" rx="3" opacity=".9"/>`;
    });
    s+=`<text x="${(pl+i*bW+bW/2).toFixed(1)}" y="${H-pb+14}" text-anchor="middle" fill="#8b8fa8" font-size="9">${d.name||''}</text>`;
  });
  keys.forEach((k,i)=>{
    s+=`<rect x="${pl+i*100}" y="${H-9}" width="9" height="9" fill="${colors[i]}" rx="2"/>`;
    s+=`<text x="${pl+i*100+13}" y="${H-1}" fill="#8b8fa8" font-size="10">${k}</text>`;
  });
  return s+'</svg>';
}

function svgArea(data,keys,colors,h=190,showBands){
  const W=600,H=h,pl=72,pr=14,pt=14,pb=36;
  const iW=W-pl-pr,iH=H-pt-pb,n=data.length;
  if(!n||n<2)return '';
  // Y axis: scale to the main series values only (bands don't affect scale)
  const mainV=data.flatMap(d=>keys.map(k=>+(d[k]||0)).filter(v=>v>0&&!isNaN(v)));
  if(!mainV.length) return '';
  const dataMin=Math.min(...mainV);
  const dataMax=Math.max(...mainV);
  // Start Y axis 10% BELOW the minimum data value — shows curve clearly without wasting space at 0
  const minV=Math.max(0, dataMin*0.90);
  const maxV=dataMax*1.06;
  const range=maxV-minV;
  const px=i=>pl+i*iW/(n-1);
  const py=v=>pt+iH*(1-(Math.max(v,minV)-minV)/range);

  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;

  // If Y axis doesn't start at 0, show a break marker at the bottom-left
  if(minV>0){
    const yBot=pt+iH;
    // Axis break symbol (zigzag)
    s+=`<polyline points="${pl-4},${yBot-6} ${pl},${yBot-3} ${pl-4},${yBot} ${pl},${yBot+3}" fill="none" stroke="#a8927a" stroke-width="1.2"/>`;
    // "0" label faded at bottom to indicate axis doesn't start at zero
    s+=`<text x="${pl-4}" y="${(yBot+4).toFixed(1)}" text-anchor="end" fill="#a8927a" font-size="8" opacity=".5">0</text>`;
  }

  // Grid lines — 5 levels
  for(let i=0;i<=4;i++){
    const v=minV+range*i/4, y=pt+iH*(1-i/4);
    s+=`<line x1="${pl}" y1="${y.toFixed(1)}" x2="${W-pr}" y2="${y.toFixed(1)}" stroke="rgba(74,53,32,.35)" stroke-width="1"/>`;
    const lv=v>=1000000?(v/1000000).toFixed(1)+'M€':v>=1000?f0(v/1000)+'k€':f0(v)+'€';
    s+=`<text x="${pl-4}" y="${(y+3.5).toFixed(1)}" text-anchor="end" fill="#a8927a" font-size="9">${lv}</text>`;
  }

  // Smooth bezier (Catmull-Rom → Bezier, tension 0.4)
  function smoothPath(pts){
    if(pts.length<2) return '';
    let d=`M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[Math.max(i-1,0)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(i+2,pts.length-1)];
      const t=0.4;
      const cp1x=p1.x+(p2.x-p0.x)*t/2, cp1y=p1.y+(p2.y-p0.y)*t/2;
      const cp2x=p2.x-(p3.x-p1.x)*t/2, cp2y=p2.y-(p3.y-p1.y)*t/2;
      d+=` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
    }
    return d;
  }

  // Sigma bands (clipped to chart range — never extend below minV)
  if(showBands){
    [[2,'rgba(160,127,212,0.07)'],[1,'rgba(160,127,212,0.14)']].forEach(([tier,fill])=>{
      const band=data.filter(d=>d[tier===1?'std1Hi':'std2Hi']!=null);
      if(band.length<2) return;
      const hiKey=tier===1?'std1Hi':'std2Hi', loKey=tier===1?'std1Lo':'std2Lo';
      const topPts=band.map(d=>({x:px(data.indexOf(d)),y:py(Math.min(d[hiKey],maxV))}));
      const botPts=band.map(d=>({x:px(data.indexOf(d)),y:py(Math.max(d[loKey]||minV,minV))})).reverse();
      s+=`<path d="${smoothPath(topPts)} L${botPts[0].x.toFixed(1)},${botPts[0].y.toFixed(1)} ${smoothPath(botPts).slice(1)} Z" fill="${fill}" stroke="none"/>`;
    });
  }

  // Main series curves
  const base=py(minV);
  keys.forEach((k,ki)=>{
    const pts=data.map((d,i)=>{
      const v=d[k];
      if(v==null||isNaN(+v)||+v<=0) return null;
      return{x:px(i),y:py(+v),isYearEnd:!!d.name};
    }).filter(Boolean);
    if(pts.length<2) return;
    const line=smoothPath(pts);
    const first=pts[0],last=pts[pts.length-1];
    const gradId=`ag${ki}g`;
    // Dashed style for "Capital Aportado" line (last series)
    const isDashed=k==='Capital Aportado';
    if(!isDashed){
      s+=`<defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${colors[ki]}" stop-opacity=".25"/>
        <stop offset="100%" stop-color="${colors[ki]}" stop-opacity=".02"/>
      </linearGradient></defs>`;
      s+=`<path d="${line} L${last.x.toFixed(1)},${base.toFixed(1)} L${first.x.toFixed(1)},${base.toFixed(1)} Z" fill="url(#${gradId})"/>`;
    }
    s+=`<path d="${line}" fill="none" stroke="${colors[ki]}" stroke-width="${isDashed?1.8:2.5}" stroke-linejoin="round" ${isDashed?'stroke-dasharray="6,4"':''}/>`;
    // Dots only at year-end points (where d.name is set) to avoid clutter
    pts.filter(p=>p.isYearEnd).forEach(p=>{
      s+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${isDashed?2.5:3.5}" fill="${colors[ki]}" stroke="var(--card,#2a1f12)" stroke-width="1.5"/>`;
    });
  });

  // X axis labels — only year-end points
  data.forEach((d,i)=>{
    if(d.name) s+=`<text x="${px(i).toFixed(1)}" y="${H-pb+14}" text-anchor="middle" fill="#a8927a" font-size="9">${d.name}</text>`;
  });

  // Legend
  const legKeys=[...keys,...(showBands?['±1σ','±2σ']:[])];
  const legColors=[...colors,...(showBands?['#a07fd4','#a07fd4']:[])];
  legKeys.forEach((k,i)=>{
    const lx=pl+i*110;
    if(lx+100>W) return;
    const isDashed=k==='Capital Aportado';
    if(isDashed){
      s+=`<line x1="${lx}" y1="${H-pb+24}" x2="${lx+9}" y2="${H-pb+24}" stroke="${legColors[i]}" stroke-width="2" stroke-dasharray="3,2"/>`;
    } else {
      s+=`<rect x="${lx}" y="${H-pb+20}" width="9" height="9" fill="${legColors[i]}" rx="2" opacity="${i>=keys.length?0.4:1}"/>`;
    }
    s+=`<text x="${lx+13}" y="${H-pb+28}" fill="#a8927a" font-size="10">${k}</text>`;
  });

  return s+'</svg>';
}

function svgPie(data,size=190){
  const S=size,cx=S/2,cy=S/2,R=S*.43,ri=S*.22;
  const total=data.reduce((s,d)=>s+(d.value||0),0)||1;
  let ang=-Math.PI/2,s=`<svg viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${S}px;height:auto;display:block">`;
  data.forEach((d,i)=>{
    const sw=2*Math.PI*(d.value/total);
    const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang);
    const x2=cx+R*Math.cos(ang+sw),y2=cy+R*Math.sin(ang+sw);
    const xi1=cx+ri*Math.cos(ang),yi1=cy+ri*Math.sin(ang);
    const xi2=cx+ri*Math.cos(ang+sw),yi2=cy+ri*Math.sin(ang+sw);
    const lg=sw>Math.PI?1:0;
    s+=`<path d="M${xi1.toFixed(1)},${yi1.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${ri},${ri} 0 ${lg},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z" fill="${PC[i%PC.length]}" opacity=".9"/>`;
    const pv=Math.round(d.value/total*100);
    if(pv>5){const ma=ang+sw/2;s+=`<text x="${(cx+R*.7*Math.cos(ma)).toFixed(1)}" y="${(cy+R*.7*Math.sin(ma)).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="10" font-weight="600">${pv}%</text>`;}
    ang+=sw;
  });
  return s+'</svg>';
}

function doLogin(){
  const e=document.getElementById('ae').value.trim(),p=document.getElementById('ap').value;
  const entry=LS.users().find(x=>x.email===e&&x.pass===p);
  if(!entry){document.getElementById('aerr').textContent='Email o contraseña incorrectos';return;}
  const full=LS.loadUser(entry)||entry;
  LS.saveSession(full);set({user:full,tab:0});
}
function doReg(){
  const n=document.getElementById('an')?.value.trim(),e=document.getElementById('ae').value.trim(),p=document.getElementById('ap').value;
  const pin=document.getElementById('apin')?.value.trim();
  const err=document.getElementById('aerr');
  if(!n||!e||!p){err.textContent='Rellena todos los campos';return;}
  if(p.length<6){err.textContent='La contraseña debe tener al menos 6 caracteres';return;}
  if(!pin||!/^\d{4}$/.test(pin)){err.textContent='El PIN debe ser exactamente 4 dígitos numéricos';return;}
  const users=LS.users();
  if(users.find(x=>x.email===e)){err.textContent='Email ya registrado';return;}
  const u={id:Date.now(),email:e,pass:p,pin,name:n,titulares:[{id:'t1',nombre:'Titular principal',tipo:'individual'}],profileAnswers:{},profileScore:0,profileId:'moderado',customCats:JSON.parse(JSON.stringify(DEFAULT_CATS)),bd:{[CUR_YEAR]:{}},inv:[],loans:[],saldo:0,patrimonioReal:{}};
  users.push(u);LS.saveUsers(users);LS.saveSession(u);set({user:u,tab:0});
}
function doRecover(){
  const e=document.getElementById('re').value.trim();
  const pin=document.getElementById('rpin').value.trim();
  const np=document.getElementById('rnp').value;
  const np2=document.getElementById('rnp2').value;
  const err=document.getElementById('aerr');
  if(!e||!pin||!np||!np2){err.textContent='Rellena todos los campos';return;}
  if(np.length<6){err.textContent='La nueva contraseña debe tener al menos 6 caracteres';return;}
  if(np!==np2){err.textContent='Las contraseñas no coinciden';return;}
  if(!/^\d{4}$/.test(pin)){err.textContent='El PIN debe ser 4 dígitos';return;}
  const users=LS.users();
  const idx=users.findIndex(x=>x.email===e);
  if(idx<0){err.textContent='No existe ninguna cuenta con ese email';return;}
  const entry=users[idx];
  if(entry.pin!==pin){err.textContent='PIN incorrecto';return;}
  // Update password
  users[idx].pass=np;
  LS.saveUsers(users);
  // Also update in private storage if exists
  const full=LS.loadUser(entry);
  if(full){full.pass=np;LS.saveUserData(full);}
  // Auto-login
  const updatedFull=LS.loadUser(users[idx])||users[idx];
  LS.saveSession(updatedFull);
  set({user:updatedFull,tab:0});
  ntf('✓ Contraseña cambiada correctamente');
}

// ─── EXPORT TO EXCEL ──────────────────────────────────────────────────────────
function exportExcel(){
  const u=S.user;
  const userCats=getUserCats(u);
  const allItems=getAllItems(u);
  const tits=u.titulares||[];
  function titName(id){const t=tits.find(x=>x.id===id);return t?t.nombre:id||'';}

  // Build CSV content for each sheet, then package into a multi-sheet Excel-compatible file
  // We'll use the SpreadsheetML XML format (opens natively in Excel)
  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const cell=(v,t='String')=>`<Cell><Data ss:Type="${t}">${esc(String(v))}</Data></Cell>`;
  const num=(v)=>`<Cell><Data ss:Type="Number">${isNaN(v)?0:Number(v).toFixed(2)}</Data></Cell>`;
  const bold=(v)=>`<Cell ss:StyleID="bold"><Data ss:Type="String">${esc(String(v))}</Data></Cell>`;
  const head=(...cols)=>`<Row>${cols.map(bold).join('')}</Row>`;

  // Sheet 1 — Presupuesto (all years/months)
  let s1=head('Año','Mes','Categoría','Subcategoría','Presupuestado (€)','Real (€)','Desviación (€)');
  const bd=u.bd||{};
  Object.keys(bd).sort().forEach(y=>{
    Object.keys(bd[y]).sort((a,b)=>+a-+b).forEach(mo=>{
      const md=bd[y][mo]||{cats:{},ingP:0,ingR:0};
      s1+=`<Row>${cell(y)}${cell(MN[mo])}${cell('INGRESOS')}${cell('Total ingresos')}${num(md.ingP)}${num(md.ingR)}${num((md.ingR||0)-(md.ingP||0))}</Row>`;
      userCats.forEach(cat=>{
        cat.items.forEach(it=>{
          const cv=md.cats[it]||{p:0,r:0};
          s1+=`<Row>${cell(y)}${cell(MN[mo])}${cell(cat.cat)}${cell(it)}${num(cv.p)}${num(cv.r)}${num((cv.r||0)-(cv.p||0))}</Row>`;
        });
      });
    });
  });

  // Sheet 2 — Inversiones abiertas
  let s2=head('Nombre','Ticker','Tipo','Titular','Cantidad','P.Compra (€)','P.Actual (€)','Invertido (€)','Valor actual (€)','Ganancia (€)','Rentab. %','Origen','Fecha compra');
  (u.inv||[]).filter(i=>i.abierta!==false).forEach(i=>{
    const iv=i.qty*i.pC,av=i.qty*i.pA,g=av-iv,p=iv?((g/iv)*100):0;
    s2+=`<Row>${cell(i.nombre)}${cell(i.ticker)}${cell(i.tipo)}${cell(titName(i.titularId))}${num(i.qty)}${num(i.pC)}${num(i.pA)}${num(iv)}${num(av)}${num(g)}${num(p)}${cell(i.origen)}${cell(i.fecha)}</Row>`;
  });

  // Sheet 3 — Posiciones cerradas
  let s3=head('Nombre','Ticker','Titular','Cantidad','P.Compra','P.Cierre','Invertido','Cerrado','Ganancia','Rentab. %','Fecha cierre','Nota');
  (u.inv||[]).filter(i=>i.abierta===false).forEach(i=>{
    const iv=i.qty*i.pC,cv=i.qty*(i.pCierre||i.pA),g=cv-iv,p=iv?((g/iv)*100):0;
    s3+=`<Row>${cell(i.nombre)}${cell(i.ticker)}${cell(titName(i.titularId))}${num(i.qty)}${num(i.pC)}${num(i.pCierre||i.pA)}${num(iv)}${num(cv)}${num(g)}${num(p)}${cell(i.fechaCierre||'')}${cell(i.notaCierre||'')}</Row>`;
  });

  // Sheet 4 — Préstamos
  let s4=head('Nombre','Tipo','Titular','Capital orig. (€)','Pendiente (€)','Cuota/mes (€)','Tipo interés %','Inicio','Vencimiento');
  (u.loans||[]).forEach(l=>{
    s4+=`<Row>${cell(l.nombre)}${cell(l.tipoP)}${cell(titName(l.titularId))}${num(l.capital)}${num(l.pendiente)}${num(l.cuota)}${num(l.tipo)}${cell(l.inicio)}${cell(l.fin)}</Row>`;
  });

  // Sheet 5 — Patrimonio mensual
  let s5=head('Año','Mes','Patrimonio Teórico (€)','Patrimonio Real (€)','Desviación (€)','Desviación %');
  const pr=u.patrimonioReal||{};
  const invs=u.inv||[],loans2=u.loans||[];
  const totA=invs.filter(i=>i.abierta!==false).reduce((s,i)=>s+i.qty*i.pA,0);
  const totD=loans2.reduce((s,l)=>s+l.pendiente,0);
  const saldo=u.saldo||0,patriNeto=totA-totD+saldo;
  const prof=getProfile(u.profileId||'moderado');
  const r=prof.retExp/100;
  let ahorroAnual=6000;
  try{const yrs=Object.keys(bd).map(Number);if(yrs.length){const last=Math.max(...yrs),meses=Object.values(bd[last]||{});const sum=meses.reduce((s,m)=>s+(m.ingP||0)-allItems.reduce((ss,it)=>ss+(m.cats[it]?.p||0),0),0);if(sum>200)ahorroAnual=sum;}}catch(e){}
  Object.keys(pr).sort().forEach(y=>{
    Object.keys(pr[y]).sort((a,b)=>+a-+b).forEach(mo=>{
      const real=pr[y][mo];
      const mIdx=(+y-2025)*12+(+mo);
      const theo=mIdx>=0?Math.round(patriNeto*Math.pow(1+r,mIdx/12)+ahorroAnual*((Math.pow(1+r,mIdx/12)-1)/(r||0.001))):patriNeto;
      const dev=real-theo,devP=theo?dev/theo*100:0;
      s5+=`<Row>${cell(y)}${cell(MN[+mo])}${num(theo)}${num(real)}${num(dev)}${num(devP)}</Row>`;
    });
  });

  const styles=`<Styles><Style ss:ID="bold"><Font ss:Bold="1"/></Style></Styles>`;
  const xml=`<?xml version="1.0" encoding="UTF-8"?><?mso-application progid="Excel.Sheet"?>

</Workbook>`;

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(title,body,confirmFn,confirmLabel,wide){
  const d=document.createElement('div');d.className='mbg';d.id='modal';
  d.innerHTML=`<div class="mbox" style="${wide?'max-width:700px':''}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:15px;font-weight:700">${title}</div>
      <button class="bo" onclick="closeModal()" style="padding:4px 9px">✕</button>
    </div>
    ${body}
    <div class="fmb">
      <button class="bo" onclick="closeModal()">Cancelar</button>
      ${confirmFn?`<button class="ba" onclick="${confirmFn}">${confirmLabel||'Guardar'}</button>`:''}
    </div>
  </div>`;
  // Only close on backdrop click for non-form modals (wide=true means form with many inputs)
  if(!wide){
    d.addEventListener('click',e=>{if(e.target===d)closeModal();});
  }
  document.body.appendChild(d);
}
function closeModal(){const m=document.getElementById('modal');if(m)m.remove();}
function ntf(msg){const d=document.createElement('div');d.className='ntf';d.textContent='✓ '+msg;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}

        <div style="display:flex;gap:12px">

    <!-- Leyenda -->
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;padding:8px 10px;background:var(--bg3);border-radius:8px;font-size:11px;color:var(--text2)">

    </div>
  </div>
  </div>`;

// ─── PIE with custom colors ────────────────────────────────────────────────────
function svgPieColored(data, colorMap, size=185){
  const S=size,cx=S/2,cy=S/2,R=S*.43,ri=S*.22;
  const total=data.reduce((s,d)=>s+(d.value||0),0)||1;
  let ang=-Math.PI/2;
  let s=`<svg viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${S}px;height:auto;display:block">`;
  data.forEach((d,i)=>{
    const sw=2*Math.PI*(d.value/total);
    const col=colorMap&&colorMap[d.name]?colorMap[d.name]:PC[i%PC.length];
    const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang);
    const x2=cx+R*Math.cos(ang+sw),y2=cy+R*Math.sin(ang+sw);
    const xi1=cx+ri*Math.cos(ang),yi1=cy+ri*Math.sin(ang);
    const xi2=cx+ri*Math.cos(ang+sw),yi2=cy+ri*Math.sin(ang+sw);
    const lg=sw>Math.PI?1:0;
    s+=`<path d="M${xi1.toFixed(1)},${yi1.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${ri},${ri} 0 ${lg},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z" fill="${col}" opacity=".9"/>`;
    const pv=Math.round(d.value/total*100);
    if(pv>5){const ma=ang+sw/2;s+=`<text x="${(cx+R*.7*Math.cos(ma)).toFixed(1)}" y="${(cy+R*.7*Math.sin(ma)).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="10" font-weight="700">${pv}%</text>`;}
    ang+=sw;
  });
  return s+'</svg>';
}

function buildDistributions(positions, tits, byTit){
  if(!positions.length) return '<div class="card" style="margin-bottom:13px;text-align:center;color:var(--text2);padding:24px">Sin posiciones para mostrar con los filtros actuales.</div>';
  const total=positions.reduce((s,i)=>s+i.qty*(i.pA||0),0)||1;

  // ── By asset class ──
  const byClass={};
  positions.forEach(i=>{
    const cl=normClass(i.tipo);
    if(!byClass[cl])byClass[cl]={val:0,cost:0,count:0};
    byClass[cl].val+=i.qty*(i.pA||0);
    byClass[cl].cost+=i.qty*(i.pC||0);
    byClass[cl].count++;
  });
  const classPie=Object.entries(byClass).map(([k,v])=>({name:k,value:Math.round(v.val)})).sort((a,b)=>b.value-a.value);

  // ── By entity ──
  const byEnt={};
  positions.forEach(i=>{
    const ent=i.entidad||'Sin entidad';
    if(!byEnt[ent])byEnt[ent]={val:0,cost:0,count:0};
    byEnt[ent].val+=i.qty*(i.pA||0);
    byEnt[ent].cost+=i.qty*(i.pC||0);
    byEnt[ent].count++;
  });
  const entPie=Object.entries(byEnt).map(([k,v])=>({name:k,value:Math.round(v.val)})).sort((a,b)=>b.value-a.value);
  const entColors=['#d28a3f','#5b9bd5','#4caf7d','#c03c3b','#a07fd4','#e8a84a','#6bbfa0','#a8927a','#c0a87a'];
  const entColorMap={};
  entPie.forEach((d,i)=>entColorMap[d.name]=entColors[i%entColors.length]);

  // ── By titular ──
  const titPie=tits.map((t,i)=>({name:t.nombre,value:Math.round(byTit[t.id]?.a||0),color:PC[i%PC.length]})).filter(d=>d.value>0);
  const titColorMap={};titPie.forEach(d=>titColorMap[d.name]=d.color);

  function distLegend(data,colorMap){
    const tot=data.reduce((s,d)=>s+d.value,0)||1;
    return data.map((d,i)=>{
      const col=colorMap&&colorMap[d.name]?colorMap[d.name]:PC[i%PC.length];
      const pctV=Math.round(d.value/tot*100);
      return `<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px">
        <div style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0"></div>
        <span style="flex:1;font-size:12px;color:var(--text)">${escH(d.name)}</span>
        <div style="text-align:right">
          <span style="font-size:11px;color:var(--text2);margin-right:6px">${pctV}%</span>
          <span style="font-size:12px;font-weight:600">${fE(d.value)}</span>
        </div>
      </div>`;
    }).join('');
  }

  function barBreakdown(entries, colorMap){
    const tot=entries.reduce((s,[,v])=>s+v.val,0)||1;
    return entries.map(([k,v])=>{

    ${valSin>0?`<div style="background:var(--bg3);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:12px;cursor:pointer;border:${projFilt==='sin_proyecto'?'1px solid var(--gold)':'1px solid var(--border)'}" onclick="set({iProjFilter:projFilt==='sin_proyecto'?null:'sin_proyecto',iView:'cartera'})">

  }

  // Build header (no nested backticks for compatibility)
  const projBtn = iView==='proyectos' ? '<button class="ba" onclick="openAddProject()" style="font-size:12px;padding:6px 10px">+ Proyecto</button>' : '';
  const projFilterBanner = (iView==='cartera' && projFilt)

// Calcular capital pendiente dado n meses desde la fecha de inicio (sistema francés)
function loanPrincipalAtYearMonths(loan, meses){
  const p0=loan.pendiente||0;
  if(meses<=0) return p0;
  const ri=(loan.tipo||0)/100/12;
  const cuota=loan.cuota||0;
  const plazo=loan.plazoMeses||Math.max(1,Math.round(p0/Math.max(cuota,1)));
  if(meses>=plazo) return 0;
  if(ri<0.0001) return Math.max(0,p0-cuota*meses);
  const rem=p0*Math.pow(1+ri,meses)-cuota*(Math.pow(1+ri,meses)-1)/ri;
  return Math.max(0,Math.round(rem));
}

// Actualizar el pendiente automáticamente según la amortización desde inicio
function amortizeLoan(id){
  const u2=JSON.parse(JSON.stringify(S.user));
  const loan=u2.loans.find(l=>l.id===id);
  if(!loan){ntf('Préstamo no encontrado');return;}
  if(!loan.inicio){ntf('El préstamo no tiene fecha de inicio. Edítalo primero.');return;}
  const mesesTranscurridos=Math.max(0,Math.round((Date.now()-new Date(loan.inicio))/(30.44*24*3600*1000)));
  const nuevoPendiente=loanPrincipalAtYearMonths(loan,mesesTranscurridos);
  const anterior=loan.pendiente;
  loan.pendiente=nuevoPendiente;
  persist(u2);set({user:u2});
  ntf(`Pendiente actualizado: ${fE(anterior)} → ${fE(nuevoPendiente)} (${mesesTranscurridos} meses amortizados)`);
}

function elCalcPreview(){
  const pendiente=+document.getElementById('el-pendiente')?.value||0;
  const tipo=+document.getElementById('el-tipo-i')?.value||0;
  const plazoAnios=+document.getElementById('el-plazo')?.value||0;
  const plazoMeses=Math.round(plazoAnios*12);
  const cuotaManual=+document.getElementById('el-cuota')?.value||0;
  const cuotaCalc=calcCuotaFrances(pendiente,tipo,plazoMeses);
  const cuota=cuotaManual>0?cuotaManual:cuotaCalc;
  const calcEl=document.getElementById('el-cuota-calc');
  const sumEl=document.getElementById('el-summary');
  if(calcEl) calcEl.textContent=cuotaCalc>0?f2(cuotaCalc)+' €/mes':'—';
  if(sumEl&&pendiente>0&&cuota>0&&plazoMeses>0){
    const totalPagado=cuota*plazoMeses;
    const intereses=totalPagado-pendiente;
    sumEl.style.display='block';

function amortizeAllLoans(){
  const u2=JSON.parse(JSON.stringify(S.user));
  let updated=0, total=0;
  u2.loans.forEach(loan=>{
    if(!loan.inicio) return;
    const mesesTranscurridos=Math.max(0,Math.round((Date.now()-new Date(loan.inicio))/(30.44*24*3600*1000)));
    if(mesesTranscurridos<=0) return;
    const nuevo=loanPrincipalAtYearMonths(loan,mesesTranscurridos);
    const anterior=loan.pendiente;
    if(Math.abs(nuevo-anterior)>1){
      loan.pendiente=nuevo;
      updated++;
      total+=anterior-nuevo;
    }
  });
  persist(u2);set({user:u2});
  if(updated>0) ntf(`↻ ${updated} préstamo${updated>1?'s':''} actualizados · Amortizado: ${fE(total)}`);
  else ntf('Los pendientes ya están al día');
}

// ─── P&L and TIR analytics ────────────────────────────────────────────────────
// Newton-Raphson IRR on irregular cash flows [{t: Date, cf: number}]
function calcIRR(flows){
  if(!flows||flows.length<2) return null;
  // Normalise to years from first date
  const t0=flows[0].t;
  const yf=flows.map(f=>({y:(f.t-t0)/(365.25*24*3600*1000),cf:f.cf}));
  let r=0.1;
  for(let i=0;i<200;i++){
    let npv=0,dnpv=0;
    yf.forEach(({y,cf})=>{
      const d=Math.pow(1+r,y);
      npv+=cf/d;
      dnpv-=y*cf/Math.pow(1+r,y+1);
    });
    if(Math.abs(dnpv)<1e-12) break;
    const nr=r-npv/dnpv;
    if(Math.abs(nr-r)<1e-9){r=nr;break;}
    r=nr;
  }
  return isFinite(r)?r*100:null;
}

function invCostPreview(){
  const qty=+document.getElementById('iq2')?.value||0;

  const cash=+document.getElementById('icash')?.value||0;
  const coste=qty*pc;
  const saldo=S.user.saldo||0;
  const saldoConCash=saldo+cash;
  const prev=document.getElementById('inv-cost-preview');
  if(!prev) return;
  if(coste>0){
    prev.style.display='block';
    const puedeConSaldo=saldoConCash>=coste;
    prev.innerHTML=`
      <div style="display:flex;flex-wrap:wrap;gap:12px">
        <div><span style="color:var(--text2)">Coste total:</span> <b style="color:var(--yellow)">${fE(coste)}</b></div>

        <div><span style="color:var(--text2)">Saldo disponible:</span> <b style="color:${puedeConSaldo?'var(--green)':'var(--red)'}">${fE(saldoConCash)}</b></div>

  } else {

  }
}

function setOri(o){
  const saldo=S.user.saldo||0;
  const cash=+document.getElementById('icash')?.value||0;
  const coste=(+document.getElementById('iq2')?.value||0)*(+document.getElementById('ipc')?.value||0);
  const saldoDisp=saldo+cash;
  document.getElementById('iori').value=o;
  document.getElementById('oe').className=o==='externo'?'ba':'bo';
  document.getElementById('os').className=o==='saldo'?'ba':'bo';
  const od=document.getElementById('od');
  if(o==='externo'){
    od.innerHTML=`<span style="color:var(--blue)">💰 Capital nuevo:</span> el dinero entra desde fuera del balance → el patrimonio total aumentará en el coste de la compra.`;
  } else {
    const ok=saldoDisp>=coste;
    od.innerHTML=`<span style="color:${ok?'var(--green)':'var(--red)'}">🔄 Desde saldo:</span> se descuenta del saldo existente (${fE(saldoDisp)} disponible). ${ok?'✓ Saldo suficiente.':'⚠️ Saldo insuficiente — añade una aportación o usa "Capital nuevo".'}`;
  }
}

function saveInv(){
  const nombre=document.getElementById('in')?.value.trim();
  if(!nombre){ntf('Introduce el nombre del activo');return;}
  const qty=+document.getElementById('iq2')?.value||1;
  const pC=+document.getElementById('ipc')?.value||0;
  const pA=+document.getElementById('ipa')?.value||pC;
  const origen=document.getElementById('iori')?.value||'externo';
  const cash=+document.getElementById('icash')?.value||0;
  const coste=qty*pC;
  const u2=JSON.parse(JSON.stringify(S.user));

  // Add cash deposit first if any
  if(cash>0) u2.saldo=(u2.saldo||0)+cash;

  // Validate saldo
  if(origen==='saldo'){
    const saldoDisp=u2.saldo||0;
    if(saldoDisp<coste){
      ntf(`Saldo insuficiente: ${fE(saldoDisp)} disponible, se necesitan ${fE(coste)}`);
      return;
    }
    u2.saldo=saldoDisp-coste;
  }

  const ni={id:Date.now(),nombre,ticker:document.getElementById('it')?.value.trim()||'N/A',tipo:document.getElementById('ity')?.value||'ETF',titularId:document.getElementById('itit')?.value||'',entidad:document.getElementById('ient')?.value.trim()||'',projectId:document.getElementById('iproj')?.value||undefined,qty,pC,pA,fecha:document.getElementById('ife')?.value||'',origen,abierta:true,cashAportado:cash||0};
  u2.inv=[...(u2.inv||[]),ni];
  persist(u2);closeModal();set({user:u2});
  let msg=`Inversión añadida`;
  if(cash>0) msg+=` · Aportación +${fE(cash)}`;
  if(origen==='saldo') msg+=` · Saldo restante: ${fE(u2.saldo)}`;
  ntf(msg);
}

function norm(s){return String(s||'').toLowerCase()
  .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i')
  .replace(/[óòö]/g,'o').replace(/[úùü]/g,'u');}

function searchLocal(q){
  const ql=norm(q);
  const boost=new Set();
  Object.entries(ALIASES).forEach(([k,tks])=>{if(ql.includes(k))tks.forEach(t=>boost.add(t));});
  return ASSET_DB.map(a=>{
    const f=norm([a.n,a.t,a.d,a.tp].join(' '));
    let s=0;
    if(boost.has(a.t))s+=100;
    if(norm(a.t)===ql)s+=90;
    if(norm(a.t).startsWith(ql))s+=50;
    if(norm(a.n).includes(ql))s+=40;
    if(f.includes(ql))s+=20;
    ql.split(/\s+/).filter(w=>w.length>2).forEach(w=>{if(f.includes(w))s+=10;});
    return{a,s};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,6).map(x=>x.a);
}

// Fetch real-time price via Yahoo Finance chart endpoint (two fallback hosts)
// ─── LIVE PRICE ENGINE — multiple sources with CORS proxy fallback ───────────
const CORS_PROXY='https://corsproxy.io/?';

async function tryFetch(url, timeout=7000){
  try{
    // Simple fetch without custom headers = no CORS preflight
    // Yahoo Finance allows simple GET requests from browsers
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),timeout);
    const res=await fetch(url,{signal:ctrl.signal});
    clearTimeout(tid);
    if(!res.ok) return null;
    const text=await res.text();
    if(!text||text[0]==='<'||text[0]==='!') return null;
    return JSON.parse(text);
  }catch(e){return null;}
}

function parseYahooMeta(obj){
  try{
    const meta=obj?.chart?.result?.[0]?.meta;
    if(!meta||!(meta.regularMarketPrice>0)) return null;
    const price=meta.regularMarketPrice;
    let pct=meta.regularMarketChangePercent??null;
    if(pct==null&&meta.chartPreviousClose>0) pct=((price-meta.chartPreviousClose)/meta.chartPreviousClose)*100;
    return{price,pct,currency:meta.currency||'',name:meta.longName||meta.shortName||''};
  }catch(e){return null;}
}

async function mktFetchOne(sym,fallbackName){
  const enc=encodeURIComponent(sym);
  let r=null;

  // Approach A: Yahoo Finance with crumb (best, works when cookies present)
  if(!r && window._yfCrumb){
    try{
      const d=await tryFetch(`https://query1.finance.yahoo.com/v8/finance/chart/${enc}?interval=1d&range=5d&crumb=${encodeURIComponent(window._yfCrumb)}`,5000);
      r=parseYahooMeta(d);
    }catch(e){}
  }

  // Approach B: Yahoo direct (works on many networks/browsers)
  if(!r){
    try{
      const d=await tryFetch(`https://query1.finance.yahoo.com/v8/finance/chart/${enc}?interval=1d&range=5d`,5000);
      r=parseYahooMeta(d);
      if(r) console.log('✅ Yahoo direct:', sym, r.price);

  }
  if(!r){
    try{
      const d=await tryFetch(`https://query2.finance.yahoo.com/v8/finance/chart/${enc}?interval=1d&range=5d`,5000);
      r=parseYahooMeta(d);
      if(r) console.log('✅ Yahoo q2:', sym, r.price);
    }catch(e){}
  }

  // Approach C: allorigins.win proxy
  if(!r){
    try{
      const url=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`;
      const w=await tryFetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,10000);
      if(w?.contents){
        const txt=typeof w.contents==='string'?w.contents:JSON.stringify(w.contents);
        if(txt&&txt[0]==='{'){r=parseYahooMeta(JSON.parse(txt));if(r)console.log('✅ allorigins:',sym,r.price);}
      }
    }catch(e){}
  }

  // Approach D: corsproxy.io
  if(!r){
    try{
      const url=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`;
      const d=await tryFetch(`https://corsproxy.io/?${encodeURIComponent(url)}`,10000);
      r=parseYahooMeta(d);
      if(r) console.log('✅ corsproxy:',sym,r.price);
    }catch(e){}
  }

  // Approach E: Own Vercel proxy (if user has deployed api/prices.js)
  if(!r && PRICE_PROXY){
    try{
      const d=await tryFetch(`${PRICE_PROXY}?sym=${enc}`,6000);
      if(d?.price>0){r={price:d.price,pct:d.pct,currency:d.currency||'',name:d.name||fallbackName||sym};console.log('✅ Vercel proxy:',sym,r.price);}
    }catch(e){}
  }

  // Approach F: CoinGecko for crypto (always works, no CORS)
  if(!r){
    const cmap={'BTC-EUR':'bitcoin','ETH-EUR':'ethereum','BTC-USD':'bitcoin','ETH-USD':'ethereum',
      'BNB-EUR':'binancecoin','SOL-EUR':'solana','XRP-EUR':'ripple','ADA-EUR':'cardano'};
    const cgId=cmap[sym.toUpperCase()];
    if(cgId){
      const vs=sym.toUpperCase().includes('USD')?'usd':'eur';
      try{
        const cg=await tryFetch(`https://api.coingecko.com/api/v3/simple/price?ids=${cgId}&vs_currencies=${vs}&include_24hr_change=true`,6000);
        if(cg?.[cgId]?.[vs]>0){r={price:cg[cgId][vs],pct:cg[cgId][`${vs}_24h_change`]??null,currency:vs.toUpperCase(),name:fallbackName||sym};console.log('✅ CoinGecko:',sym,r.price);}
      }catch(e){}
    }
  }

  if(!r) console.warn('❌ No price for',sym);

  if(r&&r.price>0){
    MKT_CACHE[sym]={price:r.price,pct:r.pct??null,name:r.name||fallbackName||sym,currency:r.currency||'',ts:Date.now(),multiPerf:{}};
    fetchMultiPerfForCache(sym); // async, non-blocking
  } else {
    MKT_CACHE[sym]={price:null,pct:null,name:fallbackName||sym,currency:'',ts:Date.now()-240000,multiPerf:{}};
  }
  MKT_LOADING.delete(sym);
}

async function fetchMultiPerfForCache(sym){
  const proxyBase=PRICE_PROXY.replace('/prices','');
  const periods=[
    {k:'1d',range:'5d',interval:'1d'},{k:'1w',range:'1mo',interval:'1d'},
    {k:'1mo',range:'1mo',interval:'1d'},{k:'3mo',range:'3mo',interval:'1wk'},
    {k:'ytd',range:'ytd',interval:'1mo'},{k:'1y',range:'1y',interval:'1mo'},
    {k:'3y',range:'3y',interval:'3mo'},{k:'5y',range:'5y',interval:'3mo'},
  ];
  await Promise.allSettled(periods.map(async p=>{
    try{
      const r=await tryFetch(`${proxyBase}/chart?sym=${encodeURIComponent(sym)}&range=${p.range}&interval=${p.interval}`,8000);
      if(r?.perf!=null&&MKT_CACHE[sym]){MKT_CACHE[sym].multiPerf=MKT_CACHE[sym].multiPerf||{};MKT_CACHE[sym].multiPerf[p.k]=r.perf;}
    }catch(e){}
  }));
  render();
}

async function fetchLivePrice(ticker){
  if(!ticker||ticker==='N/A') return null;
  if(!MKT_CACHE[ticker]||!MKT_CACHE[ticker].price) await mktFetchOne(ticker,ticker);
  const d=MKT_CACHE[ticker];
  return(d&&d.price>0)?{price:d.price,currency:d.currency,name:d.name,source:'cache'}:null;
}


// Refresh prices inside the consolidation modal
async function csRefreshPrices(){
  const u=S.user;
  const invs=(u.inv||[]).filter(i=>i.abierta!==false);
  const cotizados=invs.filter(i=>i.ticker&&i.ticker!=='N/A'&&normClass(i.tipo)!=='Inmueble'&&normClass(i.tipo)!=='Private Equity');
  const btn=document.getElementById('cs-refresh-btn');
  if(btn){btn.innerHTML='⏳ Actualizando...';btn.disabled=true;}
  let updated=0;
  const chunks=[];
  for(let i=0;i<cotizados.length;i+=4) chunks.push(cotizados.slice(i,i+4));
  for(const chunk of chunks){
    const results=await Promise.allSettled(chunk.map(inv=>fetchLivePrice(inv.ticker)));
    results.forEach((res,ii)=>{
      const inv=chunk[ii];
      if(res.status==='fulfilled'&&res.value?.price>0){
        const el=document.getElementById(`cs-p-${inv.id}`);
        if(el){el.value=Math.round(res.value.price*100)/100;el.style.borderColor='var(--green)';}
        updated++;
      }
    });
  }
  csUpdateTotal();
  if(btn){btn.innerHTML=`✓ ${updated} precios actualizados`;btn.style.color='var(--green)';}
}

function csUpdateTotal(){
  const u=S.user;
  const invs=(u.inv||[]).filter(i=>i.abierta!==false);
  let cartera=0;
  invs.forEach(inv=>{
    const el=document.getElementById(`cs-p-${inv.id}`);
    const pA=el?+el.value:inv.pA||0;
    const val=inv.qty*pA;
    cartera+=val;
    const velEl=document.getElementById(`cs-val-${inv.id}`);
    if(velEl) velEl.textContent=fE(val);
  });
  const saldo=+document.getElementById('cs-snap-saldo')?.value||(u.saldo||0);
  const deudas=+document.getElementById('cs-snap-deudas')?.value||((u.loans||[]).reduce((s,l)=>s+(l.pendiente||0),0));
  const total=cartera+saldo-deudas;
  const el=document.getElementById('cs-total');
  if(el) el.textContent=fE(total);
}

function saveConsolidation(){
  const y=+document.getElementById('cs-y')?.value;
  const mo=+document.getElementById('cs-m')?.value;
  const nota=document.getElementById('cs-nota')?.value||'';
  if(!y&&y!==0){ntf('Selecciona el período');return;}
  const u2=JSON.parse(JSON.stringify(S.user));
  const invs=(u2.inv||[]).filter(i=>i.abierta!==false);

  // Build position snapshot with edited prices
  const positions=invs.map(inv=>{
    const el=document.getElementById(`cs-p-${inv.id}`);
    const pA=el?Math.round(+el.value*100)/100:inv.pA||0;
    // Also update the live price in the user's inv array
    const idx=u2.inv.findIndex(x=>x.id===inv.id);
    if(idx>=0) u2.inv[idx].pA=pA;
    return {id:inv.id,nombre:inv.nombre,ticker:inv.ticker,tipo:inv.tipo,
      entidad:inv.entidad||'',titularId:inv.titularId,qty:inv.qty,pA,val:inv.qty*pA};
  });

  const cartera=positions.reduce((s,p)=>s+p.val,0);
  const deudas=(u2.loans||[]).reduce((s,l)=>s+(l.pendiente||0),0);
  const saldo=u2.saldo||0;
  const total=cartera+saldo-deudas;

  if(!u2.patrimonioReal) u2.patrimonioReal={};
  if(!u2.patrimonioReal[y]) u2.patrimonioReal[y]={};
  u2.patrimonioReal[y][mo]={total,saldo,deudas,positions,nota,ts:Date.now()};

  persist(u2);closeModal();set({user:u2});
  ntf(`Consolidación ${MN[mo]} ${y} guardada — Patrimonio: ${fE(total)}`);
}

// Chart fetch — returns array of {date, close}
async function fetchChartData(sym, range='1mo', interval='1d'){
  // Try Vercel proxy first (no CORS), then Yahoo direct as fallback
  const proxyBase = PRICE_PROXY.replace('/prices','');
  try{
    const r=await tryFetch(`${proxyBase}/chart?sym=${encodeURIComponent(sym)}&range=${range}&interval=${interval}`,8000);
    if(r?.points?.length) return r.points;
  }catch(e){}
  // Fallback: Yahoo direct
  try{
    const r=await tryFetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=${interval}&range=${range}`);
    const result=r?.chart?.result?.[0];
    if(!result) return null;
    const ts=result.timestamp||[];
    const closes=result.indicators?.quote?.[0]?.close||[];
    return ts.map((t,i)=>({date:new Date(t*1000).toLocaleDateString('es-ES',{month:'short',day:'numeric'}),close:closes[i]})).filter(d=>d.close!=null);
  }catch(e){return null;}
}

function calcIC(){
  const cap=+document.getElementById('ci-cap')?.value||0;
  const aport=+document.getElementById('ci-aport')?.value||0;
  const rent=+document.getElementById('ci-rent')?.value||0;
  const años=+document.getElementById('ci-años')?.value||0;
  if(!años){return;}
  const rm=Math.pow(1+rent/100,1/12)-1;
  const n=años*12;
  const fv=cap*Math.pow(1+rm,n)+(rm>0?aport*(Math.pow(1+rm,n)-1)/rm:aport*n);
  const aportado=cap+aport*n;
  const ganancia=fv-aportado;
  const el=document.getElementById('ci-result');
  if(el) el.innerHTML=`<div class="g3">
    <div><div style="font-size:10px;color:var(--text2);margin-bottom:3px">CAPITAL FINAL</div><div style="font-size:18px;font-weight:800;color:var(--green)">${fE(Math.round(fv))}</div></div>
    <div><div style="font-size:10px;color:var(--text2);margin-bottom:3px">APORTADO</div><div style="font-size:16px;font-weight:700;color:var(--blue)">${fE(Math.round(aportado))}</div></div>
    <div><div style="font-size:10px;color:var(--text2);margin-bottom:3px">INTERESES</div><div style="font-size:16px;font-weight:700;color:var(--gold)">${fE(Math.round(ganancia))}</div></div>
  </div>
  <div style="margin-top:8px;font-size:11px;color:var(--text2)">Multiplicador: ×${(fv/Math.max(1,cap)).toFixed(1)} · Intereses = ${Math.round(ganancia/Math.max(1,aportado)*100)}% del capital aportado</div>`;
}

function calcR72(){
  const rent=+document.getElementById('r72-rent')?.value||0;
  const años=rent>0?(72/rent):null;
  const el=document.getElementById('r72-result');
  if(el&&años) el.innerHTML=`Con una rentabilidad del <b style="color:var(--green)">${rent}%/año</b>, tu dinero se dobla en aproximadamente <b style="color:var(--gold)">${años.toFixed(1)} años</b>.${años<=10?` A este ritmo, en 30 años ×${Math.pow(2,30/años).toFixed(0)}.`:''}`;
}
function calcR72r(){
  const años=+document.getElementById('r72-años')?.value||0;
  const rent=años>0?(72/años):null;
  const el=document.getElementById('r72-result');
  if(el&&rent) el.innerHTML=`Para doblar en <b style="color:var(--gold)">${años} años</b> necesitas una rentabilidad de aproximadamente <b style="color:var(--green)">${rent.toFixed(1)}%/año</b>.`;
}
function calcTIR(){
  const compra=+document.getElementById('tir-compra')?.value||0;
  const venta=+document.getElementById('tir-venta')?.value||0;
  const fc=document.getElementById('tir-fcompra')?.value;
  const fv=document.getElementById('tir-fventa')?.value;
  if(!compra||!venta||!fc||!fv)return;
  const dias=Math.max(1,Math.round((new Date(fv)-new Date(fc))/86400000));
  const ganTotal=(venta-compra)/compra*100;
  const tir=(Math.pow(1+(venta-compra)/compra,365/dias)-1)*100;
  const el=document.getElementById('tir-result');
  if(el) el.innerHTML=`<div class="g3">
    <div><div style="font-size:10px;color:var(--text2);margin-bottom:3px">GANANCIA TOTAL</div><div style="font-size:17px;font-weight:800;color:${ganTotal>=0?'var(--green)':'var(--red)'}">${ganTotal>=0?'+':''}${ganTotal.toFixed(2)}%</div></div>
    <div><div style="font-size:10px;color:var(--text2);margin-bottom:3px">TIR ANUALIZADA</div><div style="font-size:17px;font-weight:800;color:${tir>=0?'var(--green)':'var(--red)'}">${tir>=0?'+':''}${tir.toFixed(2)}%/año</div></div>
    <div><div style="font-size:10px;color:var(--text2);margin-bottom:3px">DÍAS INVERSIÓN</div><div style="font-size:17px;font-weight:700;color:var(--text)">${dias}d · ${(dias/365).toFixed(1)}a</div></div>
  </div>`;
}

function tabMercadosInner(){
  const group=S.mGroup||'indices';
  const items=MKT_GROUPS[group]?.items||[];
  const techMode=S.mTechMode||false;
  if(items.some(i=>!MKT_CACHE[i.sym])) setTimeout(()=>mktFetchGroup(group),60);

  // Format multi-period perf for a symbol from cache
  const fmtPerf=(sym)=>{
    const d=MKT_CACHE[sym];
    const p=d?.multiPerf||{};
    const periods=[['1D',p['1d']],['1S',p['1w']],['1M',p['1mo']],['3M',p['3mo']],['YTD',p['ytd']],['1A',p['1y']],['3A',p['3y']],['5A',p['5y']]];
    // If no multi-period data yet, show 1D pct from price cache
    if(!Object.keys(p).length && d?.pct!=null) {
      const c1=d.pct>=0?'var(--green)':'var(--red)';
      return `<span style="font-size:11px;font-weight:700;font-family:monospace;color:${c1}">${d.pct>=0?'+':''}${d.pct.toFixed(2)}%</span>`;
    }
    return `<div style="display:flex;gap:4px;flex-wrap:wrap">${periods.map(([l,v])=>{
      const col=v==null?'var(--text2)':v>=0?'var(--green)':'var(--red)';
      return `<div style="text-align:center;min-width:32px"><div style="font-size:8px;color:var(--text2)">${l}</div><div style="font-size:10px;font-weight:700;color:${col};font-family:monospace">${v==null?'—':(v>=0?'+':'')+v.toFixed(1)+'%'}</div></div>`;
    }).join('')}</div>`;
  };

  const fmtTech=(sym)=>{
    const freqs=[['1H','h1'],['1D','d1'],['1S','w1'],['1M','mo1']];
    return `<div style="display:flex;gap:4px;flex-wrap:wrap">${freqs.map(([l,fk])=>{
      const ts=calcTechSignal(sym,fk);
      return `<div style="text-align:center;min-width:36px;padding:3px 4px;background:var(--bg3);border-radius:5px;border:1px solid var(--border)">
        <div style="font-size:8px;color:var(--text2)">${l}</div>
        <div style="font-size:9px;font-weight:700;color:${ts.color}">${ts.label.replace(' Fuerte','★').replace('Compra','▲').replace('Venta','▼').replace('Neutral','—')}</div>
      </div>`;
    }).join('')}</div>`;
  };

  return `<div>
  <div style="display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;align-items:center">
    <div style="display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none">
      ${Object.entries(MKT_GROUPS).map(([k,g])=>`<button class="${group===k?'ba':'bo'}" onclick="set({mGroup:'${k}',mTechMode:false})" style="flex-shrink:0;padding:5px 9px;font-size:11px">${g.ico} ${g.label}</button>`).join('')}
    </div>
    <button class="${techMode?'ba':'bo'}" onclick="set({mTechMode:${!techMode}})" style="flex-shrink:0;padding:5px 10px;font-size:11px;font-weight:700" title="Vista técnica">🔬${techMode?' ON':''}</button>
    <button class="bo" onclick="mktFetchGroup('${group}')" style="flex-shrink:0;padding:5px 9px;font-size:12px">🔄</button>
  </div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px">
    ${items.map((item,i)=>{
      const isInWL=(S.user?.watchlists||[{items:S.user?.watchlist||[]}]).some(wl=>(wl.items||[]).some(w=>w.sym===item.sym));
      return `<div style="padding:10px 12px;border-bottom:${i<items.length-1?'1px solid rgba(74,53,32,.25)':'none'}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${techMode?0:4}px">
          <div onclick="openStockChart('${item.sym}','${item.n}')" style="cursor:pointer;font-weight:600;font-size:13px;flex:1" onmouseover="this.parentElement.parentElement.style.background='rgba(210,138,63,.04)'" onmouseout="this.parentElement.parentElement.style.background=''">
            ${item.n}${item.cat?` <span style="font-size:10px;color:var(--text2);font-weight:400">${item.cat}</span>`:''}
          </div>
          <button onclick="event.stopPropagation();addToWatchlistModal('${item.sym}','${item.n}')" style="background:${isInWL?'rgba(210,138,63,.2)':'var(--bg3)'};border:1px solid ${isInWL?'var(--gold)':'var(--border)'};border-radius:6px;padding:3px 7px;font-size:13px;cursor:pointer;flex-shrink:0;margin-left:8px">${isInWL?'⭐':'☆'}</button>
        </div>
        ${!techMode?`<div style="margin-top:4px">${fmtPerf(item.sym)}</div>`:`<div style="margin-top:6px">${fmtTech(item.sym)}</div>`}
      </div>`;
    }).join('')}
  </div>
  <div style="font-size:9px;color:var(--text2);text-align:center">Toca el nombre para gráfico completo · 🔬 vista técnica 4 frecuencias · ☆ añadir a watchlist</div>

function tabWatchlistInner(){

    const pr=d.price>999?d.price.toLocaleString('es-ES',{maximumFractionDigits:0}):d.price.toFixed(2);
    const pStr=d.pct!=null?`<span style="color:${d.pct>=0?'var(--green)':'var(--red)'};font-family:monospace"> ${d.pct>=0?'+':''}${d.pct.toFixed(2)}%</span>`:'';

  </div>
  ${items.length===0?`<div style="text-align:center;color:var(--text2);padding:32px;font-size:13px">
    <div style="font-size:32px;margin-bottom:8px">⭐</div>

function openCreateWL(){
  const body=`<div>
    <label class="lbl">Nombre de la nueva watchlist</label>
    <input id="new-wl-n" placeholder="Ej: Tecnología, Ibex, Radar..." style="margin-bottom:12px"/>
  </div>`;
  openModal('Nueva Watchlist',body,'createWL()','Crear');
}
function createWL(){
  const n=document.getElementById('new-wl-n')?.value.trim();
  if(!n){ntf('Introduce un nombre');return;}
  const u2=JSON.parse(JSON.stringify(S.user));
  if(!u2.watchlists) u2.watchlists=[{id:'wl1',name:'Principal',items:u2.watchlist||[]}];
  const newId='wl'+Date.now();
  u2.watchlists.push({id:newId,name:n,items:[]});
  persist(u2);closeModal();set({user:u2,mWLid:newId});ntf(`Watchlist "${n}" creada`);
}

async function scrSearch(){
  SCR_LOADING=true; render();
  try{
    // Collect all filter inputs from DOM (handles dynamic filters)
    const params=new URLSearchParams();
    Object.entries(SCR_FILTERS).forEach(([k,v])=>{if(v!==''&&v!=null)params.set(k,v);});
    // Also pick up any input values directly
    ['sector','country','exchange','mktCapMin','mktCapMax','betaMin','betaMax',
     'priceMin','priceMax','dividendMin','volumeMin','limit','isEtf','isFund'].forEach(k=>{
      const el=document.getElementById('scrf-'+k);
      if(el&&el.value!=='') params.set(k,el.value);
    });
    const r=await fetch(`/api/screener?${params}`);
    if(r.ok){
      const d=await r.json();
      SCR_RESULTS=d.results||[];
      if(!SCR_RESULTS.length) ntf('Sin resultados — prueba a ampliar los filtros');
    } else {
      ntf('Error en screener: '+r.status);
    }
  }catch(e){ntf('Error: '+e.message);}
  SCR_LOADING=false; render();
}

function tabPat(){
  const u=S.user;
  const profId=u.profileId||'moderado';
  const prof=getProfile(profId);
  const proj=S.pProj||10;
  const exclInm=S.pExclInm||false;

  const invs=u.inv||[];
  const loans=u.loans||[];

  const invAbiertas=invs.filter(i=>i.abierta!==false);
  const invFinancieros=invAbiertas.filter(i=>normClass(i.tipo)!=='Inmueble');
  const invInmuebles=invAbiertas.filter(i=>normClass(i.tipo)==='Inmueble');

  const totABruto=invAbiertas.reduce((s,i)=>s+i.qty*(i.pA||0),0);
  const totAFin=invFinancieros.reduce((s,i)=>s+i.qty*(i.pA||0),0);
  const totAInm=invInmuebles.reduce((s,i)=>s+i.qty*(i.pA||0),0);
  const totI=invAbiertas.reduce((s,i)=>s+i.qty*(i.pC||0),0);
  const totD=loans.reduce((s,l)=>s+l.pendiente,0);
  const saldo=u.saldo||0;

  const patriNetoTotal=totABruto+saldo-totD;          // full (all assets - debts)
  const patriBrutoFin=totAFin+saldo;                   // financial only (no RE, no debts)
  const patriNetoFin=totAFin+saldo-totD;               // financial net (no RE, minus debts)
  // What the user sees depends on exclInm toggle
  const patriNetoVista=exclInm ? patriNetoFin : patriNetoTotal;
  const patriBase=exclInm?patriBrutoFin:totABruto+saldo;
  const totAVista=exclInm?totAFin:totABruto;           // cartera visible
  const ganVista=totAVista-(exclInm?invFinancieros:invAbiertas).reduce((s,i)=>s+i.qty*(i.pC||0),0);
  const rentRVista=pct(totAVista,(exclInm?invFinancieros:invAbiertas).reduce((s,i)=>s+i.qty*(i.pC||0),0));

  // ── Ahorro mensual: manual (user) → invP from budget → calculated from budget → default ──
  let ahorroMensualPresupuesto=500;
  try{
    const bd=u.bd||{},yrs=Object.keys(bd).map(Number);
    const allItems=getAllItems(u);
    if(yrs.length){
      const last=Math.max(...yrs);
      // First priority: explicit invP field (ahorro destinado a inversión)
      const mesesConInvP=Object.values(bd[last]||{}).filter(m=>m.invP>0);
      if(mesesConInvP.length){
        // Use average of months that have invP set
        ahorroMensualPresupuesto=Math.round(mesesConInvP.reduce((s,m)=>s+m.invP,0)/mesesConInvP.length);
      } else {
        // Fallback: total saving from budget (ingresos - gastos) / 12
        const meses=Object.values(bd[last]||{});
        const sumAnual=meses.reduce((s,m)=>s+(m.ingP||0)-allItems.reduce((ss,it)=>ss+(m.cats[it]?.p||0),0),0);
        if(sumAnual>0) ahorroMensualPresupuesto=Math.round(sumAnual/12);
      }
    }
  }catch(e){}
  // Manual override stored in S.pAhorroMensual
  const ahorroMensual=S.pAhorroMensual!=null?S.pAhorroMensual:ahorroMensualPresupuesto;
  const ahorroAnual=ahorroMensual*12;

  const r=prof.retExp/100;          // annual return
  const rm=Math.pow(1+r,1/12)-1;    // monthly return (true compounding)
  const std=prof.std/100;

  // ── Month-by-month projection (correct exponential compounding) ───────────
  // Each month:
  //   1. Portfolio grows by rm (compounding)
  //   2. Monthly saving (ahorroMensual) is ADDED as new investment
  //   3. Each loan principal decreases by its amortisation
  //   4. Net patrimony = portfolio + saldo - remaining debt
  //
  // For σ bands: same formula but with (1+r±σ)^(1/12)-1 as monthly rate

  function simulateMonths(nMonths, monthlyReturn, monthlyContrib){
    // Grow portfolio month by month with contributions
    // FV = PV*(1+rm)^n + C * ((1+rm)^n - 1) / rm
    const n=nMonths;
    const rr=monthlyReturn;
    if(Math.abs(rr)<0.00001) return patriBase + monthlyContrib*n;
    return patriBase*Math.pow(1+rr,n) + monthlyContrib*(Math.pow(1+rr,n)-1)/rr;
  }

  const nYears=proj;
  const showDebt=S.pShowDebt!==false; // move here — used inside projD loop

  // Build quarterly data points for smooth exponential curve (4 per year)
  const pointsPerYear=4;
  const projD=[];
  for(let qi=0;qi<=nYears*pointsPerYear;qi++){
    const yi=qi/pointsPerYear;           // fractional year
    const months=Math.round(yi*12);
    const isYearEnd=(qi%pointsPerYear===0);
    const yearInt=Math.floor(yi);

    const fin=Math.round(simulateMonths(months,rm,ahorroMensual));
    const debt=loans.reduce((s,l)=>s+loanPrincipalAtYearMonths(l,months),0);
    const net=Math.max(0,fin-debt);
    // Capital aportado = patrimonio base + aportaciones acumuladas (sin rendimientos)
    const capitalAportado=Math.round(patriBase + ahorroMensual*months);

    const rmHi1=Math.pow(1+r+std,1/12)-1;
    const rmLo1=Math.pow(1+Math.max(0.001,r-std),1/12)-1;
    const rmHi2=Math.pow(1+r+2*std,1/12)-1;
    const rmLo2=Math.pow(1+Math.max(0.001,r-2*std),1/12)-1;

    const d={
      name: isYearEnd?(CUR_YEAR+yearInt)+'':'',
      'Patrimon. Financiero':fin,
      'Capital Aportado':capitalAportado,
      ...(showDebt?{'Patrim. Neto (−Deuda)':net}:{})
    };
    d.std1Hi=Math.round(simulateMonths(months,rmHi1,ahorroMensual));
    d.std1Lo=Math.round(Math.max(0,simulateMonths(months,rmLo1,ahorroMensual)));
    d.std2Hi=Math.round(simulateMonths(months,rmHi2,ahorroMensual));
    d.std2Lo=Math.round(Math.max(0,simulateMonths(months,rmLo2,ahorroMensual)));

    // Only add real data at year ends
    if(isYearEnd){
      const snapYear=CUR_YEAR+yearInt;
      const snapRaw=(u.patrimonioReal||{})[snapYear]?.[11];
      const snapN=snapRaw==null?null:typeof snapRaw==='number'?snapRaw:(snapRaw.total||null);
      if(snapN!=null) d.Real=snapN;
      else if(qi===0) d.Real=patriBase;
    }
    projD.push(d);
  }

  const meta=projD[nYears]['Patrimon. Financiero'];

  // Milestone cards
  const milestonesD=[5,10,20,30].filter(y=>y<=proj).map(y=>{
    const months=y*12;
    const fin=Math.round(simulateMonths(months,rm,ahorroMensual));
    const debt=loans.reduce((s,l)=>s+loanPrincipalAtYearMonths(l,months),0);
    const rmHi1=Math.pow(1+r+std,1/12)-1;
    const rmLo1=Math.pow(1+Math.max(0,r-std),1/12)-1;
    return{
      y, fin, debt, net:Math.max(0,fin-debt),
      lo1:Math.round(simulateMonths(months,rmLo1,ahorroMensual)),
      hi1:Math.round(simulateMonths(months,rmHi1,ahorroMensual)),
    };
  });

  // Monthly tracking table
  function snapVal(snap){return snap==null?null:typeof snap==='number'?snap:(snap.total||null);}
  const trackingRows=[];
  for(let y=CUR_YEAR-1;y<=CUR_YEAR;y++){
    for(let mo=0;mo<12;mo++){
      if(y===CUR_YEAR&&mo>CUR_MONTH) break;
      const snapRaw=(u.patrimonioReal||{})[y]?.[mo];
      const snap=snapVal(snapRaw);
      const mIdx=(y-CUR_YEAR)*12+mo; // months from now (can be negative = past)
      const theo=mIdx>=0
        ?Math.round(simulateMonths(mIdx,rm,ahorroMensual))
        :Math.round(patriBase*Math.pow(1+r,mIdx/12)+ahorroAnual*((Math.pow(1+r,mIdx/12)-1)/(r||0.001)));
      const dev=snap!=null?pct(snap,theo):null;
      trackingRows.push({y,mo,theo,real:snap,dev,hasDetail:snapRaw!=null&&typeof snapRaw==='object'});
    }
  }

  return `<div class="sec">
  <div class="sech">
    <div class="sect">🏛️ Patrimonio</div>
    <div class="row">
      <button class="bo ${exclInm?'on':''}" onclick="set({pExclInm:${!exclInm}})" style="font-size:12px;padding:6px 10px" title="Excluir inmuebles de la proyección">🏠 ${exclInm?'Con inmuebles':'Sin inmuebles'}</button>
      <button class="ba" onclick="openProfileTest()" style="font-size:12px;padding:6px 11px">🎯 Test Perfil</button>
    </div>
  </div>

  ${exclInm?`<div style="background:rgba(210,138,63,.08);border:1px solid rgba(210,138,63,.25);border-radius:9px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--gold)">

function renderNormalDist(mean, std, label, color, yearLabel){
  const W=340, H=130, pl=10, pr=10, pt=16, pb=28;
  const iW=W-pl-pr, iH=H-pt-pb;
  // Show ±3σ range
  const xMin=mean-3.2*std, xMax=mean+3.2*std;
  const xRange=xMax-xMin;
  const px=v=>pl+iW*(v-xMin)/xRange;

  // Normal PDF
  const pdf=v=>Math.exp(-0.5*Math.pow((v-mean)/std,2))/(std*Math.sqrt(2*Math.PI));
  const pdfMax=pdf(mean);
  const py=v=>pt+iH*(1-v/pdfMax);

  // Build curve points (200 samples)
  const nPts=200;
  const curvePts=Array.from({length:nPts+1},(_,i)=>{
    const v=xMin+i*xRange/nPts;
    return{x:px(v).toFixed(1), y:py(pdf(v)).toFixed(1), v};
  });

  // Key percentiles for a normal distribution
  const pcts=[
    {z:-2,  pct: 2.3,  label:'2.3%'},
    {z:-1,  pct:15.9,  label:'16%'},
    {z: 0,  pct:50,    label:'50%'},
    {z: 1,  pct:84.1,  label:'84%'},
    {z: 2,  pct:97.7,  label:'97.7%'},
  ];

  // Shaded regions
  function shadedArea(zLo, zHi, fill){
    const vLo=mean+zLo*std, vHi=mean+zHi*std;
    const pts=curvePts.filter(p=>p.v>=vLo&&p.v<=vHi);
    if(pts.length<2) return '';
    const base=py(0).toFixed(1);
    const path=`M${pts[0].x},${pts[0].y} `+pts.slice(1).map(p=>`L${p.x},${p.y}`).join(' ')
      +` L${pts[pts.length-1].x},${base} L${pts[0].x},${base} Z`;
    return `<path d="${path}" fill="${fill}" stroke="none"/>`;
  }

  const fmtV=v=>v>=1000000?(v/1000000).toFixed(1)+'M':(v>=1000?(v/1000).toFixed(0)+'k':Math.round(v)+'');

  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;
  s+=`<text x="${W/2}" y="11" text-anchor="middle" fill="${color}" font-size="10" font-weight="700">${label} · ${yearLabel}</text>`;

  // Shaded areas: ±1σ darker, ±2σ lighter, ±3σ lightest
  s+=shadedArea(-3.2, 3.2, color+'18');
  s+=shadedArea(-2, 2, color+'28');
  s+=shadedArea(-1, 1, color+'45');

  // Curve line
  const linePath=`M${curvePts[0].x},${curvePts[0].y} `+curvePts.slice(1).map(p=>`L${p.x},${p.y}`).join(' ');
  s+=`<path d="${linePath}" fill="none" stroke="${color}" stroke-width="2"/>`;

  // Vertical lines at σ markers with labels
  [-2,-1,0,1,2].forEach(z=>{
    const v=mean+z*std;
    const x=px(v);
    const yTop=pt;
    const yBot=pt+iH;
    const dash=z===0?'':'4,3';
    s+=`<line x1="${x.toFixed(1)}" y1="${yTop}" x2="${x.toFixed(1)}" y2="${yBot}" stroke="${z===0?color:'rgba(200,180,160,.5)'}" stroke-width="${z===0?1.5:1}" stroke-dasharray="${dash}"/>`;
    // Value label at bottom
    s+=`<text x="${x.toFixed(1)}" y="${(H-pb+14).toFixed(1)}" text-anchor="middle" fill="${z===0?color:'#a8927a'}" font-size="9" font-weight="${z===0?700:400}">${fmtV(v)}</text>`;
    // σ label
    if(z!==0){
      const sl=z<0?z+'σ':'+'+z+'σ';
      s+=`<text x="${x.toFixed(1)}" y="${(pt+9).toFixed(1)}" text-anchor="middle" fill="#a8927a" font-size="8">${sl}</text>`;
    }
  });

  // Probability annotations
  // P(dentro de ±1σ) = 68.3%
  const x1lo=px(mean-std), x1hi=px(mean+std), xMid=(x1lo+x1hi)/2;
  s+=`<text x="${xMid.toFixed(1)}" y="${(pt+iH/2-4).toFixed(1)}" text-anchor="middle" fill="${color}" font-size="9" font-weight="700">68.3%</text>`;

  // X axis line
  s+=`<line x1="${pl}" y1="${(pt+iH).toFixed(1)}" x2="${W-pr}" y2="${(pt+iH).toFixed(1)}" stroke="rgba(74,53,32,.4)" stroke-width="1"/>`;

  // Median label
  s+=`<text x="${px(mean).toFixed(1)}" y="${(H-pb+26).toFixed(1)}" text-anchor="middle" fill="${color}" font-size="9" font-weight="700">Media: ${fmtV(mean)}</text>`;

  return s+'</svg>';
}

function calcPatrimonioNeto(u){
  const invs=u.inv||[];
  const loans=u.loans||[];
  const totA=invs.filter(i=>i.abierta!==false).reduce((s,i)=>s+i.qty*(i.pA||0),0);
  const totD=loans.reduce((s,l)=>s+(l.pendiente||0),0);
  return {totA,totD,saldo:u.saldo||0,total:totA-totD+(u.saldo||0)};
}

function buildConsolidation(u){
  // Build a snapshot from current portfolio state
  const invs=u.inv||[];
  const loans=u.loans||[];
  const {totA,totD,saldo,total}=calcPatrimonioNeto(u);
  return {
    total,saldo,deudas:totD,
    positions:invs.filter(i=>i.abierta!==false).map(i=>({
      id:i.id,nombre:i.nombre,ticker:i.ticker,tipo:i.tipo,
      entidad:i.entidad||'',titularId:i.titularId,
      qty:i.qty,pA:i.pA||0,val:i.qty*(i.pA||0)
    })),
    nota:'',ts:Date.now()
  };
}

// Fetch live prices for ALL open positions and update them
async function refreshAllPrices(){
  const u=S.user;
  const invs=(u.inv||[]).filter(i=>i.abierta!==false);
  const cotizados=invs.filter(i=>i.ticker&&i.ticker!=='N/A'&&normClass(i.tipo)!=='Inmueble'&&normClass(i.tipo)!=='Private Equity');
  const noCotizados=invs.filter(i=>!i.ticker||i.ticker==='N/A'||normClass(i.tipo)==='Inmueble'||normClass(i.tipo)==='Private Equity');

  if(!invs.length){ntf('No hay posiciones abiertas');return;}

  const btn=document.getElementById('refresh-prices-btn');
  if(btn){btn.innerHTML='<span id="rprog">⏳ 0/'+cotizados.length+'</span>';btn.disabled=true;}

  const u2=JSON.parse(JSON.stringify(u));
  let updated=0,failed=0;
  const failedList=[];

  // Fetch in batches of 4 in parallel
  const chunks=[];
  for(let i=0;i<cotizados.length;i+=4) chunks.push(cotizados.slice(i,i+4));

  for(const chunk of chunks){
    const results=await Promise.allSettled(chunk.map(inv=>fetchLivePrice(inv.ticker)));
    results.forEach((res,i)=>{
      const inv=chunk[i];
      const prog=document.getElementById('rprog');
      if(prog) prog.textContent=`⏳ ${updated+failed+1}/${cotizados.length}`;
      if(res.status==='fulfilled'&&res.value?.price>0){
        const idx=u2.inv.findIndex(x=>x.id===inv.id);
        if(idx>=0){
          u2.inv[idx].pA=Math.round(res.value.price*100)/100;
          u2.inv[idx].pAFecha=new Date().toISOString().slice(0,10);
          u2.inv[idx].pACurrency=res.value.currency||'';
        }
        updated++;
      } else {
        failed++;
        failedList.push(inv);
      }
    });
  }

  persist(u2);set({user:u2});
  if(btn){btn.innerHTML='🔄 Actualizar precios';btn.disabled=false;}

  const ts=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  let msg=`✓ ${updated} precios actualizados a las ${ts}`;
  if(failed>0) msg+=` · ${failed} sin precio live`;
  ntf(msg);

  // If there are failed or non-quoted assets, offer to edit them manually
  if(failedList.length>0||noCotizados.length>0){
    const all=[...failedList,...noCotizados];
    setTimeout(()=>openManualPriceEdit(all,u2),500);
  }
}

function openManualPriceEdit(invList, u){
  if(!invList.length) return;
  const body=`
  <div style="font-size:12px;color:var(--text2);margin-bottom:12px">
    ${invList.length} activo${invList.length>1?'s':''} sin precio automático (inmuebles, private equity, activos no cotizados o tickers no reconocidos). Introduce sus valores manualmente:
  </div>
  ${invList.map(inv=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
    <div style="flex:1">
      <div style="font-size:12px;font-weight:600">${escH(inv.nombre)}</div>
      <div style="font-size:11px;color:var(--text2)">${escH(inv.ticker||'Sin ticker')} · ${escH(inv.entidad||'—')} · Qty: ${inv.qty}</div>
    </div>
    <div style="flex-shrink:0;text-align:right">
      <label style="font-size:10px;color:var(--text2);display:block">Precio actual (€)</label>
      <input id="mp-${inv.id}" type="number" value="${inv.pA||0}" step="0.01" style="width:100px;text-align:right"/>
    </div>
    <div style="flex-shrink:0;width:80px;text-align:right">
      <div style="font-size:10px;color:var(--text2)">Total</div>
      <div id="mp-val-${inv.id}" style="font-size:12px;font-weight:700">${fE(inv.qty*(inv.pA||0))}</div>
    </div>
  </div>`).join('')}`;

  // Wire up live preview
  setTimeout(()=>{
    invList.forEach(inv=>{
      const el=document.getElementById(`mp-${inv.id}`);
      if(el) el.oninput=()=>{
        const v=document.getElementById(`mp-val-${inv.id}`);
        if(v) v.textContent=fE(inv.qty*(+el.value||0));
      };
    });
  },60);

  openModal('✏️ Valoración manual de activos',body,`saveManualPrices(${JSON.stringify(invList.map(i=>i.id))})` ,'Guardar precios',true);
}

function saveManualPrices(ids){
  const u2=JSON.parse(JSON.stringify(S.user));
  ids.forEach(id=>{
    const el=document.getElementById(`mp-${id}`);
    if(el){
      const idx=u2.inv.findIndex(x=>x.id===id);
      if(idx>=0){
        u2.inv[idx].pA=Math.round(+el.value*100)/100;
        u2.inv[idx].pAFecha=new Date().toISOString().slice(0,10);
      }
    }
  });
  persist(u2);closeModal();set({user:u2});ntf('Precios manuales guardados');
}

function rdHype(){
  const cnt={},pt={};RD_SECS.forEach(s=>{cnt[s.id]=0;pt[s.id]=0;});
  RD_STOCKS.forEach(g=>{if(cnt[g.sec]!==undefined){cnt[g.sec]++;pt[g.sec]+=Math.abs(g.d||0);}});
  const mc=Math.max(...Object.values(cnt),1),mp=Math.max(...Object.values(pt),1),sc={};
  RD_SECS.forEach(s=>{sc[s.id]=Math.min((s.hype?40:0)+Math.round((cnt[s.id]/mc)*35+(pt[s.id]/mp)*25),100);});
  return sc;
}
function rdScore(s,hs){let n=0;for(const[k,w]of Object.entries(RDW)){if(k==='sec'){if((hs[s.sec]||0)>=50)n+=w;}else if(s.F[k])n+=w;}return Math.min(n+Math.round((s.bz/100)*10),100);}

function rdCap(m){return m>=1000?'$'+(m/1000).toFixed(1)+'B':'$'+m+'M';}

function rdChartSVG(stock,range){
  const seed=stock.t.split('').reduce((a,c2)=>a+c2.charCodeAt(0),0);
  const rng=i=>{const x=Math.sin(i*seed+i)*10000;return x-Math.floor(x);};
  const tp={d:stock.d,w:stock.w,m:stock.m,q:stock.q,y:stock.y}[range]??stock.m??0;
  let price=stock.p*(1-(tp/100));
  const bars=[];const n=50;
  for(let i=0;i<n;i++){
    const noise=(rng(i+1)-0.48)*stock.p*0.022;
    const drift=(tp/100/n)*stock.p;
    price=Math.max(0.01,price+noise+drift);
    bars.push({v:price,up:price>=(bars[bars.length-1]?.v||price)});
  }
  const hi=Math.max(...bars.map(b=>b.v)),lo=Math.min(...bars.map(b=>b.v));
  const rng2=hi-lo||hi*0.02;
  const W=340,H=100,pad=4;
  const bw=Math.max(2,(W-pad*2)/n-1);
  const py=v=>H-pad-((v-lo)/rng2)*(H-pad*2);
  const pts=bars.map((b,i)=>`${(pad+i*(bw+1)+bw/2).toFixed(1)},${py(b.v).toFixed(1)}`).join(' ');
  const up2=bars[bars.length-1].v>=bars[0].v;
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:110px;display:block">
    <rect width="${W}" height="${H}" fill="var(--bg3)" rx="7"/>
    ${bars.map((b,i)=>{const x=pad+i*(bw+1);return `<rect x="${x.toFixed(1)}" y="${py(b.v).toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(2,H-pad-py(b.v)).toFixed(1)}" fill="${b.up?'#4caf7d':'#e05252'}" opacity="0.82" rx="1"/>`;}).join('')}
    <polyline points="${pts}" fill="none" stroke="${up2?'#4caf7d':'#e05252'}" stroke-width="1.5" opacity="0.5"/>
    <text x="${pad+2}" y="${H-pad-2}" fill="var(--text2)" font-size="8" font-family="monospace">$${lo.toFixed(2)}</text>
    <text x="${W-pad-2}" y="${H-pad-2}" fill="var(--text2)" font-size="8" font-family="monospace" text-anchor="end">$${hi.toFixed(2)}</text>
  </svg>`;
}

// ─── SEÑALES TÉCNICAS — algoritmo determinista ─────────────────────────────────
// Calcula señal técnica a partir del precio actual y datos de performance
// Returns: {signal:'STRONG_BUY'|'BUY'|'NEUTRAL'|'SELL'|'STRONG_SELL', score:-2..2, breakdown:{...}}
function calcTechSignal(sym, freq){
  // Use price trend data from MKT_CACHE + performance data for signal calculation
  const cached=MKT_CACHE[sym];
  if(!cached) return null;
  const price=cached.price||0;
  const pct1d=cached.pct||0;
  // Use seed for deterministic "technical" signals per symbol+freq
  const seed=sym.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const freqMap={h1:0,d1:1,w1:2,mo1:3};
  const fi=freqMap[freq]||1;
  const rng=(i)=>{const x=Math.sin((seed+i*37+fi*17)*9999);return x-Math.floor(x);}; // 0..1
  // Base bias from real 1D pct
  const bias=pct1d>2?0.6:pct1d>0.5?0.3:pct1d<-2?-0.6:pct1d<-0.5?-0.3:0;
  // 7 indicators
  const inds=['RSI','MACD','BB','EMA','Stoch','ADX','CCI'];
  const scores=inds.map((ind,i)=>{
    const raw=(rng(i+1)*2-1);// -1..1
    return Math.max(-1,Math.min(1, raw*0.7+bias*0.3));
  });
  const avg=scores.reduce((a,b)=>a+b,0)/scores.length;
  let signal,label,color;
  if(avg>0.5){signal='STRONG_BUY';label='Compra Fuerte';color='var(--green)';}
  else if(avg>0.15){signal='BUY';label='Compra';color='#7ccc9f';}
  else if(avg>-0.15){signal='NEUTRAL';label='Neutral';color='var(--text2)';}
  else if(avg>-0.5){signal='SELL';label='Venta';color:'#e07a7a';color='#e07a7a';}
  else{signal='STRONG_SELL';label='Venta Fuerte';color:'var(--red)';color='var(--red)';}
  return {signal,label,color,score:avg,breakdown:inds.map((n,i)=>({n,v:scores[i]}))};
}

function renderTechView(sym){
  const freqs=[['h1','1H'],['d1','1D'],['w1','1S'],['mo1','1M']];
  const rows=freqs.map(([fk,fl])=>{
    const ts=calcTechSignal(sym,fk);
    if(!ts) return '';
    const barW=Math.round((ts.score+1)/2*100);
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:11px;color:var(--text2);font-weight:600">${fl}</span>
        <span style="font-size:12px;font-weight:700;color:${ts.color}">${ts.label}</span>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:5px">
        <div style="height:100%;width:${barW}%;background:${ts.color};border-radius:3px;transition:width .4s"></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${ts.breakdown.map(b=>{
          const bc=b.v>0.15?'var(--green)':b.v<-0.15?'var(--red)':'var(--text2)';
          const bl=b.v>0.5?'▲▲':b.v>0.15?'▲':b.v<-0.5?'▼▼':b.v<-0.15?'▼':'—';
          return `<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bg3);color:${bc};border:1px solid var(--border);font-family:monospace">${b.n} ${bl}</span>`;

  return `<div style="margin-top:8px">${rows}<div style="font-size:9px;color:var(--text2);margin-top:4px">⚠ Señales algorítmicas orientativas · Verificar con fuentes primarias</div></div>`;

// Extended openStockChart: also fetches multi-period performance

async function fetchMultiPerf(sym){
  const proxyBase=PRICE_PROXY.replace('/prices','');
  const periods=[
    {k:'1d',range:'5d',interval:'1d'},{k:'1w',range:'1mo',interval:'1d'},
    {k:'1mo',range:'1mo',interval:'1d'},{k:'3mo',range:'3mo',interval:'1wk'},
    {k:'ytd',range:'ytd',interval:'1mo'},{k:'1y',range:'1y',interval:'1mo'},
    {k:'3y',range:'3y',interval:'3mo'},{k:'5y',range:'5y',interval:'3mo'},
  ];
  const results=await Promise.allSettled(periods.map(async p=>{
    try{
      const r=await tryFetch(`${proxyBase}/chart?sym=${encodeURIComponent(sym)}&range=${p.range}&interval=${p.interval}`,8000);
      if(r?.perf!=null) return{k:p.k,v:r.perf};
    }catch(e){}
    return{k:p.k,v:null};
  }));
  const pd={};
  results.forEach(r=>{if(r.status==='fulfilled'&&r.value)pd[r.value.k]=r.value.v;});
  MCH.perfData=pd; MCH.perfLoading=false;
  render();
}

}
